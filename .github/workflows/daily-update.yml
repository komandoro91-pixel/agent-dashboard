name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 10 * * *'    # 12:00 Kyiv (UTC+2 winter) — primary
    - cron: '15 10 * * *'   # retry +15 min
    - cron: '30 10 * * *'   # retry +30 min
    - cron: '45 10 * * *'   # retry +45 min
    - cron: '0 11 * * *'    # retry +60 min
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Run daily update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/daily-update.mjs

      - name: Commit and push changes
        run: |
          git config user.name "Agent Dashboard Bot"
          git config user.email "bot@agent-dashboard.auto"
          git add public/index.html scripts/improvement-history.json
          git diff --staged --quiet || git commit -m "chore(ui): daily auto-update $(date +%Y-%m-%d)"
          git push
