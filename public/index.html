// ═══════════════════════════════════════════════════════════
//  SPAWN / DESPAWN GENIES
// ═══════════════════════════════════════════════════════════
function spawnGenie(sessionId, session) {
  if (genieMap[sessionId]) return;
  if (freeGenieSlots.length === 0) return;
  const slotIdx = freeGenieSlots.shift();
  const pos = GENIE_SLOTS[slotIdx];
  const group = makeGenie(pos.x, pos.y, 0x818cf8, session.session_type || 'vscode');
  scene.add(group);
  group.scale.set(0.01, 0.01, 0.01);
  group.userData.spawning = true;
  group.userData.spawnProgress = 0;
  const projectName = (session.cwd || '').split(/[\\/]/).filter(Boolean).pop() || 'workspace';
  const el = document.createElement('div');
  el.className = 'role-label genie';
  let displayName = projectName;
  if (displayName.toLowerCase() === 'vs + claude projects') displayName = 'workspace';
  if (displayName.length > 14) displayName = displayName.slice(0, 13) + '…';
  el.textContent = displayName;
  labelsDiv.appendChild(el);
  labelEls.push({el, genieKey: sessionId});
  genieMap[sessionId] = { group, slotIdx, labelEl: el };
}

function disposeMesh(obj) {
  obj.traverse(child => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (child.material.map) child.material.map.dispose();
      child.material.dispose();
    }
  });
}

function despawnGenie(sessionId) {
  const entry = genieMap[sessionId];
  if (!entry) return;
  disposeMesh(entry.group);
  scene.remove(entry.group);
  entry.labelEl.remove();
  labelEls = labelEls.filter(item => item.genieKey !== sessionId);
  freeGenieSlots.push(entry.slotIdx);
  freeGenieSlots.sort((a, b) => a - b);
  delete genieMap[sessionId];
  delete genieOrbitAngles[sessionId];
}

// ═══════════════════════════════════════════════════════════
//  SPAWN / DESPAWN PENGUINS
// ═══════════════════════════════════════════════════════════
// Overflow wall desk positions — clockwise from top-right corner
// Overflow desk positions — concentric rings inside the room, clockwise from upper-right.
// Main 6 stations sit at radius=145 on angles −90°,−30°,30°,90°,150°,210°.
// Ring 1 (r≈200): gap angles between main stations.
// Ring 2 (r≈220–243): main station angles, smaller r toward bottom (CY=350, GH=560).
const WALL_DESK_POSITIONS = (() => {
  const entries = [
    { a: -60, r: 205 }, { a: -30, r: 240 }, { a:   0, r: 205 },
    { a:  30, r: 222 }, { a:  60, r: 180 }, { a:  90, r: 160 },
    { a: 120, r: 180 }, { a: 150, r: 222 }, { a: 180, r: 205 },
    { a: 210, r: 240 }, { a: 240, r: 205 }, { a: -90, r: 243 },
  ];
  return entries.map(({ a, r }) => {
    const rad = a * Math.PI / 180;
    return { x: Math.round(CX + r * Math.cos(rad)), y: Math.round(CY + r * Math.sin(rad)) };
  });
})();

function getStation(idx) {
  if (idx < NUM_DESKS) return stations[idx];
  const wp = WALL_DESK_POSITIONS[(idx - NUM_DESKS) % WALL_DESK_POSITIONS.length];
  const deskX = wp.x, deskY = wp.y;
  const angle = Math.atan2(deskY - CY, deskX - CX);  // outward from center
  const dirX = Math.cos(angle), dirY = Math.sin(angle);
  const perpAngle = Math.atan2(dirX, -dirY);
  const labelAngle = perpAngle > Math.PI / 2 ? perpAngle - Math.PI :
                     perpAngle < -Math.PI / 2 ? perpAngle + Math.PI : perpAngle;
  return {
    id: idx, angle, dirX, dirY,
    deskX, deskY,
    chairX: deskX - dirX * 34,
    chairY: deskY - dirY * 34,
    labelX: deskX + dirX * 16,
    labelY: deskY + dirY * 16,
    labelAngleDeg: labelAngle * 180 / Math.PI,
  };
}

function spawnPenguin(agentKey, agentType, provider, sessionId) {
  if (penguinMap[agentKey]) return;
  
  let stationIdx;
  if (freeStations.length > 0) {
    stationIdx = freeStations.shift();
  } else {
    stationIdx = Object.keys(penguinMap).length + freeStations.length;
  }

  const st = getStation(stationIdx);
  const c = agentColor(agentType);
  const phase = Object.keys(penguinMap).length * (Math.PI * 2 / 6);

  const group = makePenguin(st.chairX, st.chairY, st.angle, c.fg, phase, provider, agentType);
  group.userData.agentKey  = agentKey;
  group.userData.agentType = agentType;
  group.userData.stationId = stationIdx;
  group.userData.idleState = 'working';
  group.userData.idleTimer = 8 + Math.random() * 4;
  group.userData.idlePhase = 0;
  scene.add(group);

  // Point light for this station
  const pl = new THREE.PointLight(parseInt(c.fg.replace('#',''), 16), .8, 140);
  pl.position.set(st.deskX, st.deskY, 30);
  scene.add(pl);

  // Label
  const el = document.createElement('div');
  el.className = 'role-label';
  el.textContent = (provider === 'gemini-scout' || agentType === 'gemini-scout' ? '[GM] ' : '') + agentType;
  el.style.color = c.fg;
  el.style.borderColor = c.fg + '40';
  labelsDiv.appendChild(el);
  labelEls.push({el, agentKey});

  stationColorMap[stationIdx] = c.fg;
  bgDirty = true;

  penguinMap[agentKey] = { group, stationIdx, labelEl: el, pointLight: pl, spawnedAt: Date.now(), sessionId };
}

const MIN_ALIVE_MS = 30_000; // 30 seconds minimum visibility

function despawnPenguin(agentKey) {
  const entry = penguinMap[agentKey];
  if (!entry) return;

  if (entry.spawnedAt && Date.now() - entry.spawnedAt < MIN_ALIVE_MS) {
    const remaining = MIN_ALIVE_MS - (Date.now() - entry.spawnedAt);
    setTimeout(() => despawnPenguin(agentKey), remaining + 100);
    return;
  }

  disposeMesh(entry.group);
  scene.remove(entry.group);
  if (entry.pointLight) scene.remove(entry.pointLight);
  entry.labelEl.remove();

  freeStations.push(entry.stationIdx);
  freeStations.sort((a, b) => a - b);

  delete stationColorMap[entry.stationIdx];
  delete stationScrollOffset[entry.stationIdx];
  bgDirty = true;

  labelEls = labelEls.filter(item => item.agentKey !== agentKey);
  delete penguinMap[agentKey];
}

// ═══════════════════════════════════════════════════════════
//  APPLY STATE
// ═══════════════════════════════════════════════════════════
function applyState(newState) {
  // Genies: 1 per session
  const newSessionKeys = new Set((newState.sessions || []).map(s => s.session_id));
  for (const key of Object.keys(genieMap)) {
    if (!newSessionKeys.has(key)) despawnGenie(key);
  }
  for (const session of (newState.sessions || [])) {
    spawnGenie(session.session_id, session);
    if (genieMap[session.session_id]) {
      genieMap[session.session_id].activeAgents = session.active_agents || [];
      genieMap[session.session_id].sessionData  = session;
    }
  }

  // Penguins: 1 per active subagent
  const newPenguinKeys = new Set((newState.active_penguins || []).map(p => p.key));
  for (const key of Object.keys(penguinMap)) {
    if (!newPenguinKeys.has(key)) despawnPenguin(key);
  }
  for (const penguin of (newState.active_penguins || [])) {
    if (!penguinMap[penguin.key]) spawnPenguin(penguin.key, penguin.agent_type || 'general-purpose', penguin.provider, penguin.session_id);
  }

  // Track first active session started_at
  const active = (newState.sessions || []).find(s => s.status === 'active');
  firstSessionStartedAt = active ? active.started_at : null;

  currentState = newState;
  renderSessions(currentState);
  renderKanban();
  renderMetrics();
}

// ═══════════════════════════════════════════════════════════
//  KANBAN
// ═══════════════════════════════════════════════════════════
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function renderKanban() {
  const todo = [];
  const wip = [];
  const done = [];

  for (const sess of currentState.sessions) {
    for (const ag of (sess.active_agents || [])) wip.push(ag);
    for (const ag of (sess.completed_agents || [])) done.push(ag);
  }

  function cardHTML(ag, cls) {
    const t = ag.started_at ? new Date(ag.started_at * 1000).toTimeString().slice(0, 8) : '';
    const desc = esc((ag.description || '').slice(0, 48));
    const type = esc(ag.agent_type || 'agent');
    return `<div class="kb-card ${cls}" title="${desc}">
      <div class="kb-card-type">${type}</div>
      ${desc ? `<div class="kb-card-desc">${desc}</div>` : ''}
      <div class="kb-card-time">${t}</div>
    </div>`;
  }

  const empty = (msg) => `<div style="color:var(--dim2);font-size:9px;padding:4px 2px;text-align:center">${msg}</div>`;

  const todoEl = document.getElementById('kb-todo');
  const wipEl  = document.getElementById('kb-wip');
  const doneEl = document.getElementById('kb-done');
  if (!todoEl || !wipEl || !doneEl) return;

  todoEl.innerHTML = todo.length ? todo.map(ag => cardHTML(ag, 'todo')).join('') : empty('—');
  wipEl.innerHTML  = wip.length  ? wip.map(ag => cardHTML(ag, 'wip')).join('')  : empty('Idle');
  doneEl.innerHTML = done.length ? done.slice().reverse().slice(0,8).map(ag => cardHTML(ag,'done')).join('') : empty('—');

  // Update counts
  const tc = document.getElementById('kb-todo-count');
  const wc = document.getElementById('kb-wip-count');
  const dc = document.getElementById('kb-done-count');
  if (tc) tc.textContent = todo.length;
  if (wc) wc.textContent = wip.length;
  if (dc) dc.textContent = Math.min(done.length, 8);
}

function toggleKanban() {
  const panel = document.getElementById('kanban-panel');
  if (panel) panel.classList.toggle('collapsed');
}

function renderSessions(state) {
  const container = document.getElementById('sessionsContainer');
  const countEl   = document.getElementById('sessionCount');

  countEl.textContent = Object.keys(genieMap).length + ' active';

  if (state.sessions.length === 0) {
    container.innerHTML = '<div class="empty-strip">Waiting for sessions...</div>';
    return;
  }

  container.innerHTML = state.sessions.map(session => {
    const cwdShort = esc(session.cwd.replace(/^.*[/\\]/, '') || session.cwd);
    const badgeCls = (session.session_type === 'vscode') ? '' : 'cli';
    const badgeLabel = session.session_type || 'cli';
    const dotCls = (session.status === 'active') ? '' : 'idle';

    const agents = session.active_agents || [];
    const nowSec = Date.now() / 1000;
    const agentTiles = agents.map(agent => {
      const c = agentColor(agent.agent_type);
      const initial = (agent.agent_type || '?')[0].toUpperCase();
      const desc = esc(agent.description || agent.agent_type);
      // status: WORKING < 540s, IDLE 540-600s (TTL approaching, despawn soon)
      const ageSec = agent.started_at ? (nowSec - agent.started_at) : 0;
      const statusCls = ageSec >= 540 ? 'st-idle' : 'st-working';
      const statusLabel = ageSec >= 540 ? 'idle' : 'working';
      return `<div class="agent-tile at-working">
        <div class="agent-avatar" style="background:${c.bg};color:${c.fg}">${initial}</div>
        <div class="agent-info">
          <div class="agent-name">${esc(agent.agent_type)}</div>
          <div class="agent-task">${desc}</div>
        </div>
        <span class="agent-status ${statusCls}">${statusLabel}</span>
      </div>`;
    }).join('');

    return `<div class="session-section">
      <div class="session-header">
        <span class="session-dot ${dotCls}"></span>
        <span class="session-cwd" title="${esc(session.cwd)}">${cwdShort}</span>
        <span class="session-badge ${badgeCls}">${badgeLabel}</span>
      </div>
      <div class="session-agents">${agentTiles}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
//  RENDER TIMELINE — Variant B (polish + smart compact)
// ═══════════════════════════════════════════════════════════

let tlCurrentFilter = 'all';
const tlExpandedGroups = new Set();

// Stable hash of session_id → HSL color (10 distinct hues)
function tlSidColor(sid) {
  if (!sid) return '#475569';
  const PALETTE = [
    '#60a5fa','#34d399','#f472b6','#fbbf24','#a78bfa',
    '#22d3ee','#f87171','#4ade80','#fb923c','#c084fc',
    '#38bdf8','#86efac'
  ];
  let h = 0;
  for (let i = 0; i < sid.length; i++) h = (h * 31 + sid.charCodeAt(i)) >>> 0;
  return PALETTE[h % PALETTE.length];
}

// Render session chip: colored dot + 8 chars of session_id
function tlSidChip(sid) {
  if (!sid) return '';
  const col = tlSidColor(sid);
  const short = esc(sid.slice(0, 8));
  return `<span class="tl-sid"><span class="tl-sid-dot" style="background:${col};box-shadow:0 0 6px ${col}"></span>${short}</span>`;
}

// Icon for badge based on event type
function tlIcon(e) {
  let ch;
  if (e.is_agent && e.phase === 'start') ch = '🤖';
  else if (e.event === 'Stop' || e.phase === 'session_end') ch = '■';
  else if (e.phase === 'end' || e.event === 'PostToolUse') ch = '✓';
  else {
    const t = e.tool || '';
    if (t === 'Bash') ch = '⚡';
    else if (t === 'ToolSearch') ch = '🛠';
    else if (['Read','Edit','Write','Glob','Grep'].includes(t)) ch = '📄';
    else ch = '▶';
  }
  return `<span style="font-size:14px;line-height:1">${ch}</span>`;
}

// Render badge: plain tool or MCP breakdown
function tlBadgeHtml(e, durMs) {
  const tool = e.tool || '';
  const icon = tlIcon(e);
  const durHtml = durMs != null ? `<span class="tl-sep">·</span><span class="tl-dur">${fmtDur(durMs)}</span>` : '';

  if (tool.startsWith('MCP_') || tool.startsWith('mcp__')) {
    // Normalize: mcp__blotato__method or MCP_BLOTATO_METHOD
    let parts;
    if (tool.startsWith('mcp__')) {
      parts = tool.split('__'); // ['mcp', 'svc', 'method']
    } else {
      // MCP_SVC_SVC_METHOD → split by _, first=mcp, second=svc, rest=method (dedup adjacent)
      const raw = tool.split('_');
      raw.shift(); // remove 'MCP'
      // dedup consecutive identical segments
      const deduped = raw.filter((v, i) => i === 0 || v.toLowerCase() !== raw[i-1].toLowerCase());
      const svc = deduped[0] || '';
      const method = deduped.slice(1).join('_');
      parts = ['mcp', svc, method];
    }
    const svc = (parts[1] || '').toLowerCase();
    const method = parts.slice(2).join('_').toLowerCase();
    return `<span class="tl-mcp-chain">
      <span class="tl-mcp-chip chip-mcp">${icon} mcp</span>
      <span class="tl-mcp-sep">·</span>
      ${svc ? `<span class="tl-mcp-chip chip-svc">${esc(svc)}</span><span class="tl-mcp-sep">·</span>` : ''}
      ${method ? `<span class="tl-mcp-chip chip-method">${esc(method)}</span>` : ''}
    </span>${durHtml}`;
  }

  let cls = 'tb-tool';
  let label = tool || e.event || 'event';
  if (e.is_agent && e.phase === 'start') { cls = 'tb-spawn'; label = e.agent_type || 'agent'; }
  else if (e.event === 'Stop' || e.phase === 'session_end') { cls = 'tb-done'; label = 'stop'; }
  else if (e.exit_code && e.exit_code !== 0)               { cls = 'tb-error'; label = tool || 'error'; }
  else if (e.event === 'PostToolUse' || e.phase === 'end') { cls = 'tb-done'; label = tool || 'done'; }
  else if (tool === 'Agent') { cls = 'tb-flow'; label = 'agent'; }

  return `<span class="tl-badge ${cls}">${icon} ${esc(label)}</span>${durHtml}`;
}

function fmtDur(ms) {
  if (ms == null) return '';
  if (ms < 1000) return ms + 'ms';
  return (ms / 1000).toFixed(1) + 's';
}

// Filter predicate
function tlMatchesFilter(e) {
  if (tlCurrentFilter === 'all') return true;
  const t = e.tool || '';
  if (tlCurrentFilter === 'tools') return !!(t && t !== 'Agent' && t !== 'ToolSearch' && !t.startsWith('mcp__') && !t.startsWith('MCP_'));
  if (tlCurrentFilter === 'agents') return !!(e.is_agent || t === 'Agent');
  if (tlCurrentFilter === 'mcp') return !!(t.startsWith('mcp__') || t.startsWith('MCP_'));
  if (tlCurrentFilter === 'errors') return !!(e.exit_code && e.exit_code !== 0) || !!(e.error);
  return true;
}

// Build pair key for matching start→end
function pairKey(e) {
  const parts = [e.session_id || '', e.tool || ''];
  if (e.is_agent) parts.push(e.agent_type || '', e.description || '');
  return parts.join('|');
}

// Phase 1: pair start→end events
function tlPairEvents(events) {
  const paired = [];
  const startMap = {}; // key → [{event, idx}] FIFO queue

  for (let i = 0; i < events.length; i++) {
    const e = events[i];
    const key = pairKey(e);
    const isStart = e.phase === 'start' || e.event === 'PreToolUse';
    const isEnd   = e.phase === 'end'   || e.event === 'PostToolUse';

    if (isStart) {
      // Push to FIFO queue — supports parallel same-tool calls in one session
      if (!startMap[key]) startMap[key] = [];
      startMap[key].push({ event: e, idx: i });
    } else if (isEnd && startMap[key] && startMap[key].length) {
      const startEntry = startMap[key].shift();   // FIFO
      const startTs = startEntry.event.ts || 0;
      const endTs   = e.ts || 0;
      const gap = endTs - startTs;
      // Accept pair if gap ≤ 60s (gap always >= 0 with ASC array)
      if (gap <= 60) {
        paired.push({ type: 'pair', start: startEntry.event, end: e, durMs: Math.round(gap * 1000) });
        if (startMap[key].length === 0) delete startMap[key];
      } else {
        // Gap too large — emit orphan start and this as standalone end
        paired.push({ type: 'orphan-start', event: startEntry.event });
        paired.push({ type: 'single', event: e });
        if (startMap[key].length === 0) delete startMap[key];
      }
    } else {
      // Non-start, non-end, or end without matching start
      paired.push({ type: 'single', event: e });
    }
  }

  // Flush remaining open starts as in-progress
  for (const key in startMap) {
    for (const entry of startMap[key]) {
      paired.push({ type: 'in-progress', event: entry.event });
    }
  }

  return paired;
}

// Phase 2: group consecutive same-tool items
function tlGroupItems(items) {
  const grouped = [];
  let i = 0;
  while (i < items.length) {
    const cur = items[i];
    // Only group pair/in-progress/single that have a tool
    const curTool = (cur.start || cur.event || {}).tool;
    const curSid  = (cur.start || cur.event || {}).session_id;
    if (!curTool || !curSid) { grouped.push(cur); i++; continue; }

    // Scan forward for consecutive matching items
    let j = i + 1;
    while (j < items.length) {
      const nx = items[j];
      const nxTool = (nx.start || nx.event || {}).tool;
      const nxSid  = (nx.start || nx.event || {}).session_id;
      if (nxTool === curTool && nxSid === curSid) j++;
      else break;
    }

    if (j - i >= 2) {
      // Group i..j-1
      grouped.push({ type: 'group', items: items.slice(i, j), tool: curTool, sid: curSid });
      i = j;
    } else {
      grouped.push(cur);
      i++;
    }
  }
  return grouped;
}

// Render a single tl-item (pair, orphan-start, in-progress, single)
function renderTlItem(item, indent) {
  const e = item.start || item.event;
  if (!e) return '';
  const timeStr = e.time || (e.ts ? new Date(e.ts * 1000).toTimeString().slice(0, 8) : '--:--');
  const detail = e.detail || e.description || '';
  const durMs = item.durMs != null ? item.durMs : null;
  const inProgress = item.type === 'in-progress' || item.type === 'orphan-start';
  const cls = `tl-item${inProgress ? ' in-progress' : ''}`;

  return `<div class="${cls}"${indent ? ' style="margin-left:12px"' : ''}>
    <div class="tl-row1">
      <span class="tl-time">${esc(timeStr)}</span>
      <span class="tl-sep">·</span>
      ${tlBadgeHtml(e, durMs)}
      <span class="tl-sep">·</span>
      ${tlSidChip(e.session_id)}
    </div>
    ${detail ? `<div class="tl-detail" title="${esc(detail)}">${esc(detail)}</div>` : ''}
  </div>`;
}

function renderTimeline() {
  const body = document.getElementById('timelineBody');

  // Apply filter — sort ASC before pairing so start always precedes end
  const raw = allEvents.slice(-50)
    .sort((a, b) => (a.ts || 0) - (b.ts || 0))   // ASC for pairing
    .filter(tlMatchesFilter);

  if (raw.length === 0) {
    body.innerHTML = allEvents.length === 0
      ? '<div class="tl-empty">Нет событий</div>'
      : '<div class="tl-empty">Нет событий по фильтру</div>';
    return;
  }

  // Phase 1: pair start→end
  const paired = tlPairEvents(raw);

  // Phase 2: group consecutive same-tool
  const grouped = tlGroupItems(paired);

  // Phase 3: render with sticky time-headers (per minute) — merge same-minute items, sort DESC
  const fragments = [];
  const bucketMap = new Map(); // unix-minute (number) → { label: "HH:MM", items[] }
  for (const item of grouped) {
    const e = item.start || item.event || (item.items && item.items[0] && (item.items[0].start || item.items[0].event));
    if (!e) continue;
    const ts = e.ts ? new Date(e.ts * 1000) : null;
    const minuteKey = e.ts ? Math.floor(e.ts / 60) : 0;
    const minuteLabel = ts ? ts.toTimeString().slice(0, 5) : '--:--';
    if (!bucketMap.has(minuteKey)) bucketMap.set(minuteKey, { label: minuteLabel, items: [] });
    bucketMap.get(minuteKey).items.push(item);
  }
  const buckets = [...bucketMap.entries()]
    .sort((a, b) => b[0] - a[0])   // numeric DESC — correct across midnight
    .map(([_, v]) => ({ minute: v.label, items: v.items }));

  for (const bucket of buckets) {
    const count = bucket.items.reduce((acc, item) => acc + (item.type === 'group' ? item.items.length : 1), 0);
    fragments.push(`<div class="tl-time-header">${esc(bucket.minute)} · ${count} event${count !== 1 ? 's' : ''}</div>`);

    for (const item of bucket.items) {
      if (item.type === 'group') {
        const gKey = item.sid + '|' + item.tool;
        const isExpanded = tlExpandedGroups.has(gKey);
        const firstE = item.items[0].start || item.items[0].event;
        const lastE = item.items[item.items.length - 1].start || item.items[item.items.length - 1].event;
        const t1 = firstE && firstE.time ? firstE.time : (firstE && firstE.ts ? new Date(firstE.ts*1000).toTimeString().slice(0,8) : '');
        const t2 = lastE  && lastE.time  ? lastE.time  : (lastE  && lastE.ts  ? new Date(lastE.ts*1000).toTimeString().slice(0,8)  : '');
        const icon = tlIcon(firstE || {});
        const badgeCls = (firstE && firstE.is_agent && firstE.phase === 'start') ? 'tb-spawn' : 'tb-tool';
        const toolLabel = esc(item.tool);

        const innerHtml = isExpanded
          ? item.items.map(sub => renderTlItem(sub, true)).join('')
          : '';

        const rangeTitle = (t2 && t2 !== t1) ? `${t1} → ${t2}` : t1;
        fragments.push(`<div class="tl-group${isExpanded ? ' expanded' : ''}" data-gkey="${esc(gKey)}" title="${esc(rangeTitle)}">
          <div class="tl-group-summary">
            <span class="tl-time">${esc(t1)}</span>
            <span class="tl-sep">·</span>
            <span class="tl-badge ${badgeCls}">${icon} ${toolLabel}</span>
            <span class="tl-group-count">×${item.items.length}</span>
            ${tlSidChip(item.sid)}
            <span class="tl-group-toggle">▾</span>
          </div>
          <div class="tl-group-body">${innerHtml}</div>
        </div>`);
      } else {
        fragments.push(renderTlItem(item, false));
      }
    }
  }

  body.innerHTML = fragments.join('');

  // Attach group toggle listeners
  body.querySelectorAll('.tl-group').forEach(el => {
    el.addEventListener('click', function(ev) {
      // Don't bubble from inner items
      if (ev.target.closest('.tl-item')) return;
      const key = this.dataset.gkey;
      if (tlExpandedGroups.has(key)) tlExpandedGroups.delete(key);
      else tlExpandedGroups.add(key);
      renderTimeline();
    });
  });
}

// Filter chips event delegation
(function() {
  function initTlFilters() {
    const container = document.getElementById('tlFilters');
    if (!container) return;
    container.addEventListener('click', function(e) {
      const chip = e.target.closest('.tl-filter-chip');
      if (!chip) return;
      const filter = chip.dataset.filter;
      if (filter === tlCurrentFilter) return;
      tlCurrentFilter = filter;
      container.querySelectorAll('.tl-filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      renderTimeline();
    });
  }
  // Init after DOM ready
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initTlFilters);
  else initTlFilters();
})();

// ═══════════════════════════════════════════════════════════
//  RENDER METRICS
// ═══════════════════════════════════════════════════════════
function renderMetrics() {
  // Active Agents = реальное число активных субагентов (пингвинов), не сессий
  const agentsCount = (currentState.active_penguins && currentState.active_penguins.length) || 0;
  document.getElementById('metricAgents').textContent = agentsCount;
  document.getElementById('metricEvents').textContent = allEvents.length;

  if (firstSessionStartedAt) {
    const elapsed = Math.floor(Date.now() / 1000 - firstSessionStartedAt);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    let t;
    if (h > 0)      t = h + 'h ' + m + 'm';
    else if (m > 0) t = m + 'm ' + s + 's';
    else            t = s + 's';
    document.getElementById('metricTime').textContent = t;
  } else {
    document.getElementById('metricTime').textContent = '--';
  }
}

// ═══════════════════════════════════════════════════════════
//  API POLLING
// ═══════════════════════════════════════════════════════════
let lastEventTs = 0;
let isFetchingState = false;
let isFetchingEvents = false;

async function fetchState() {
  if (isFetchingState) return;
  isFetchingState = true;
  try {
    const res = await fetch('/api/state');
    if (!res.ok) return;
    const data = await res.json();
    applyState(data);
  } catch (_) {} finally {
    isFetchingState = false;
  }
}

async function fetchEvents() {
  if (isFetchingEvents) return;
  isFetchingEvents = true;
  try {
    const res = await fetch('/api/events?since=' + lastEventTs + '&limit=50');
    if (!res.ok) return;
    const events = await res.json(); // newest-first from API
    if (events.length > 0) {
      // Reverse to chronological order before appending
      const ordered = events.slice().reverse();
      for (const ev of ordered) {
        allEvents.push(ev);
        if (ev.ts > lastEventTs) lastEventTs = ev.ts;
      }
      if (allEvents.length > 1000) allEvents = allEvents.slice(-1000);
      renderTimeline();
      renderMetrics();
    }
  } catch (_) {} finally {
    isFetchingEvents = false;
  }
}

function updateHUD() {
  framesSinceFPS++;
  const now = performance.now();
  if (now - lastFPSTime >= 500) {
    const fps = Math.round(framesSinceFPS / ((now - lastFPSTime) / 1000));
    fpsEl.textContent = fps + ' fps';
    framesSinceFPS = 0; lastFPSTime = now;
  }
  const d = new Date();
  clockEl.textContent = d.toTimeString().slice(0, 8);
}

function drawGenieOrbitCards(g) {
  const ORBIT_R = 88;
  // Decorative pill: small; agent card: slightly wider for description
  const PILL_W = 56, PILL_H = 14;
  const AGENT_W = 80, AGENT_H = 16;

  // Decorative color: amber-lime; agent color: bright lime
  const DECO_BORDER  = 'rgba(251,191,36,0.55)';
  const DECO_BG      = 'rgba(10,12,8,0.70)';
  const DECO_DOT     = '#f59e0b';
  const DECO_TEXT    = 'rgba(251,191,36,0.85)';
  const AGENT_BORDER = 'rgba(74,222,128,0.80)';
  const AGENT_BG     = 'rgba(4,12,8,0.90)';
  const AGENT_DOT    = '#4ade80';
  const AGENT_TEXT   = '#86efac';

  for (const [sid, ge] of Object.entries(genieMap)) {
    const agents = ge.activeAgents || [];
    const hasAgents = agents.length > 0;

    // Project name: use cwd basename, fallback to 'workspace'
    const cwdParts = (ge.sessionData?.cwd || '').split(/[\\/]/).filter(Boolean);
    let projectName = cwdParts.pop() || 'workspace';
    if (projectName.toLowerCase() === 'vs + claude projects') projectName = 'workspace';
    if (projectName.length > 14) projectName = projectName.slice(0, 13) + '…';

    const items = hasAgents
      ? agents.slice(0, 4).map(ag => {
          const type = (ag.agent_type || 'agent').replace(/-/g, ' ');
          const desc = ag.description || '';
          return { text: desc ? `${type}: ${desc}` : type, scrolling: desc.length > 8, agentType: ag.agent_type || ag.type || 'general-purpose' };
        })
      : [{ text: projectName, scrolling: false, agentType: null }];

    const CARD_W = hasAgents ? AGENT_W : PILL_W;
    const CARD_H = hasAgents ? AGENT_H : PILL_H;
    const border = hasAgents ? AGENT_BORDER : DECO_BORDER;
    const bg     = hasAgents ? AGENT_BG     : DECO_BG;
    const dot    = hasAgents ? AGENT_DOT    : DECO_DOT;
    const textC  = hasAgents ? AGENT_TEXT   : DECO_TEXT;
    const glowC  = hasAgents ? '74,222,128' : '251,191,36';

    const pos = GENIE_SLOTS[ge.slotIdx];
    const angles = genieOrbitAngles[sid] || [];

    // Orbit ring
    g.save();
    g.strokeStyle = hasAgents ? 'rgba(74,222,128,0.20)' : 'rgba(251,191,36,0.12)';
    g.lineWidth = 0.8;
    g.setLineDash([2, 8]);
    g.beginPath();
    g.arc(pos.x, pos.y, ORBIT_R, 0, Math.PI * 2);
    g.stroke();
    g.setLineDash([]);
    g.restore();

    if (!ge.cardScrollOffset) ge.cardScrollOffset = {};

    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const itemFg = item.agentType ? agentColor(item.agentType).fg : null;
      const itemBorder = itemFg ? itemFg + '40' : border;
      const itemText = itemFg || textC;
      const itemDot = itemFg || dot;
      const angle = angles[i] !== undefined ? angles[i] : (i * Math.PI * 2 / items.length);
      const cx = pos.x + Math.cos(angle) * ORBIT_R;
      const cy = pos.y + Math.sin(angle) * ORBIT_R;

      // Connector line
      g.save();
      g.beginPath();
      const dx = pos.x - cx, dy = pos.y - cy;
      const len = Math.sqrt(dx*dx + dy*dy);
      g.moveTo(cx, cy);
      g.lineTo(cx + dx * (len - 18) / len, cy + dy * (len - 18) / len);
      g.strokeStyle = hasAgents ? 'rgba(74,222,128,0.15)' : 'rgba(251,191,36,0.10)';
      g.lineWidth = 0.6;
      g.stroke();
      g.restore();

      // Glow halo
      const gw = g.createRadialGradient(cx, cy, 0, cx, cy, 36);
      gw.addColorStop(0, `rgba(${glowC},${hasAgents ? 0.16 : 0.08})`);
      gw.addColorStop(1, 'rgba(0,0,0,0)');
      g.fillStyle = gw;
      g.fillRect(cx - 36, cy - 36, 72, 72);

      // Pill / card body
      g.save();
      g.translate(cx - CARD_W / 2, cy - CARD_H / 2);

      g.beginPath();
      rrPath(g, 0, 0, CARD_W, CARD_H, CARD_H / 2);
      g.fillStyle = bg;
      g.fill();
      g.strokeStyle = itemBorder;
      g.lineWidth = 0.9;
      g.stroke();

      // Dot indicator (left side)
      g.fillStyle = itemDot;
      g.beginPath();
      g.arc(7, CARD_H / 2, 2.5, 0, Math.PI * 2);
      g.fill();

      // Text (scrolling for long agent descriptions, static for project name)
      g.save();
      g.beginPath();
      rrPath(g, 12, 2, CARD_W - 16, CARD_H - 4, (CARD_H - 4) / 2);
      g.clip();

      if (ge.cardScrollOffset[i] === undefined) ge.cardScrollOffset[i] = i * 18;

      g.font = `bold 7px 'SF Mono', monospace`;
      const textW = g.measureText(item.text).width;
      const fits = textW <= (CARD_W - 18);

      let tx;
      if (fits || !item.scrolling) {
        tx = 12; // static left-aligned (short text or deco)
      } else {
        ge.cardScrollOffset[i] += 0.5;
        tx = 12 - (ge.cardScrollOffset[i] % (textW + 30));
      }

      g.fillStyle = itemText;
      g.fillText(item.text, tx, CARD_H - 4);
      g.restore();

      g.restore();
    }
  }
}

function animate3D() {
  const t = tSec * 1.08;
  for (const entry of Object.values(penguinMap)) {
    const p = entry.group;
    const ph = p.userData.phase || 0;

    // Body bounce — strong
    p.position.z = Math.sin(t * 1.4 + ph) * 9;
    // Lean forward/back — vigorous typing
    p.rotation.x = -0.14 + Math.sin(t * 1.8 + ph) * 0.13;
    // Side sway
    p.rotation.y = Math.sin(t * 1.0 + ph + 1.2) * 0.09;

    // Head nod — active
    if (p.userData.head) {
      p.userData.head.rotation.x = Math.sin(t * 4.0 + ph) * 0.32;
      p.userData.head.rotation.z = Math.sin(t * 1.8 + ph + 0.8) * 0.12;
    }

    // Flippers — alternating key presses from resting position
    if (p.userData.flippers) {
      for (const flipData of p.userData.flippers) {
        const {mesh, side, basePosZ, baseRotX} = flipData;
        const stroke = Math.sin(t * 7.0 + ph + side * Math.PI * 0.5);
        const press = Math.max(0, stroke);
        const lift  = Math.max(0, -stroke);
        // Press key down (z-), lift up between strokes (z+)
        mesh.position.z = basePosZ - press * 3.5 + lift * 2.5;
        mesh.rotation.x = baseRotX + press * 0.30 - lift * 0.20;
        mesh.rotation.z = side * (0.20 + press * 0.10);
      }
    }

    // Feet tap — stomping rhythm
    if (p.userData.feet) {
      for (const footData of p.userData.feet) {
        const {mesh, side, baseZ} = footData;
        const tap = Math.sin(t * 5.5 + ph + side * Math.PI * 0.5 + Math.PI);
        mesh.position.z = baseZ + Math.max(0, tap) * 6;
      }
    }

    // Idle animations (blinking, yawning, stretching)
    const ud = p.userData;
    if (ud.idleState !== undefined) {
      const aliveSec = (Date.now() - (entry.spawnedAt || Date.now())) / 1000;

      // Countdown to next idle trigger
      if (ud.idleTimer > 0) {
        ud.idleTimer -= 1/60;
      }

      // Start a new idle animation when timer fires
      if (ud.idleTimer <= 0 && ud.idleState === 'working') {
        if (aliveSec > 60) {
          const r = Math.random();
          ud.idleState = r < 0.4 ? 'stretching' : r < 0.7 ? 'yawning' : 'blinking';
        } else if (aliveSec > 30) {
          ud.idleState = Math.random() < 0.5 ? 'yawning' : 'blinking';
        } else if (aliveSec > 10) {
          ud.idleState = 'blinking';
        } else {
          ud.idleTimer = 6 + Math.random() * 8;
        }
        if (ud.idleState !== 'working') ud.idlePhase = 0;
      }

      // Run active idle animation
      if (ud.idleState !== 'working') {
        ud.idlePhase += 1/60;
        const ip = ud.idlePhase;

        // Eye scale for blinking/yawning
        // phase 0..0.15 = close, 0.15..0.45 = closed, 0.45..0.6 = open
        if (ud.eyeParts) {
          let eyeScaleY = 1;
          if (ud.idleState === 'blinking') {
            if (ip < 0.15) eyeScaleY = 1 - ip/0.15;
            else if (ip < 0.45) eyeScaleY = 0.05;
            else if (ip < 0.6) eyeScaleY = 0.05 + (ip-0.45)/0.15 * 0.95;
          } else if (ud.idleState === 'yawning') {
            // Eyes half-closed throughout yawn (0..1.2s)
            if (ip < 0.2) eyeScaleY = 1 - ip/0.2 * 0.6;
            else if (ip < 1.0) eyeScaleY = 0.4;
            else if (ip < 1.2) eyeScaleY = 0.4 + (ip-1.0)/0.2 * 0.6;
          }
          for (const ep of ud.eyeParts) {
            ep.eyeMesh.scale.y = eyeScaleY;
            ep.pupMesh.scale.y = eyeScaleY;
            ep.glintMesh.scale.y = eyeScaleY;
          }
        }

        // Beak for yawning: rotate open and back
        if (ud.beak) {
          let beakExtra = 0;
          if (ud.idleState === 'yawning') {
            // open beak: rotate x more negative (opens down), peak at ip=0.6
            const openAmt = Math.sin(Math.min(ip / 1.0, 1) * Math.PI) * 0.55;
            beakExtra = openAmt;
          }
          ud.beak.rotation.x = ud.beakBaseRotX - beakExtra;
          ud.beak.position.z = ud.beakBasePosZ - beakExtra * 1.5;
        }

        // Stretching: raise flippers
        if (ud.idleState === 'stretching' && ud.flippers) {
          const liftAmt = Math.sin(Math.min(ip / 1.5, 1) * Math.PI) * 1.1;
          for (const fb of ud.flippers) {
            fb.mesh.rotation.z = fb.baseRotZ - liftAmt * fb.side;
            fb.mesh.rotation.x = fb.baseRotX - liftAmt * 0.6;
          }
        }

        // End of animation: reset and schedule next
        if (ip >= 1.5) {
          ud.idleState = 'working';
          ud.idleTimer = 6 + Math.random() * 8;
          // Reset eyes
          if (ud.eyeParts) {
            for (const ep of ud.eyeParts) {
              ep.eyeMesh.scale.y = 1;
              ep.pupMesh.scale.y = 1;
              ep.glintMesh.scale.y = 1;
            }
          }
          // Reset beak
          if (ud.beak) {
            ud.beak.rotation.x = ud.beakBaseRotX;
            ud.beak.position.z = ud.beakBasePosZ;
          }
          // Reset flippers
          if (ud.flippers) {
            for (const fb of ud.flippers) {
              fb.mesh.rotation.z = fb.baseRotZ;
              fb.mesh.rotation.x = fb.baseRotX;
            }
          }
        }
      }
    }
  }
  // Genies float + rotate + pulse — три уровня интенсивности
  const nowSec = Date.now() / 1000;
  for (const [sid, ge] of Object.entries(genieMap)) {
    const g = ge.group;

    if (g.userData.spawning) {
      g.userData.spawnProgress = Math.min(1, g.userData.spawnProgress + 0.04);
      const ease = 1 - Math.pow(1 - g.userData.spawnProgress, 3);
      const s = 0.01 + ease * 0.99;
      g.scale.set(s, s, s);
      if (g.userData.spawnProgress >= 1) g.userData.spawning = false;
      continue;
    }

    const agents = ge.activeAgents || [];
    const sd = ge.sessionData || {};
    const recentActivity = sd.last_event_ts && (nowSec - sd.last_event_ts) < 60;
    const hasSubAgents = agents.length > 0;
    const soloWIP = recentActivity && !hasSubAgents;

    let floatSpeed   = 0.72,  floatAmp  = 8.5;
    let floatYSpeed  = 0.48,  floatYAmp = 3.5;
    let rotSpeed     = 0.008;
    let pulseSpeed   = 1.8,   pulseAmp  = 0.14, pulseBase = 0.92;
    let emivBase     = 0.40,  emivAmp   = 0.22, emivSpeed = 2.2;
    let lightBase    = 1.2,   lightAmp  = 0.35, lightSpeed = 1.9;
    let orbScaleMult = 1.0;
    let orbEmivBoost = 0;

    if (soloWIP) {
      floatSpeed = 1.0; floatAmp = 11.0;
      rotSpeed = 0.013;
      pulseSpeed = 2.8; pulseAmp = 0.20;
      emivBase = 0.55; emivAmp = 0.28;
      lightBase = 1.8; lightAmp = 0.45;
    } else if (hasSubAgents) {
      floatSpeed = 1.55; floatAmp = 16.0;
      floatYSpeed = 0.90; floatYAmp = 5.0;
      rotSpeed = 0.022;
      pulseSpeed = 4.2; pulseAmp = 0.28; pulseBase = 1.0;
      emivBase = 0.72; emivAmp = 0.32; emivSpeed = 3.8;
      lightBase = 2.4; lightAmp = 0.60;
      orbScaleMult = 1.22;
      orbEmivBoost = 0.3;
    }

    g.position.z = Math.sin(t * floatSpeed + ge.slotIdx * 1.3) * floatAmp;
    g.position.y = g.userData.baseY + Math.sin(t * floatYSpeed) * floatYAmp;
    g.rotation.z = Math.sin(t * 0.7 + ge.slotIdx * 2.1) * 0.08;

    if (g.userData.orb) g.userData.orb.rotation.y = Math.sin(t * 0.5 + ge.slotIdx) * 0.15;

    const activePenguins = Object.values(penguinMap).filter(p => p.sessionId === sid).length;
    const targetScale = activePenguins > 0 ? 1.15 + Math.sin(t * 2.5) * 0.06 : 1.0;
    g.scale.x += (targetScale - g.scale.x) * 0.05;
    g.scale.y = g.scale.x;

    const pulse = pulseBase + Math.sin(t * pulseSpeed) * pulseAmp;
    if (g.userData.orb) {
      g.userData.orb.scale.setScalar(pulse * orbScaleMult);
      if (hasSubAgents) {
        g.userData.orb.material.emissiveIntensity = 0.35 + Math.sin(t * 3.5) * 0.25 + orbEmivBoost;
      }
    }
    if (g.userData.core) {
      g.userData.core.material.emissiveIntensity = emivBase + Math.sin(t * emivSpeed) * emivAmp;
    }
    const gl = g.children.find(c => c.isLight);
    if (gl) gl.intensity = lightBase + Math.sin(t * lightSpeed) * lightAmp;

    if (g.userData.tailSegs) {
      for (const ts of g.userData.tailSegs) {
        ts.mesh.position.x = ts.baseX + Math.sin(t * 0.9 + ge.slotIdx * 1.7 + ts.idx * 0.8) * g.userData.base * 0.08;
      }
    }

    const ud = g.userData;
    const prevBlinkState = ud.blinkState;
    ud.blinkTimer -= 1/60;
    if (ud.blinkState === 'open' && ud.blinkTimer <= 0) {
      ud.blinkState = 'closing';
      ud.blinkTimer = 0.07;
    } else if (ud.blinkState === 'closing' && ud.blinkTimer <= 0) {
      ud.blinkState = 'closed';
      ud.blinkTimer = 0.08;
    } else if (ud.blinkState === 'closed' && ud.blinkTimer <= 0) {
      ud.blinkState = 'opening';
      ud.blinkTimer = 0.07;
    } else if (ud.blinkState === 'opening' && ud.blinkTimer <= 0) {
      ud.blinkState = 'open';
      ud.blinkTimer = 3 + Math.random() * 4;
    }
    const needsRedraw = (ud.blinkState !== 'open') || (prevBlinkState !== ud.blinkState);
    if (needsRedraw && ud.ctx) {
      const ctx2 = ud.ctx;
      // Восстановить фон головы в области глаз/бровей/рта
      const hg = ctx2.createRadialGradient(120,108,4,128,115,38);
      hg.addColorStop(0,'#c5dff0');
      hg.addColorStop(1,'#5a96ba');
      ctx2.save();
      ctx2.beginPath(); ctx2.rect(85, 68, 145, 80); ctx2.clip();
      ctx2.beginPath(); ctx2.arc(128,115,38,0,Math.PI*2);
      ctx2.fillStyle = hg; ctx2.fill();
      ctx2.restore();
      // Перерисовать рот
      ctx2.beginPath(); ctx2.arc(128,128,14,0.2,Math.PI-0.2);
      ctx2.strokeStyle='#0d0d20'; ctx2.lineWidth=4; ctx2.lineCap='round'; ctx2.stroke();
      // Перерисовать глаза
      ud.drawEyes(ctx2, ud.blinkState !== 'open', false);
      ud.tex.needsUpdate = true;
    }


    if (g.userData.sparks) {
      const base = g.userData.base;
      g.userData.sparks.forEach(sp => {
        const angle = t * sp.speed + sp.phase;
        sp.mesh.position.set(
          Math.cos(angle) * sp.orbitR,
          Math.sin(angle) * sp.orbitR * 0.6,
          sp.orbitZ + Math.sin(t * 1.8 + sp.phase) * base * 0.3
        );
        sp.mesh.material.opacity = 0.6 + Math.sin(t * 3 + sp.phase) * 0.3;
      });
    }
  }
}

function loop(timestamp) {
  requestAnimationFrame(loop);
  if (!animStartTime) animStartTime = timestamp;
  tSec = (timestamp - animStartTime) / 1000;
  frame++;

  // Update space station animation state
  const t = performance.now();
  ledPhase       = t * 0.0008;
  diskAngle      = t * 0.0003;
  indicatorPhase = t * 0.002;
  floorShimmerT  = t * 0.001;
  holoRing.rotation  += holoRing.rotSpeed;
  holoRing.pulsePhase += holoRing.pulseSpeed;
  consolePulse.forEach(cp => { if (cp) cp.phase += cp.speed; });

  if (centralLamp) {
    const tl = Date.now() / 1000;
    if (centralLamp.userData.smoke) {
      centralLamp.userData.smoke.material.opacity = 0.4 + Math.sin(tl * 2.3) * 0.25;
      centralLamp.userData.smoke.scale.setScalar(1 + Math.sin(tl * 1.8) * 0.3);
    }
    if (centralLamp.userData.lampLight) {
      centralLamp.userData.lampLight.intensity = 1.2 + Math.sin(tl * 3.1) * 0.4;
    }
    centralLamp.rotation.z = Math.sin(tl * 0.4) * 0.04;
  }

  // Advance scroll offsets for WIP stations
  for (const entry of Object.values(penguinMap)) {
    const idx = entry.stationIdx;
    stationScrollOffset[idx] = (stationScrollOffset[idx] || 0) + 0.4;
  }

  // Advance genie orbit angles
  const now = Date.now() / 1000;
  for (const [sid, ge] of Object.entries(genieMap)) {
    const agents = ge.activeAgents || [];
    const count = Math.max(agents.length, 1);
    if (!genieOrbitAngles[sid]) {
      genieOrbitAngles[sid] = Array.from({length: count}, (_, i) => i * (Math.PI * 2 / count));
    }
    while (genieOrbitAngles[sid].length < count) {
      genieOrbitAngles[sid].push(Math.random() * Math.PI * 2);
    }
    genieOrbitAngles[sid].length = count;
    const speeds = [0.013, 0.010, 0.008, 0.011, 0.009];
    for (let i = 0; i < genieOrbitAngles[sid].length; i++) {
      genieOrbitAngles[sid][i] += speeds[i] || 0.010;
    }
  }

  draw2D();
  animate3D();
  renderer.render(scene, camera);
  updateLabels();
  updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════════════════════
(function tickClock() {
  const now = new Date(), p = n => String(n).padStart(2, '0');
  document.getElementById('tlClock').textContent = `${p(now.getHours())}:${p(now.getMinutes())}`;
  setTimeout(tickClock, 1000);
})();

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
resize();
loop();

let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { resize(); updateLabels(); }, 80);
});

// Initial render of empty state
renderSessions(currentState);
renderTimeline();
renderMetrics();

async function fetchRelease() {
  try {
    const r = await fetch('/api/release');
    const data = await r.json();
    if (data.ts) {
      const d = new Date(data.ts * 1000);
      const fmt = d.toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit'}) + ' ' +
                  d.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
      document.getElementById('release-time').textContent = fmt + (data.note ? ' — ' + data.note : '');
      document.getElementById('release-chip').style.display = 'flex';
    }
  } catch {}
}

// Polling: 10s balances Upstash free-tier (500k/mo) with live feel.
// Paused on hidden tabs via Page Visibility API to save quota.
const POLLING_INTERVAL_MS = 10000;
let pollStateTimer = null;
let pollEventsTimer = null;
function startPolling() {
  if (!pollStateTimer) pollStateTimer = setInterval(fetchState, POLLING_INTERVAL_MS);
  if (!pollEventsTimer) pollEventsTimer = setInterval(fetchEvents, POLLING_INTERVAL_MS);
}
function stopPolling() {
  if (pollStateTimer) { clearInterval(pollStateTimer); pollStateTimer = null; }
  if (pollEventsTimer) { clearInterval(pollEventsTimer); pollEventsTimer = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { stopPolling(); }
  else { fetchState(); fetchEvents(); startPolling(); }
});

// Start polling
fetchState();
fetchEvents();
fetchRelease();
startPolling();

// Mobile tab switching
(function() {
  const tabs = document.querySelectorAll('.mob-tab');
  const officeArea = document.getElementById('office-area');
  const timelinePanel = document.getElementById('timeline-panel');

  function switchTab(tabName) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
    if (tabName === 'workspace') {
      officeArea.classList.remove('tab-hidden');
      timelinePanel.classList.add('tab-hidden');
      setTimeout(() => window.dispatchEvent(new Event('resize')), 50);
    } else {
      officeArea.classList.add('tab-hidden');
      timelinePanel.classList.remove('tab-hidden');
    }
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
  });
  switchTab('workspace');
})();
