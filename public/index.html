<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070e;--glass:rgba(255,255,255,.04);--glassH:rgba(255,255,255,.07);
  --b:rgba(255,255,255,.08);--bH:rgba(255,255,255,.15);
  --text:#f1f5f9;--dim:#94a3b8;--dim2:#475569;
  --indigo:#818cf8;--purple:#a78bfa;--green:#34d399;
  --amber:#fbbf24;--red:#f87171;--blue:#60a5fa;--cyan:#22d3ee;
  --r:10px;--sans:-apple-system,'Inter','Segoe UI',sans-serif;
  --mono:'SF Mono','Cascadia Code','Consolas',monospace;
}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:var(--sans);font-size:13px;
}

/* ── Ambient blobs — behind everything ── */
.blob{position:fixed;border-radius:50%;pointer-events:none;filter:blur(90px);z-index:0}
.b1{width:600px;height:400px;background:rgba(99,102,241,.10);top:-10%;left:5%}
.b2{width:400px;height:350px;background:rgba(16,185,129,.07);bottom:-5%;right:5%}
.b3{width:280px;height:280px;background:rgba(139,92,246,.08);top:35%;left:38%}

/* ── Layout shell ── */
#shell{
  position:relative;z-index:1;
  width:100%;height:100%;
  display:flex;flex-direction:column;
}

/* ── Header ── */
header{
  flex-shrink:0;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  padding:0 24px;height:52px;
  background:rgba(7,7,14,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b);
  z-index:20;
}
.h-clock{
  font-family:var(--mono);font-size:22px;font-weight:700;
  letter-spacing:.06em;
  background:linear-gradient(135deg,var(--indigo),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;
}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:26px;height:26px;border-radius:6px;
  background:linear-gradient(135deg,var(--indigo),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;flex-shrink:0;
}
.logo-text{
  font-size:14px;font-weight:600;
  background:linear-gradient(90deg,var(--text),var(--dim));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.live-chip{
  display:flex;align-items:center;gap:5px;
  padding:3px 10px;
  background:rgba(52,211,153,.10);border:1px solid rgba(52,211,153,.20);
  border-radius:20px;font-size:11px;color:var(--green);font-weight:500;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:lp 2s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.h-right{display:flex;align-items:center;gap:6px}
.nav-btn{
  padding:4px 13px;border-radius:6px;font-size:12px;font-weight:500;
  cursor:pointer;border:1px solid transparent;font-family:inherit;
  transition:all .15s;color:var(--dim);background:transparent;
}
.nav-btn:hover{background:var(--glassH);color:var(--text)}
.nav-btn.active{background:var(--glass);border-color:var(--bH);color:var(--text)}
.h-meta{
  display:flex;align-items:center;gap:14px;
  color:var(--dim2);font-size:11px;font-family:var(--mono);
  border-left:1px solid var(--b);padding-left:14px;margin-left:4px;
}

/* ── Main content area ── */
#main{
  flex:1;min-height:0;
  display:grid;
  grid-template-columns:240px 1fr 272px;
  grid-template-rows:auto 1fr;
  gap:12px;padding:12px;
  overflow:hidden;
}

/* ── Metric cards row ── */
.metrics-row{
  grid-column:2;grid-row:1;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;
}
.metric-card{
  border-radius:var(--r);padding:16px 18px;
  background:var(--glass);border:1px solid var(--b);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  position:relative;overflow:hidden;transition:border-color .2s;
}
.metric-card:hover{border-color:var(--bH)}
.metric-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--bH),transparent);opacity:.6;
}
.metric-icon{font-size:16px;margin-bottom:10px;display:block}
.metric-value{
  font-size:30px;font-weight:700;line-height:1;margin-bottom:3px;
  letter-spacing:-.03em;font-variant-numeric:tabular-nums;
}
.mv-green {background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mv-indigo{background:linear-gradient(135deg,var(--indigo),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mv-amber {background:linear-gradient(135deg,var(--amber),#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.metric-label{font-size:11px;color:var(--dim);font-weight:500}

/* ── Canvas area (office) ── */
#office-area{
  grid-column:2;grid-row:2;
  position:relative;overflow:hidden;
  border-radius:var(--r);
  border:1px solid var(--b);
  background:#07070e;
}
#stage{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
#canvas-wrap{position:relative}
#bg-canvas,#three-canvas{position:absolute;top:0;left:0;display:block}
#bg-canvas{z-index:1}
#three-canvas{z-index:2;pointer-events:none}
#labels{
  position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:3;pointer-events:none;
}
.role-label{
  position:absolute;transform:translate(-50%,0);
  background:rgba(7,7,14,.80);
  border:1px solid rgba(255,255,255,.10);
  border-radius:4px;padding:2px 7px;
  font-size:9px;font-family:var(--mono);font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;
  backdrop-filter:blur(4px);
}
.role-label.genie{
  background:rgba(99,102,241,.18);
  border-color:rgba(129,140,248,.40);
  color:var(--indigo);font-size:10px;
  box-shadow:0 0 12px rgba(99,102,241,.25);
}

/* ── Sessions sidebar (left) ── */
#agents-strip{
  grid-column:1;grid-row:1/3;
  background:var(--glass);border:1px solid var(--b);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-radius:var(--r);
  display:flex;flex-direction:column;overflow:hidden;
}
.strip-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--b);flex-shrink:0;
}
.strip-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}
#sessionsContainer{
  display:flex;flex-direction:column;
  overflow-y:auto;flex:1;
  padding:8px 10px;gap:6px;
}
#sessionsContainer::-webkit-scrollbar{width:3px}
#sessionsContainer::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}

.session-section{
  flex:1;
  display:flex;flex-direction:column;
  min-height:0;
}
.session-header{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;
  border-radius:6px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  margin-bottom:5px;
  flex-shrink:0;
}
.session-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--green);animation:lp 2s ease-in-out infinite;
}
.session-dot.idle{background:var(--dim2);animation:none;}
.session-cwd{
  font-size:10px;color:var(--dim);font-family:var(--mono);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
}
.session-badge{
  font-size:9px;font-weight:700;text-transform:uppercase;
  padding:1px 5px;border-radius:3px;flex-shrink:0;
  background:rgba(129,140,248,.15);color:var(--indigo);
}
.session-badge.cli{background:rgba(34,211,238,.12);color:var(--cyan);}
.session-agents{
  display:flex;flex-direction:column;gap:4px;
  padding-left:4px;
}

.agent-tile{
  border-radius:8px;padding:10px 12px;
  display:grid;grid-template-columns:auto 1fr;align-items:center;gap:10px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);
  transition:all .15s;position:relative;overflow:hidden;
}
.agent-tile:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.10)}
.agent-tile.at-working{border-left:2px solid var(--green)}
.agent-tile.at-working::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:40%;
  background:linear-gradient(90deg,transparent,rgba(52,211,153,.03),transparent);
  animation:shimmer 3s ease-in-out infinite;
}
@keyframes shimmer{0%,100%{opacity:0}50%{opacity:1}}
.agent-avatar{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
}
.agent-info{min-width:0}
.agent-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:1px}
.agent-task{font-size:10px;color:var(--dim2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.empty-strip{
  padding:20px 12px;
  font-size:11px;color:var(--dim2);text-align:center;
}

/* ── Kanban panel ── */
#kanban-panel {
  position: absolute;
  bottom: 14px;
  left: 14px;
  width: 320px;
  z-index: 10;
  background: rgba(5, 10, 22, 0.82);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(0, 212, 255, 0.18);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.04);
  pointer-events: auto;
  transition: height 0.2s ease;
}
#kanban-panel.collapsed .kb-columns { display: none; }
.kb-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid rgba(0,212,255,0.12);
  background: rgba(0, 212, 255, 0.05);
}
.kb-title {
  font-size: 9px; font-weight: 700; letter-spacing: .12em;
  color: var(--cyan); text-transform: uppercase; font-family: var(--mono);
}
.kb-toggle {
  background: none; border: none; color: var(--dim2); cursor: pointer;
  font-size: 14px; line-height: 1; padding: 0 2px;
  transition: color .15s;
}
.kb-toggle:hover { color: var(--cyan); }
.kb-columns {
  display: flex; gap: 0;
}
.kb-col {
  flex: 1; border-right: 1px solid rgba(255,255,255,0.05);
  min-width: 0;
}
.kb-col:last-child { border-right: none; }
.kb-col-header {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 8px;
  font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
  color: var(--dim2); border-bottom: 1px solid rgba(255,255,255,0.04);
}
.kb-col-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.dot-queued { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
.dot-active { background: var(--green); box-shadow: 0 0 6px var(--green); animation: lp 2s ease-in-out infinite; }
.dot-done   { background: var(--dim2); }
.kb-col-count {
  margin-left: auto;
  background: rgba(255,255,255,0.07); border-radius: 8px;
  padding: 1px 5px; font-size: 8px; font-weight: 700;
  color: var(--dim); font-family: var(--mono);
}
.kb-col-body {
  padding: 6px 5px; display: flex; flex-direction: column; gap: 3px;
  max-height: 160px; overflow-y: auto; min-height: 32px;
}
.kb-col-body::-webkit-scrollbar { width: 2px; }
.kb-col-body::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 2px; }
.kb-card {
  border-radius: 5px; padding: 5px 7px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  cursor: pointer; transition: all .15s;
}
.kb-card:hover {
  background: rgba(0, 212, 255, 0.08);
  border-color: rgba(0, 212, 255, 0.25);
  transform: translateY(-1px);
}
.kb-card.wip {
  border-color: rgba(52, 211, 153, 0.25);
  background: rgba(52, 211, 153, 0.06);
}
.kb-card.done { opacity: 0.6; }
.kb-card-type {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  color: var(--cyan); letter-spacing: .06em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.kb-card.wip .kb-card-type { color: var(--green); }
.kb-card-desc {
  font-size: 9px; color: var(--dim); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.kb-card-time {
  font-size: 8px; color: var(--dim2); margin-top: 2px;
  font-family: var(--mono); font-variant-numeric: tabular-nums;
}

/* ── Timeline panel ── */
#timeline-panel{
  grid-column:3;grid-row:1/3;
  background:var(--glass);border:1px solid var(--b);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-radius:var(--r);
  display:flex;flex-direction:column;overflow:hidden;
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;border-bottom:1px solid var(--b);flex-shrink:0;
}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}
.tl-body{
  flex:1;overflow-y:auto;padding:8px 10px;
  display:flex;flex-direction:column;gap:2px;
}
.tl-body::-webkit-scrollbar{width:3px}
.tl-body::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
.tl-item{padding:7px 9px;border-radius:6px;transition:background .1s}
.tl-item:hover{background:rgba(255,255,255,.04)}
.tl-row1{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.tl-time{font-family:var(--mono);font-size:10px;color:var(--dim2);flex-shrink:0;font-variant-numeric:tabular-nums}
.tl-badge{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;padding:1px 5px;border-radius:3px;
}
.tb-spawn{background:rgba(96,165,250,.15);color:var(--blue)}
.tb-tool {background:rgba(148,163,184,.12);color:var(--dim)}
.tb-done {background:rgba(52,211,153,.12);color:var(--green)}
.tb-error{background:rgba(248,113,113,.15);color:var(--red)}
.tb-flow {background:rgba(167,139,250,.15);color:var(--purple)}
.tb-wait {background:rgba(251,191,36,.12);color:var(--amber)}
.tl-agent{font-size:11px;font-weight:600;color:var(--dim)}
.tl-detail{font-size:10px;color:var(--dim2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>

<!-- Ambient blobs -->
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div id="shell">

  <!-- Header -->
  <header>
    <div class="logo-wrap">
      <div class="logo-icon">A</div>
      <span class="logo-text">Agent Dashboard</span>
      <div class="live-chip"><span class="live-dot"></span>Live</div>
    </div>
    <div class="h-clock" id="clock">--:--:--</div>
    <div class="h-right" style="justify-self:end">
      <div class="h-meta">
        <span id="fps-counter">-- fps</span>
      </div>
    </div>
  </header>

  <!-- Main grid -->
  <div id="main">

    <!-- Sessions sidebar (left) -->
    <div id="agents-strip">
      <div class="strip-header">
        <span class="strip-title">Sessions</span>
        <span style="font-size:11px;color:var(--dim)" id="sessionCount">0 active</span>
      </div>
      <div id="sessionsContainer"></div>
    </div>

    <!-- Metric cards -->
    <div class="metrics-row">
      <div class="metric-card">
        <span class="metric-icon">&#9632;</span>
        <div class="metric-value mv-green" id="metricAgents">0</div>
        <div class="metric-label">Active Agents</div>
      </div>
      <div class="metric-card">
        <span class="metric-icon">&#9670;</span>
        <div class="metric-value mv-indigo" id="metricEvents">0</div>
        <div class="metric-label">Events Total</div>
      </div>
      <div class="metric-card">
        <span class="metric-icon">&#9650;</span>
        <div class="metric-value mv-amber" id="metricTime">--</div>
        <div class="metric-label">Session Time</div>
      </div>
    </div>

    <!-- Office canvas -->
    <div id="office-area">
      <div id="stage">
        <div id="canvas-wrap">
          <canvas id="bg-canvas"></canvas>
          <canvas id="three-canvas"></canvas>
          <div id="labels"></div>
        </div>
      </div>
      <!-- Kanban overlay -->
      <div id="kanban-panel">
        <div class="kb-header">
          <span class="kb-title">AGENTS</span>
          <button class="kb-toggle" onclick="toggleKanban()" title="Toggle kanban">&#8861;</button>
        </div>
        <div class="kb-columns" id="kb-columns">
          <div class="kb-col">
            <div class="kb-col-header">
              <span class="kb-col-dot dot-queued"></span>
              <span>Queued</span>
              <span class="kb-col-count" id="kb-todo-count">0</span>
            </div>
            <div class="kb-col-body" id="kb-todo"></div>
          </div>
          <div class="kb-col">
            <div class="kb-col-header">
              <span class="kb-col-dot dot-active"></span>
              <span>Active</span>
              <span class="kb-col-count" id="kb-wip-count">0</span>
            </div>
            <div class="kb-col-body" id="kb-wip"></div>
          </div>
          <div class="kb-col">
            <div class="kb-col-header">
              <span class="kb-col-dot dot-done"></span>
              <span>Done</span>
              <span class="kb-col-count" id="kb-done-count">0</span>
            </div>
            <div class="kb-col-body" id="kb-done"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Timeline panel -->
    <div id="timeline-panel">
      <div class="card-header">
        <span class="card-title">Timeline</span>
        <span style="font-size:10px;color:var(--dim2)" id="tlClock">--:--</span>
      </div>
      <div class="tl-body" id="timelineBody"></div>
    </div>

  </div><!-- #main -->
</div><!-- #shell -->

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  AGENT COLORS
// ═══════════════════════════════════════════════════════════
const AGENT_COLORS = {
  'developer':          {bg:'rgba(52,211,153,.15)',  fg:'#34d399'},
  'senior-developer':   {bg:'rgba(52,211,153,.15)',  fg:'#34d399'},
  'researcher':         {bg:'rgba(96,165,250,.15)',   fg:'#60a5fa'},
  'test-engineer':      {bg:'rgba(251,191,36,.15)',   fg:'#fbbf24'},
  'tester':             {bg:'rgba(251,191,36,.15)',   fg:'#fbbf24'},
  'reviewer':           {bg:'rgba(167,139,250,.15)',  fg:'#a78bfa'},
  'debugger':           {bg:'rgba(248,113,113,.15)',  fg:'#f87171'},
  'n8n-editor':         {bg:'rgba(251,146,60,.15)',   fg:'#fb923c'},
  'backend-architect':  {bg:'rgba(34,211,238,.15)',   fg:'#22d3ee'},
  'frontend-developer': {bg:'rgba(244,114,182,.15)',  fg:'#f472b6'},
  'Explore':            {bg:'rgba(96,165,250,.15)',   fg:'#60a5fa'},
  'Plan':               {bg:'rgba(129,140,248,.15)',  fg:'#818cf8'},
  'general-purpose':    {bg:'rgba(148,163,184,.15)',  fg:'#94a3b8'},
};
function agentColor(role){ return AGENT_COLORS[role]||{bg:'rgba(148,163,184,.15)',fg:'#94a3b8'}; }

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let currentState        = { sessions: [], total_active: 0, server_ts: 0 };
let allEvents           = [];   // raw events accumulator
let penguinMap          = {};   // agentKey -> { group, stationIdx, labelEl, pointLight }
let stationColorMap     = {};   // stationIdx -> hexColor string
let freeStations        = [0, 1, 2, 3, 4, 5];
let firstSessionStartedAt = null;

// ═══════════════════════════════════════════════════════════
//  CANVAS OFFICE — coordinate space
// ═══════════════════════════════════════════════════════════
const GW = 860, GH = 560;
const CX = GW / 2, CY = GH / 2 - 5;
const DESK_RADIUS = 145;
const NUM_DESKS   = 6;

const stations = [];
for (let i = 0; i < NUM_DESKS; i++) {
  const a = (i * (360 / NUM_DESKS) - 90) * Math.PI / 180;
  const dirX = Math.cos(a), dirY = Math.sin(a);
  stations.push({
    id: i, angle: a, dirX, dirY,
    deskX:  CX + dirX * DESK_RADIUS,
    deskY:  CY + dirY * DESK_RADIUS,
    chairX: CX + dirX * (DESK_RADIUS - 38),
    chairY: CY + dirY * (DESK_RADIUS - 38),

function rrPath(ctx,x,y,w,h,r){ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);}

// ── Space window (top panorama + black hole) ──
function drawAccretionDisk(g) {
  for (let i = 0; i < 3; i++) {
    const angle = diskAngle * 0.7 + i * Math.PI * 0.66;
    const dg = g.createLinearGradient(
      BH_X + Math.cos(angle) * BH_R * 2, BH_Y + Math.sin(angle) * BH_R * 0.6,
      BH_X - Math.cos(angle) * BH_R * 2, BH_Y - Math.sin(angle) * BH_R * 0.6
    );
    dg.addColorStop(0,   'rgba(255,90,15,0.0)');
    dg.addColorStop(0.3, 'rgba(255,130,30,0.5)');
    dg.addColorStop(0.5, 'rgba(255,160,50,0.7)');
    dg.addColorStop(0.7, 'rgba(200,80,10,0.5)');
    dg.addColorStop(1,   'rgba(120,30,5,0.0)');
    g.save();
    g.translate(BH_X, BH_Y); g.rotate(diskAngle * 0.5 + i * 0.4); g.scale(1, 0.28);
    g.beginPath(); g.ellipse(0, 0, BH_R * 2.4, BH_R * 2.4, 0, 0, Math.PI * 2);
    g.fillStyle = dg; g.fill(); g.restore();
  }
  g.save(); g.translate(BH_X, BH_Y); g.scale(1, 0.22);
  g.beginPath(); g.ellipse(0, 0, BH_R * 1.55, BH_R * 1.55, diskAngle, 0, Math.PI * 2);
  const ir = g.createRadialGradient(0, 0, BH_R * 0.9, 0, 0, BH_R * 1.6);
  ir.addColorStop(0,   'rgba(255,200,80,0.0)');
  ir.addColorStop(0.4, 'rgba(255,180,60,0.9)');
  ir.addColorStop(0.7, 'rgba(255,120,30,0.6)');
  ir.addColorStop(1,   'rgba(200,60,10,0.0)');
  g.fillStyle = ir; g.fill(); g.restore();

  const hpX = BH_X + Math.cos(diskAngle * 1.5) * BH_R * 1.8;
  const hpY = BH_Y + Math.sin(diskAngle * 1.5) * BH_R * 0.45;
  const hp  = g.createRadialGradient(hpX, hpY, 0, hpX, hpY, 14);
  hp.addColorStop(0, 'rgba(255,240,180,0.9)'); hp.addColorStop(0.4, 'rgba(255,160,50,0.5)'); hp.addColorStop(1,'rgba(255,80,10,0.0)');
  g.fillStyle = hp; g.beginPath(); g.arc(hpX, hpY, 14, 0, Math.PI * 2); g.fill();
}

// ── Metal grid floor ──
function drawFloor(g) {
  const GRID = 38, floorX = 50, floorY = 165, floorW = GW - 100, floorH = GH - 170;
  const pulse = 0.4 + 0.15 * Math.sin(ledPhase * 2.5);
  g.save(); g.beginPath(); g.rect(floorX, floorY, floorW, floorH); g.clip();

  for (let gx = floorX; gx <= floorX + floorW; gx += GRID) {
    const lg = g.createLinearGradient(0, floorY, 0, floorY + floorH);
    lg.addColorStop(0,   `rgba(26,80,160,${pulse * 0.6})`);
    lg.addColorStop(0.3, `rgba(20,100,200,${pulse})`);
    lg.addColorStop(0.7, `rgba(20,80,160,${pulse * 0.8})`);
    lg.addColorStop(1,   `rgba(10,40,80,${pulse * 0.4})`);
    g.beginPath(); g.moveTo(gx, floorY); g.lineTo(gx, floorY + floorH);
    g.strokeStyle = lg; g.lineWidth = 0.7; g.stroke();
  }
  for (let gy = floorY; gy <= floorY + floorH; gy += GRID) {
    const lg = g.createLinearGradient(floorX, 0, floorX + floorW, 0);
    lg.addColorStop(0,   `rgba(26,80,160,${pulse * 0.4})`);
    lg.addColorStop(0.5, `rgba(30,120,220,${pulse * 0.9})`);
    lg.addColorStop(1,   `rgba(26,80,160,${pulse * 0.4})`);
    g.beginPath(); g.moveTo(floorX, gy); g.lineTo(floorX + floorW, gy);
    g.strokeStyle = lg; g.lineWidth = 0.7; g.stroke();
  }
  for (let gx = floorX; gx <= floorX + floorW; gx += GRID) {
    for (let gy = floorY; gy <= floorY + floorH; gy += GRID) {
      const dp = 0.4 + 0.6 * Math.sin(ledPhase * 3 + gx * 0.1 + gy * 0.07);
      g.beginPath(); g.arc(gx, gy, 1.2, 0, Math.PI * 2);
      g.fillStyle = `rgba(40,140,255,${dp * 0.6})`; g.fill();
    }
  }
  g.restore();
}

// ── Cyan floor shimmer ──
function drawFloorShimmer(g) {
  const GRID = 42, floorX = 50, floorY = 165, floorW = GW - 100, floorH = GH - 170;
  g.save(); g.beginPath(); g.rect(floorX, floorY, floorW, floorH); g.clip();

  for (let row = 0; row * GRID < floorH + GRID; row++) {
    const yPos = floorY + row * GRID;
    const a = 0.055 + 0.04 * Math.sin(floorShimmerT * 0.5 + row * 0.3);
    g.strokeStyle = `rgba(0,212,255,${a})`; g.lineWidth = 0.5;
    g.beginPath(); g.moveTo(floorX, yPos); g.lineTo(floorX + floorW, yPos); g.stroke();
  }
  for (let col = 0; col * GRID < floorW + GRID; col++) {
    const xPos = floorX + col * GRID;
    const a = 0.04 + 0.03 * Math.sin(floorShimmerT * 0.4 + col * 0.25);
    g.strokeStyle = `rgba(0,212,255,${a})`; g.lineWidth = 0.5;
    g.beginPath(); g.moveTo(xPos, floorY); g.lineTo(xPos, floorY + floorH); g.stroke();
  }

  const egL = g.createLinearGradient(floorX, 0, floorX + 24, 0);
  egL.addColorStop(0, `rgba(0,212,255,${0.18 + 0.08 * Math.sin(floorShimmerT * 0.7)})`);
  egL.addColorStop(1, 'rgba(0,212,255,0)');
  g.fillStyle = egL; g.fillRect(floorX, floorY, 24, floorH);
  const egR = g.createLinearGradient(floorX + floorW, 0, floorX + floorW - 24, 0);
  egR.addColorStop(0, `rgba(0,212,255,${0.18 + 0.08 * Math.sin(floorShimmerT * 0.7 + 1.2)})`);
  egR.addColorStop(1, 'rgba(0,212,255,0)');
  g.fillStyle = egR; g.fillRect(floorX + floorW - 24, floorY, 24, floorH);

  g.restore();
}

// ── Titanium walls ──
function drawWalls(g) {

// ── Pipes ──
function drawPipes(g) {
  for (const p of pipes) {
    g.beginPath(); g.moveTo(p.x1, p.y1); g.lineTo(p.x2, p.y2);
    g.strokeStyle = p.color; g.lineWidth = p.w; g.stroke();
  }
  const joints = [
    {x:22,y:280},{x:22,y:390},{x:22,y:460},
    {x:GW-22,y:280},{x:GW-22,y:390},{x:GW-22,y:460},
  ];
  for (const j of joints) {
    g.beginPath(); g.arc(j.x, j.y, 5, 0, Math.PI * 2);
    g.fillStyle = '#0d2040'; g.fill();
    g.strokeStyle = '#1a3a6b'; g.lineWidth = 1; g.stroke();

// ── Wall indicators ──
function drawIndicators(g) {
  const all = [
    ...leftIndicators.map(i => ({...i, side: 'left'})),
    ...rightIndicators.map(i => ({...i, side: 'right'})),
  ];
  const colors = ['#00ff88', '#ff4466', '#ffdd00', '#00d4ff'];
  for (const ind of all) {
    const blink  = Math.sin(indicatorPhase + ind.y * 0.1) > 0.7;
    const active = ind.on && !blink;
    const color  = colors[Math.floor(ind.y * 0.02) % colors.length];
    g.beginPath(); g.arc(ind.x, ind.y, 3, 0, Math.PI * 2);
    g.fillStyle = active ? color : 'rgba(10,20,40,0.8)'; g.fill();
    if (active) {
      g.beginPath(); g.arc(ind.x, ind.y, 6, 0, Math.PI * 2);
      g.fillStyle = color + '33'; g.fill();
    }
  }
}

// ── Chrome consoles — uses stations[] and stationColorMap ──
function drawConsoles(g) {
  stations.forEach((st, i) => {
    const cp = consolePulse[i];
    const pulseVal = 0.7 + 0.3 * Math.sin(cp.phase);
    const angle = Math.atan2(CY - st.deskY, CX - st.deskX);
    const CW = 52, CH = 32;
    // Color from stationColorMap if agent active, else default cyan
    const agColor = stationColorMap[st.id] || '#22d3ee';

    g.save();
    g.translate(st.deskX, st.deskY);
    g.rotate(angle + Math.PI / 2);

    g.shadowColor = `${agColor}73`;
    g.shadowBlur  = 14;
    const bodyG = g.createLinearGradient(-CW/2, -CH/2, CW/2, CH/2);
    bodyG.addColorStop(0,   'rgba(200,220,240,0.90)');
    bodyG.addColorStop(0.4, 'rgba(175,198,225,0.82)');
    bodyG.addColorStop(1,   'rgba(135,162,195,0.70)');
    g.fillStyle = bodyG;
    g.beginPath(); rrPath(g, -CW/2, -CH/2, CW, CH, 4); g.fill();

    g.strokeStyle = `${agColor}8c`; g.lineWidth = 1;
    g.beginPath(); rrPath(g, -CW/2, -CH/2, CW, CH, 4); g.stroke();

    const screenG = g.createLinearGradient(-CW/2+6, -CH/2+5, CW/2-6, CH/2-8);
    screenG.addColorStop(0,   `rgba(0,180,255,${0.65 * pulseVal})`);
    screenG.addColorStop(0.5, `rgba(0,212,255,${0.82 * pulseVal})`);
    screenG.addColorStop(1,   `rgba(30,140,255,${0.55 * pulseVal})`);
    g.fillStyle = screenG;
    g.beginPath(); rrPath(g, -CW/2+6, -CH/2+5, CW-12, CH-12, 2); g.fill();

    g.strokeStyle = `rgba(120,240,255,${0.3 * pulseVal})`; g.lineWidth = 0.5; g.shadowBlur = 0;
    for (let sl = -CH/2+7; sl < CH/2-8; sl += 3) {
      g.beginPath(); g.moveTo(-CW/2+7, sl); g.lineTo(CW/2-7, sl); g.stroke();
    }
    const dotColors = ['rgba(0,255,100,0.9)','rgba(255,200,0,0.85)','rgba(0,212,255,0.9)'];
    for (let d = 0; d < 3; d++) {
      g.beginPath(); g.arc(-CW/2+8+d*6, CH/2-5, 1.5, 0, Math.PI*2);
      g.fillStyle = dotColors[d]; g.fill();
    }
    const labels = ['CMD','NAV','ENG','OPS','SCI','COM'];
    g.fillStyle = 'rgba(10,30,60,0.85)'; g.font = 'bold 6px Courier New'; g.textAlign = 'center';
    g.fillText(labels[i] || 'SYS', 0, CH/2-4);
    g.restore();
    g.shadowBlur = 0; g.shadowColor = 'transparent';

    // Screen glow
    const glowR = g.createRadialGradient(st.deskX, st.deskY, 0, st.deskX, st.deskY, 44);
    glowR.addColorStop(0,   'rgba(0,212,255,0.10)');
    glowR.addColorStop(0.5, 'rgba(0,180,255,0.05)');
    glowR.addColorStop(1,   'rgba(0,212,255,0)');
    g.fillStyle = glowR; g.beginPath(); g.arc(st.deskX, st.deskY, 44, 0, Math.PI*2); g.fill();
  });
}

// ── Holographic center ring — at CX, CY ──
function drawHoloRing(g) {
  const { rotation, pulsePhase } = holoRing;
  const ringR = 58, pulse = 0.8 + 0.2 * Math.sin(pulsePhase);

  g.save(); g.translate(CX, CY);

  const outerGlow = g.createRadialGradient(0, 0, ringR - 10, 0, 0, ringR + 24);
  outerGlow.addColorStop(0,   `rgba(0,212,255,${0.22 * pulse})`);
  outerGlow.addColorStop(0.5, `rgba(0,212,255,${0.09 * pulse})`);
  outerGlow.addColorStop(1,   'rgba(0,212,255,0)');
  g.fillStyle = outerGlow; g.beginPath(); g.arc(0, 0, ringR + 24, 0, Math.PI*2); g.fill();

  g.beginPath(); g.arc(0, 0, ringR, 0, Math.PI*2);
  g.strokeStyle = `rgba(0,212,255,${0.68 * pulse})`; g.lineWidth = 2.5;
  g.shadowColor = 'rgba(0,212,255,0.85)'; g.shadowBlur = 12; g.stroke();

  g.beginPath(); g.arc(0, 0, ringR - 9, 0, Math.PI*2);
  g.strokeStyle = `rgba(0,212,255,${0.30 * pulse})`; g.lineWidth = 1; g.shadowBlur = 5; g.stroke();

  g.save(); g.rotate(rotation);
  const dashCount = 12;
  for (let i = 0; i < dashCount; i++) {
    const a = (i / dashCount) * Math.PI * 2;
    g.beginPath();
    g.moveTo(Math.cos(a) * (ringR-4), Math.sin(a) * (ringR-4));
    g.lineTo(Math.cos(a) * (ringR+4), Math.sin(a) * (ringR+4));
    g.strokeStyle = `rgba(100,240,255,${0.92 * pulse})`; g.lineWidth = 2; g.shadowBlur = 7; g.stroke();
  }
  g.restore();

  const cg = g.createRadialGradient(0, 0, 0, 0, 0, ringR - 9);
  cg.addColorStop(0,   `rgba(0,212,255,${0.12 * pulse})`);
  cg.addColorStop(0.6, `rgba(0,100,180,${0.06 * pulse})`);
  cg.addColorStop(1,   'rgba(0,0,0,0)');
  g.fillStyle = cg; g.beginPath(); g.arc(0, 0, ringR - 9, 0, Math.PI*2); g.fill();

  g.strokeStyle = `rgba(0,212,255,${0.20 * pulse})`; g.lineWidth = 0.8; g.shadowBlur = 4;
  g.beginPath();
  g.moveTo(-(ringR-14), 0); g.lineTo(ringR-14, 0);
  g.moveTo(0, -(ringR-14)); g.lineTo(0, ringR-14);
  g.stroke();

  g.beginPath(); g.arc(0, 0, 3.5, 0, Math.PI*2);
  g.fillStyle = `rgba(0,230,255,${0.75 * pulse})`; g.shadowBlur = 8; g.fill();

  g.restore(); g.shadowBlur = 0; g.shadowColor = 'transparent';
}

// ── Ambient glow ──
function drawAmbientGlow(g) {
  const ambGrad = g.createLinearGradient(0, 165, 0, 340);
  ambGrad.addColorStop(0,   'rgba(255,100,20,0.06)');
  ambGrad.addColorStop(0.4, 'rgba(200,60,10,0.025)');
  ambGrad.addColorStop(1,   'rgba(0,0,0,0)');
  g.fillStyle = ambGrad; g.fillRect(50, 165, GW-100, 175);

  const ledBloom = g.createRadialGradient(CX, CY, 0, CX, CY, 200);
  ledBloom.addColorStop(0,   `rgba(20,80,180,${0.08 + 0.05 * Math.sin(ledPhase * 2)})`);
  ledBloom.addColorStop(0.5, 'rgba(10,40,100,0.04)');
  ledBloom.addColorStop(1,   'rgba(0,0,0,0)');
  g.fillStyle = ledBloom; g.fillRect(50, 165, GW-100, GH-170);

  const stripY = 175;
  g.beginPath();
  g.moveTo(90, stripY); g.lineTo(320, stripY);
  g.moveTo(440, stripY); g.lineTo(GW-90, stripY);
  g.strokeStyle = `rgba(180,210,255,${0.20 + 0.10 * Math.sin(ledPhase * 1.8)})`;
  g.lineWidth = 2; g.shadowColor = 'rgba(180,210,255,0.5)'; g.shadowBlur = 6;
  g.stroke(); g.shadowBlur = 0;
}

// ── Vignette ──
function drawVignette(g) {
  const vig = g.createRadialGradient(GW/2, GH/2, 200, GW/2, GH/2, GW * 0.72);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.50)');
  g.fillStyle = vig; g.fillRect(0, 0, GW, GH);

  const corners = [{x:0,y:0},{x:GW,y:0},{x:0,y:GH},{x:GW,y:GH}];
  for (const co of corners) {
    const aoG = g.createRadialGradient(co.x, co.y, 0, co.x, co.y, 160);
    aoG.addColorStop(0, 'rgba(0,0,0,0.40)'); aoG.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = aoG; g.fillRect(co.x-160, co.y-160, 320, 320);
  }
}

// ─────────────────────────────────────────────────────────
//  PENGUIN BUILDER
// ─────────────────────────────────────────────────────────
function perspScale(canvasY){ return .82+(canvasY/GH)*.36; }
function hexColor(hex){ return new THREE.Color(parseInt(hex.replace('#',''),16)); }

function makePenguin(canvasX, canvasY, faceAngle, hoodieHex, phase) {
  const group = new THREE.Group();
  const threeX = canvasX, threeY = GH - canvasY;
  const pscale = perspScale(canvasY);
  const base = 18 * pscale;

  const bodyColor  = new THREE.Color(0x121820);
  const bellyColor = new THREE.Color(0xe8e8e8);
  const hoodieColor= hexColor(hoodieHex);
  const eyeWhite   = new THREE.Color(0xf0f0f0);
  const pupilColor = new THREE.Color(0x080808);
  const beakColor  = new THREE.Color(0xff8c20);

  // Body
  const body=new THREE.Mesh(new THREE.SphereGeometry(base,14,12),new THREE.MeshLambertMaterial({color:bodyColor}));
  body.position.set(0,0,base*.1); body.scale.set(.88,1,.72);
  body.castShadow=true; body.receiveShadow=true; group.add(body);

  // Hoodie
  const hoodie=new THREE.Mesh(new THREE.SphereGeometry(base*.95,14,8,0,Math.PI*2,0,Math.PI*.52),new THREE.MeshLambertMaterial({color:hoodieColor,side:THREE.FrontSide}));
  hoodie.position.set(0,0,base*.12); hoodie.scale.set(.90,1.02,.74);
  hoodie.castShadow=true; group.add(hoodie);

  // Zipper
  const zipper=new THREE.Mesh(new THREE.CylinderGeometry(base*.025,base*.025,base*.9,5),new THREE.MeshLambertMaterial({color:new THREE.Color(0x888888)}));
  zipper.position.set(base*.01,base*.1,base*.72); zipper.rotation.x=Math.PI*.08; group.add(zipper);

  // Belly
  const belly=new THREE.Mesh(new THREE.SphereGeometry(base*.62,12,10),new THREE.MeshLambertMaterial({color:bellyColor}));
  belly.position.set(0,-base*.08,base*.65); belly.scale.set(.75,1.1,.55);
  belly.castShadow=true; group.add(belly);

  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(base*.68,14,12),new THREE.MeshLambertMaterial({color:bodyColor}));
  head.position.set(0,base*.12,base*1.55); head.castShadow=true; head.receiveShadow=true; group.add(head);
  group.userData.head=head;

  // Hood
  const hood=new THREE.Mesh(new THREE.SphereGeometry(base*.70,12,8,Math.PI*.18,Math.PI*1.64,0,Math.PI*.7),new THREE.MeshLambertMaterial({color:hoodieColor,side:THREE.FrontSide}));
  hood.position.set(0,base*.12,base*1.55); group.add(hood);

  // Eyes
  const eyeR=base*.155, pupilR=base*.090, eyeOff=base*.22;
  for(const side of [-1,1]){
    const eyeMesh=new THREE.Mesh(new THREE.SphereGeometry(eyeR,10,8),new THREE.MeshLambertMaterial({color:eyeWhite}));
    eyeMesh.position.set(side*eyeOff,base*.30,base*2.02); group.add(eyeMesh);
    const pupMesh=new THREE.Mesh(new THREE.SphereGeometry(pupilR,8,6),new THREE.MeshLambertMaterial({color:pupilColor}));
    pupMesh.position.set(side*eyeOff*.88,base*.32,base*2.14); group.add(pupMesh);
    const glintMesh=new THREE.Mesh(new THREE.SphereGeometry(pupilR*.35,5,4),new THREE.MeshLambertMaterial({color:new THREE.Color(1,1,1)}));
    glintMesh.position.set(side*eyeOff*.78+.8,base*.35,base*2.18); group.add(glintMesh);
  }

  // Beak
  const beak=new THREE.Mesh(new THREE.ConeGeometry(base*.16,base*.38,8),new THREE.MeshLambertMaterial({color:beakColor}));
  beak.rotation.x=-Math.PI/2+.25; beak.position.set(0,base*.52,base*2.02); group.add(beak);

  // Flippers — arms resting forward on keyboard
  group.userData.flippers=[];
  for(const side of [-1,1]){
    const flip=new THREE.Mesh(new THREE.CapsuleGeometry(base*.12,base*.62,4,8),new THREE.MeshLambertMaterial({color:bodyColor}));
    // Extended forward toward desk (y+), at desk level (z low)
    flip.position.set(side*base*.55, base*.92, base*.22);
    flip.rotation.x = 1.05;   // arm angled forward-down onto keyboard
    flip.rotation.z = side*0.20;
    flip.castShadow=true; group.add(flip);
    group.userData.flippers.push({
      mesh:flip, side,
      basePosZ: flip.position.z,
      baseRotX: flip.rotation.x,
    });
  }

  // Feet
  group.userData.feet=[];
  for(const side of [-1,1]){
    const foot=new THREE.Mesh(new THREE.CapsuleGeometry(base*.10,base*.25,4,6),new THREE.MeshLambertMaterial({color:beakColor}));
    foot.position.set(side*base*.35,-base*.92,-base*.02); foot.rotation.x=Math.PI/2;
    foot.castShadow=true; group.add(foot);
    group.userData.feet.push({mesh:foot,side,baseZ:foot.position.z});
  }

  // Shadow disk
  const shadowMesh=new THREE.Mesh(new THREE.CircleGeometry(base*.85,16),new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.28}));
  shadowMesh.position.set(0,0,-base*.05); shadowMesh.scale.set(1,.4,1); group.add(shadowMesh);

  group.rotation.z = -(faceAngle + Math.PI/2);
  group.position.set(threeX, threeY, 0);
  group.userData.phase=phase; group.userData.canvasY=canvasY; group.userData.baseScale=pscale;
  return group;
}

// ─────────────────────────────────────────────────────────
//  GENIE BUILDER
// ─────────────────────────────────────────────────────────
function makeGenie(canvasX, canvasY) {
  const group = new THREE.Group();
  const threeX=canvasX, threeY=GH-canvasY;
  const pscale=perspScale(canvasY)*.858;
  const base=18*pscale;
  const genieColor=new THREE.Color(0x818cf8);

  // Orb body
  const orb=new THREE.Mesh(new THREE.SphereGeometry(base*1.1,20,16),new THREE.MeshLambertMaterial({color:genieColor,transparent:true,opacity:.68,emissive:genieColor,emissiveIntensity:.22}));
  orb.position.set(0,0,base*.2); orb.castShadow=true; group.add(orb);

  // Core
  const core=new THREE.Mesh(new THREE.SphereGeometry(base*.55,16,12),new THREE.MeshLambertMaterial({color:new THREE.Color(0xaab4ff),transparent:true,opacity:.85,emissive:new THREE.Color(0x6677ff),emissiveIntensity:.55}));
  core.position.set(0,0,base*.2); group.add(core);

  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(base*.72,16,14),new THREE.MeshLambertMaterial({color:genieColor,transparent:true,opacity:.80,emissive:genieColor,emissiveIntensity:.15}));
  head.position.set(0,0,base*1.65); group.add(head);

  // Eyes
  for(const side of [-1,1]){
    const eye=new THREE.Mesh(new THREE.SphereGeometry(base*.14,8,6),new THREE.MeshLambertMaterial({color:new THREE.Color(0xffffff),emissive:new THREE.Color(0xaabbff),emissiveIntensity:.8}));
    eye.position.set(side*base*.26,base*.22,base*2.20); group.add(eye);
  }

  // Smoke tail
  for(let ti=0;ti<4;ti++){
    const tr=base*(.9-ti*.18);
    const seg=new THREE.Mesh(new THREE.CylinderGeometry(tr*.7,tr,base*.5,10),new THREE.MeshLambertMaterial({color:genieColor,transparent:true,opacity:.45-ti*.09,emissive:genieColor,emissiveIntensity:.12}));
    seg.position.set(0,0,-(ti+.5)*base*.52); seg.rotation.x=Math.PI/2; group.add(seg);
  }

  // Point light
  const genieLight=new THREE.PointLight(0x6677ff,1.4,200);
  genieLight.position.set(0,0,base); group.add(genieLight);

  group.position.set(threeX, threeY, 0);
  group.userData.baseY=threeY; group.userData.base=base;
  group.userData.orb=orb; group.userData.core=core;
  return group;
}

// ═══════════════════════════════════════════════════════════
//  SPAWN / DESPAWN PENGUINS
// ═══════════════════════════════════════════════════════════
function spawnPenguin(agentKey, agentType) {
  if (penguinMap[agentKey]) return;
  if (freeStations.length === 0) return;

  const stationIdx = freeStations.shift();
  const st = stations[stationIdx];
  const c = agentColor(agentType);
  const phase = Object.keys(penguinMap).length * (Math.PI * 2 / 6);

  const group = makePenguin(st.chairX, st.chairY, st.angle, c.fg, phase);
  group.userData.agentKey  = agentKey;
  group.userData.agentType = agentType;
  group.userData.stationId = stationIdx;
  scene.add(group);

  // Point light for this station
  const pl = new THREE.PointLight(parseInt(c.fg.replace('#',''), 16), .8, 140);
  pl.position.set(st.deskX, GH - st.deskY + 8, 30);
  scene.add(pl);

  // Label
  const el = document.createElement('div');
  el.className = 'role-label';
  el.textContent = agentType;
  el.style.color = c.fg;
  el.style.borderColor = c.fg + '40';
  labelsDiv.appendChild(el);
  labelEls.push({el, agentKey});

  stationColorMap[stationIdx] = c.fg;
  bgDirty = true;

  penguinMap[agentKey] = { group, stationIdx, labelEl: el, pointLight: pl };
}

function despawnPenguin(agentKey) {
  const entry = penguinMap[agentKey];
  if (!entry) return;

  scene.remove(entry.group);
  if (entry.pointLight) scene.remove(entry.pointLight);
  entry.labelEl.remove();

  freeStations.push(entry.stationIdx);
  freeStations.sort((a, b) => a - b);

  delete stationColorMap[entry.stationIdx];
  bgDirty = true;

  labelEls = labelEls.filter(item => item.agentKey !== agentKey);
  delete penguinMap[agentKey];
}

// ═══════════════════════════════════════════════════════════
//  APPLY STATE
// ═══════════════════════════════════════════════════════════
function applyState(newState) {
  // Collect all active agent keys
  const newKeys = new Set();
  for (const session of newState.sessions) {
    for (const agent of (session.active_agents || [])) {
      newKeys.add(agent.key);
    }
  }

  // Despawn gone agents
  for (const key of Object.keys(penguinMap)) {
    if (!newKeys.has(key)) despawnPenguin(key);
  }

  // Spawn new agents
  for (const session of newState.sessions) {
    for (const agent of (session.active_agents || [])) {
      if (!penguinMap[agent.key]) {
        spawnPenguin(agent.key, agent.agent_type);
      }
    }
  }

  // Track first active session started_at
  const active = newState.sessions.find(s => s.status === 'active');
  firstSessionStartedAt = active ? active.started_at : null;

  currentState = newState;
  renderSessions(currentState);
  renderKanban();
  renderMetrics();

  // Update genie label with project name from first session's cwd
  const firstSession = newState.sessions[0];
  if (firstSession && firstSession.cwd) {
    const projectName = firstSession.cwd.split(/[\\/]/).filter(Boolean).pop() || 'workspace';
    genieEl.textContent = projectName;
  }
}

// ═══════════════════════════════════════════════════════════
//  KANBAN
// ═══════════════════════════════════════════════════════════
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function renderKanban() {
  const todo = [];
  const wip = [];
  const done = [];

  for (const sess of currentState.sessions) {
    for (const ag of (sess.active_agents || [])) wip.push(ag);
    for (const ag of (sess.completed_agents || [])) done.push(ag);
  }

  function cardHTML(ag, cls) {
    const t = ag.started_at ? new Date(ag.started_at * 1000).toTimeString().slice(0, 8) : '';
    const desc = esc((ag.description || '').slice(0, 48));
    const type = esc(ag.agent_type || 'agent');
    return `<div class="kb-card ${cls}" title="${desc}">
      <div class="kb-card-type">${type}</div>
      ${desc ? `<div class="kb-card-desc">${desc}</div>` : ''}
      <div class="kb-card-time">${t}</div>
    </div>`;
  }

  const empty = (msg) => `<div style="color:var(--dim2);font-size:9px;padding:4px 2px;text-align:center">${msg}</div>`;

  const todoEl = document.getElementById('kb-todo');
  const wipEl  = document.getElementById('kb-wip');
  const doneEl = document.getElementById('kb-done');
  if (!todoEl || !wipEl || !doneEl) return;

  todoEl.innerHTML = todo.length ? todo.map(ag => cardHTML(ag, 'todo')).join('') : empty('—');
  wipEl.innerHTML  = wip.length  ? wip.map(ag => cardHTML(ag, 'wip')).join('')  : empty('Idle');
  doneEl.innerHTML = done.length ? done.slice().reverse().slice(0,8).map(ag => cardHTML(ag,'done')).join('') : empty('—');

  // Update counts
  const tc = document.getElementById('kb-todo-count');
  const wc = document.getElementById('kb-wip-count');
  const dc = document.getElementById('kb-done-count');
  if (tc) tc.textContent = todo.length;
  if (wc) wc.textContent = wip.length;
  if (dc) dc.textContent = Math.min(done.length, 8);
}

function toggleKanban() {
  const panel = document.getElementById('kanban-panel');
  if (panel) panel.classList.toggle('collapsed');
}

// ═══════════════════════════════════════════════════════════
//  RENDER SESSIONS PANEL
// ═══════════════════════════════════════════════════════════
function renderSessions(state) {
  const container = document.getElementById('sessionsContainer');
  const countEl   = document.getElementById('sessionCount');

  countEl.textContent = state.sessions.length + ' active';

  if (state.sessions.length === 0) {
    container.innerHTML = '<div class="empty-strip">Waiting for sessions...</div>';
    return;
  }

  container.innerHTML = state.sessions.map(session => {
    const cwdShort = session.cwd.replace(/^.*[/\\]/, '') || session.cwd;
    const badgeCls = (session.session_type === 'vscode') ? '' : 'cli';
    const badgeLabel = session.session_type || 'cli';
    const dotCls = (session.status === 'active') ? '' : 'idle';

    const agents = session.active_agents || [];
    const agentTiles = agents.map(agent => {
      const c = agentColor(agent.agent_type);
      const initial = (agent.agent_type || '?')[0].toUpperCase();
      const desc = agent.description || agent.agent_type;
      return `<div class="agent-tile at-working">
        <div class="agent-avatar" style="background:${c.bg};color:${c.fg}">${initial}</div>
        <div class="agent-info">
          <div class="agent-name">${agent.agent_type}</div>
          <div class="agent-task">${desc}</div>
        </div>
      </div>`;
    }).join('');

    return `<div class="session-section">
      <div class="session-header">
        <span class="session-dot ${dotCls}"></span>
        <span class="session-cwd" title="${session.cwd}">${cwdShort}</span>
        <span class="session-badge ${badgeCls}">${badgeLabel}</span>
      </div>
      <div class="session-agents">${agentTiles}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
//  RENDER TIMELINE
// ═══════════════════════════════════════════════════════════
function renderTimeline() {
  const body = document.getElementById('timelineBody');

  const displayEvents = allEvents.slice(-50).reverse();

  body.innerHTML = displayEvents.map(e => {
    let badgeCls = 'tb-tool';
    let badgeLabel = e.tool || e.event || 'event';

    if (e.is_agent && e.phase === 'start') {
      badgeCls = 'tb-spawn'; badgeLabel = 'spawn';
    } else if (e.event === 'PostToolUse') {
      badgeCls = 'tb-done'; badgeLabel = e.tool || 'done';
    } else if (e.tool === 'Agent') {
      badgeCls = 'tb-flow'; badgeLabel = 'agent';
    } else if (e.tool) {
      badgeCls = 'tb-tool'; badgeLabel = e.tool;
    }

    const timeStr = e.time || (e.ts ? new Date(e.ts * 1000).toTimeString().slice(0, 5) : '--:--');
    const sessionShort = e.session_id ? e.session_id.split('_')[0] : '';
    const detail = e.detail || '';

    return `<div class="tl-item">
      <div class="tl-row1">
        <span class="tl-time">${timeStr}</span>
        <span class="tl-badge ${badgeCls}">${badgeLabel}</span>
        ${sessionShort ? `<span class="tl-agent">${sessionShort}</span>` : ''}
      </div>
      <div class="tl-detail">${detail}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
//  RENDER METRICS
// ═══════════════════════════════════════════════════════════
function renderMetrics() {
  document.getElementById('metricAgents').textContent = currentState.total_active || 0;
  document.getElementById('metricEvents').textContent = allEvents.length;

  if (firstSessionStartedAt) {
    const elapsed = Math.floor(Date.now() / 1000 - firstSessionStartedAt);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    let t;
    if (h > 0)      t = h + 'h ' + m + 'm';
    else if (m > 0) t = m + 'm ' + s + 's';
    else            t = s + 's';
    document.getElementById('metricTime').textContent = t;
  } else {
    document.getElementById('metricTime').textContent = '--';
  }
}

// ═══════════════════════════════════════════════════════════
//  API POLLING
// ═══════════════════════════════════════════════════════════
let lastEventTs = 0;

async function fetchState() {
  try {
    const res = await fetch('/api/state');
    if (!res.ok) return;
    const data = await res.json();
    applyState(data);
    renderSessions(data);
    renderMetrics();
    renderKanban();
  } catch (_) {}
}

async function fetchEvents() {
  try {
    const res = await fetch('/api/events?since=' + lastEventTs + '&limit=50');
    if (!res.ok) return;
    const events = await res.json(); // newest-first from API
    if (events.length > 0) {
      // Reverse to chronological order before appending
      const ordered = events.slice().reverse();
      for (const ev of ordered) {
        allEvents.push(ev);
        if (ev.ts > lastEventTs) lastEventTs = ev.ts;
      }
      if (allEvents.length > 1000) allEvents = allEvents.slice(-1000);
      renderTimeline();
      renderMetrics();
    }
  } catch (_) {}
}

// ═══════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
let frame = 0;
let lastFPSTime = performance.now(), framesSinceFPS = 0;
const fpsEl   = document.getElementById('fps-counter');
const clockEl = document.getElementById('clock');

function updateHUD() {
  framesSinceFPS++;
  const now = performance.now();
  if (now - lastFPSTime >= 500) {
    const fps = Math.round(framesSinceFPS / ((now - lastFPSTime) / 1000));
    fpsEl.textContent = fps + ' fps';
    framesSinceFPS = 0; lastFPSTime = now;
  }
  const d = new Date();
  clockEl.textContent = d.toTimeString().slice(0, 8);
}

function draw2D() {
  const g = bgCtx;
  g.save();
  g.setTransform(dpr * scaleRatio, 0, 0, dpr * scaleRatio, 0, 0);
  g.clearRect(0, 0, GW, GH);

  drawRoom(g);
  drawSpaceWindow(g);
  drawFloor(g);
  drawFloorShimmer(g);
  drawWalls(g);
  drawPipes(g);
  drawIndicators(g);
  drawConsoles(g);
  drawHoloRing(g);
  drawAmbientGlow(g);
  drawVignette(g);

  g.restore();
}

function animate3D() {
  const t = frame * .018;
  for (const entry of Object.values(penguinMap)) {
    const p = entry.group;
    const ph = p.userData.phase || 0;

    // Body bounce — strong
    p.position.z = Math.sin(t * 1.4 + ph) * 9;
    // Lean forward/back — vigorous typing
    p.rotation.x = -0.14 + Math.sin(t * 1.8 + ph) * 0.13;
    // Side sway
    p.rotation.y = Math.sin(t * 1.0 + ph + 1.2) * 0.09;

    // Head nod — active
    if (p.userData.head) {
      p.userData.head.rotation.x = Math.sin(t * 4.0 + ph) * 0.32;
      p.userData.head.rotation.z = Math.sin(t * 1.8 + ph + 0.8) * 0.12;
    }

    // Flippers — alternating key presses from resting position
    if (p.userData.flippers) {
      for (const flipData of p.userData.flippers) {
        const {mesh, side, basePosZ, baseRotX} = flipData;
        const stroke = Math.sin(t * 7.0 + ph + side * Math.PI * 0.5);
        const press = Math.max(0, stroke);
        const lift  = Math.max(0, -stroke);
        // Press key down (z-), lift up between strokes (z+)
        mesh.position.z = basePosZ - press * 3.5 + lift * 2.5;
        mesh.rotation.x = baseRotX + press * 0.30 - lift * 0.20;
        mesh.rotation.z = side * (0.20 + press * 0.10);
      }
    }

    // Feet tap — stomping rhythm
    if (p.userData.feet) {
      for (const footData of p.userData.feet) {
        const {mesh, side, baseZ} = footData;
        const tap = Math.sin(t * 5.5 + ph + side * Math.PI * 0.5 + Math.PI);
        mesh.position.z = baseZ + Math.max(0, tap) * 6;
      }
    }
  }
  // Genie float + rotate + pulse
  const floatZ = Math.sin(t * .72) * 8.5;
  genie.position.z = floatZ;
  genie.position.y = genie.userData.baseY + Math.sin(t * .48) * 3.5;
  genie.rotation.z += .008;
  const pulse = .92 + Math.sin(t * 1.8) * .14;
  genie.userData.orb.scale.setScalar(pulse);
  genie.userData.core.material.emissiveIntensity = .40 + Math.sin(t * 2.2) * .22;
  const gl = genie.children.find(c => c.isLight);
  if (gl) gl.intensity = 1.2 + Math.sin(t * 1.9) * .35;
}

function loop() {
  requestAnimationFrame(loop);
  frame++;

  // Update space station animation state
  const t = performance.now();
  ledPhase       = t * 0.0008;
  diskAngle      = t * 0.0003;
  indicatorPhase = t * 0.002;
  floorShimmerT  = t * 0.001;
  holoRing.rotation  += holoRing.rotSpeed;
  holoRing.pulsePhase += holoRing.pulseSpeed;
  for (const cp of consolePulse) cp.phase += cp.speed;

  draw2D();
  animate3D();
  renderer.render(scene, camera);
  updateLabels();
  updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════════════════════
(function tickClock() {
  const now = new Date(), p = n => String(n).padStart(2, '0');
  document.getElementById('tlClock').textContent = `${p(now.getHours())}:${p(now.getMinutes())}`;
  setTimeout(tickClock, 1000);
})();

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
resize();
loop();

let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { resize(); updateLabels(); }, 80);
});

// Initial render of empty state
renderSessions(currentState);
renderTimeline();
renderMetrics();

// Start polling
fetchState();
fetchEvents();
setInterval(fetchState, 1500);
setInterval(fetchEvents, 800);
</script>
