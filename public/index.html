const labelsDiv = document.getElementById('labels');
let labelEls = []; // [{el, agentKey?} | {el, genieKey?}]

function updateLabels() {
  const sx = scaleRatio, sy = scaleRatio;
  for (const item of labelEls) {
    if (item.genieKey) {
      const ge = genieMap[item.genieKey];
      if (!ge) continue;
      const pos = GENIE_SLOTS[ge.slotIdx];
      item.el.style.left = (pos.x * sx) + 'px';
      item.el.style.top  = ((pos.y - 46) * sy) + 'px';
      continue;
    }
    const entry = penguinMap[item.agentKey];
    if (!entry) continue;
    const st = getStation(entry.stationIdx);
    item.el.style.left = (st.labelX * sx) + 'px';
    item.el.style.top  = (st.labelY * sy) + 'px';
    item.el.style.transform = `translate(-50%,-50%) rotate(${st.labelAngleDeg}deg)`;
  }
}

// ═══════════════════════════════════════════════════════════
//  SPAWN / DESPAWN GENIES
// ═══════════════════════════════════════════════════════════
function spawnGenie(sessionId, session) {
  if (genieMap[sessionId]) return;
  if (freeGenieSlots.length === 0) return;
  const slotIdx = freeGenieSlots.shift();
  const pos = GENIE_SLOTS[slotIdx];
  const group = makeGenie(pos.x, pos.y, 0x818cf8);
  scene.add(group);
  const projectName = (session.cwd || '').split(/[\\/]/).filter(Boolean).pop() || 'workspace';
  const el = document.createElement('div');
  el.className = 'role-label genie';
  let displayName = projectName;
  if (displayName.toLowerCase() === 'vs + claude projects') displayName = 'workspace';
  if (displayName.length > 14) displayName = displayName.slice(0, 13) + '…';
  el.textContent = displayName;
  labelsDiv.appendChild(el);
  labelEls.push({el, genieKey: sessionId});
  genieMap[sessionId] = { group, slotIdx, labelEl: el };
}

function despawnGenie(sessionId) {
  const entry = genieMap[sessionId];
  if (!entry) return;
  scene.remove(entry.group);
  entry.labelEl.remove();
  labelEls = labelEls.filter(item => item.genieKey !== sessionId);
  freeGenieSlots.push(entry.slotIdx);
  freeGenieSlots.sort((a, b) => a - b);
  delete genieMap[sessionId];
  delete genieOrbitAngles[sessionId];
}

// ═══════════════════════════════════════════════════════════
//  SPAWN / DESPAWN PENGUINS
// ═══════════════════════════════════════════════════════════
// Overflow wall desk positions — clockwise from top-right corner
// Overflow desk positions — concentric rings inside the room, clockwise from upper-right.
// Main 6 stations sit at radius=145 on angles −90°,−30°,30°,90°,150°,210°.
// Ring 1 (r≈200): gap angles between main stations.
// Ring 2 (r≈220–243): main station angles, smaller r toward bottom (CY=350, GH=560).
const WALL_DESK_POSITIONS = (() => {
  const entries = [
    { a: -60, r: 205 }, { a: -30, r: 240 }, { a:   0, r: 205 },
    { a:  30, r: 222 }, { a:  60, r: 180 }, { a:  90, r: 160 },
    { a: 120, r: 180 }, { a: 150, r: 222 }, { a: 180, r: 205 },
    { a: 210, r: 240 }, { a: 240, r: 205 }, { a: -90, r: 243 },
  ];
  return entries.map(({ a, r }) => {
    const rad = a * Math.PI / 180;
    return { x: Math.round(CX + r * Math.cos(rad)), y: Math.round(CY + r * Math.sin(rad)) };
  });
})();

function getStation(idx) {
  if (idx < NUM_DESKS) return stations[idx];
  const wp = WALL_DESK_POSITIONS[(idx - NUM_DESKS) % WALL_DESK_POSITIONS.length];
  const deskX = wp.x, deskY = wp.y;
  const angle = Math.atan2(deskY - CY, deskX - CX);  // outward from center
  const dirX = Math.cos(angle), dirY = Math.sin(angle);
  return {
    id: idx, angle, dirX, dirY,
    deskX, deskY,
    chairX: deskX - dirX * 34,   // chair is 34px toward center from desk
    chairY: deskY - dirY * 34,
    labelX: deskX - dirX * 22,   // label on the inner side (toward center)
    labelY: deskY - dirY * 22,
    labelAngleDeg: 0,
  };
}

function spawnPenguin(agentKey, agentType, provider) {
  if (penguinMap[agentKey]) return;
  
  let stationIdx;
  if (freeStations.length > 0) {
    stationIdx = freeStations.shift();
  } else {
    stationIdx = Object.keys(penguinMap).length + freeStations.length;
  }

  const st = getStation(stationIdx);
  const c = agentColor(agentType);
  const phase = Object.keys(penguinMap).length * (Math.PI * 2 / 6);

  const group = makePenguin(st.chairX, st.chairY, st.angle, c.fg, phase, provider, agentType);
  group.userData.agentKey  = agentKey;
  group.userData.agentType = agentType;
  group.userData.stationId = stationIdx;
  scene.add(group);

  // Point light for this station
  const pl = new THREE.PointLight(parseInt(c.fg.replace('#',''), 16), .8, 140);
  pl.position.set(st.deskX, st.deskY, 30);
  scene.add(pl);

  // Label
  const el = document.createElement('div');
  el.className = 'role-label';
  el.textContent = (provider === 'gemini-scout' || agentType === 'gemini-scout' ? '[GM] ' : '') + agentType;
  el.style.color = c.fg;
  el.style.borderColor = c.fg + '40';
  labelsDiv.appendChild(el);
  labelEls.push({el, agentKey});

  stationColorMap[stationIdx] = c.fg;
  bgDirty = true;

  penguinMap[agentKey] = { group, stationIdx, labelEl: el, pointLight: pl, spawnedAt: Date.now() };
}

const MIN_ALIVE_MS = 30_000; // 30 seconds minimum visibility

function despawnPenguin(agentKey) {
  const entry = penguinMap[agentKey];
  if (!entry) return;

  if (entry.spawnedAt && Date.now() - entry.spawnedAt < MIN_ALIVE_MS) {
    const remaining = MIN_ALIVE_MS - (Date.now() - entry.spawnedAt);
    setTimeout(() => despawnPenguin(agentKey), remaining + 100);
    return;
  }

  scene.remove(entry.group);
  if (entry.pointLight) scene.remove(entry.pointLight);
  entry.labelEl.remove();

  freeStations.push(entry.stationIdx);
  freeStations.sort((a, b) => a - b);

  delete stationColorMap[entry.stationIdx];
  delete stationScrollOffset[entry.stationIdx];
  bgDirty = true;

  labelEls = labelEls.filter(item => item.agentKey !== agentKey);
  delete penguinMap[agentKey];
}

// ═══════════════════════════════════════════════════════════
//  APPLY STATE
// ═══════════════════════════════════════════════════════════
function applyState(newState) {
  // Genies: 1 per session
  const newSessionKeys = new Set((newState.sessions || []).map(s => s.session_id));
  for (const key of Object.keys(genieMap)) {
    if (!newSessionKeys.has(key)) despawnGenie(key);
  }
  for (const session of (newState.sessions || [])) {
    spawnGenie(session.session_id, session);
    if (genieMap[session.session_id]) {
      genieMap[session.session_id].activeAgents = session.active_agents || [];
      genieMap[session.session_id].sessionData  = session;
    }
  }

  // Penguins: 1 per active subagent
  const newPenguinKeys = new Set((newState.active_penguins || []).map(p => p.key));
  for (const key of Object.keys(penguinMap)) {
    if (!newPenguinKeys.has(key)) despawnPenguin(key);
  }
  for (const penguin of (newState.active_penguins || [])) {
    if (!penguinMap[penguin.key]) spawnPenguin(penguin.key, penguin.agent_type || 'general-purpose', penguin.provider);
  }

  // Track first active session started_at
  const active = (newState.sessions || []).find(s => s.status === 'active');
  firstSessionStartedAt = active ? active.started_at : null;

  currentState = newState;
  renderSessions(currentState);
  renderKanban();
  renderMetrics();
}

// ═══════════════════════════════════════════════════════════
//  KANBAN
// ═══════════════════════════════════════════════════════════
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function renderKanban() {
  const todo = [];
  const wip = [];
  const done = [];

  for (const sess of currentState.sessions) {
    for (const ag of (sess.active_agents || [])) wip.push(ag);
    for (const ag of (sess.completed_agents || [])) done.push(ag);
  }

  function cardHTML(ag, cls) {
    const t = ag.started_at ? new Date(ag.started_at * 1000).toTimeString().slice(0, 8) : '';
    const desc = esc((ag.description || '').slice(0, 48));
    const type = esc(ag.agent_type || 'agent');
    return `<div class="kb-card ${cls}" title="${desc}">
      <div class="kb-card-type">${type}</div>
      ${desc ? `<div class="kb-card-desc">${desc}</div>` : ''}
      <div class="kb-card-time">${t}</div>
    </div>`;
  }

  const empty = (msg) => `<div style="color:var(--dim2);font-size:9px;padding:4px 2px;text-align:center">${msg}</div>`;

  const todoEl = document.getElementById('kb-todo');
  const wipEl  = document.getElementById('kb-wip');
  const doneEl = document.getElementById('kb-done');
  if (!todoEl || !wipEl || !doneEl) return;

  todoEl.innerHTML = todo.length ? todo.map(ag => cardHTML(ag, 'todo')).join('') : empty('—');
  wipEl.innerHTML  = wip.length  ? wip.map(ag => cardHTML(ag, 'wip')).join('')  : empty('Idle');
  doneEl.innerHTML = done.length ? done.slice().reverse().slice(0,8).map(ag => cardHTML(ag,'done')).join('') : empty('—');

  // Update counts
  const tc = document.getElementById('kb-todo-count');
  const wc = document.getElementById('kb-wip-count');
  const dc = document.getElementById('kb-done-count');
  if (tc) tc.textContent = todo.length;
  if (wc) wc.textContent = wip.length;
  if (dc) dc.textContent = Math.min(done.length, 8);
}

function toggleKanban() {
  const panel = document.getElementById('kanban-panel');
  if (panel) panel.classList.toggle('collapsed');
}

// ═══════════════════════════════════════════════════════════
//  RENDER SESSIONS PANEL
// ═══════════════════════════════════════════════════════════
function renderSessions(state) {
  const container = document.getElementById('sessionsContainer');
  const countEl   = document.getElementById('sessionCount');

  countEl.textContent = Object.keys(genieMap).length + ' active';

  if (state.sessions.length === 0) {
    container.innerHTML = '<div class="empty-strip">Waiting for sessions...</div>';
    return;
  }

  container.innerHTML = state.sessions.map(session => {
    const cwdShort = esc(session.cwd.replace(/^.*[/\\]/, '') || session.cwd);
    const badgeCls = (session.session_type === 'vscode') ? '' : 'cli';
    const badgeLabel = session.session_type || 'cli';
    const dotCls = (session.status === 'active') ? '' : 'idle';

    const agents = session.active_agents || [];
    const agentTiles = agents.map(agent => {
      const c = agentColor(agent.agent_type);
      const initial = (agent.agent_type || '?')[0].toUpperCase();
      const desc = agent.description || agent.agent_type;
      return `<div class="agent-tile at-working">
        <div class="agent-avatar" style="background:${c.bg};color:${c.fg}">${initial}</div>
        <div class="agent-info">
          <div class="agent-name">${agent.agent_type}</div>
          <div class="agent-task">${desc}</div>
        </div>
      </div>`;
    }).join('');

    return `<div class="session-section">
      <div class="session-header">
        <span class="session-dot ${dotCls}"></span>
        <span class="session-cwd" title="${esc(session.cwd)}">${cwdShort}</span>
        <span class="session-badge ${badgeCls}">${badgeLabel}</span>
      </div>
      <div class="session-agents">${agentTiles}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
//  RENDER TIMELINE
// ═══════════════════════════════════════════════════════════
function renderTimeline() {
  const body = document.getElementById('timelineBody');

  const displayEvents = allEvents.slice(-50).reverse();

  body.innerHTML = displayEvents.map(e => {
    let badgeCls = 'tb-tool';
    let badgeLabel = e.tool || e.event || 'event';

    if (e.is_agent && e.phase === 'start') {
      badgeCls = 'tb-spawn'; badgeLabel = 'spawn';
    } else if (e.event === 'PostToolUse') {
      badgeCls = 'tb-done'; badgeLabel = e.tool || 'done';
    } else if (e.tool === 'Agent') {
      badgeCls = 'tb-flow'; badgeLabel = 'agent';
    } else if (e.tool) {
      badgeCls = 'tb-tool'; badgeLabel = e.tool;
    }

    const timeStr = e.time || (e.ts ? new Date(e.ts * 1000).toTimeString().slice(0, 5) : '--:--');
    const sessionShort = e.session_id ? e.session_id.split('_')[0] : '';
    const detail = e.detail || '';

    return `<div class="tl-item">
      <div class="tl-row1">
        <span class="tl-time">${timeStr}</span>
        <span class="tl-badge ${badgeCls}">${badgeLabel}</span>
        ${sessionShort ? `<span class="tl-agent">${sessionShort}</span>` : ''}
      </div>
      <div class="tl-detail">${detail}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
//  RENDER METRICS
// ═══════════════════════════════════════════════════════════
function renderMetrics() {
  document.getElementById('metricAgents').textContent = currentState.total_active || 0;
  document.getElementById('metricEvents').textContent = allEvents.length;

  if (firstSessionStartedAt) {
    const elapsed = Math.floor(Date.now() / 1000 - firstSessionStartedAt);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    let t;
    if (h > 0)      t = h + 'h ' + m + 'm';
    else if (m > 0) t = m + 'm ' + s + 's';
    else            t = s + 's';
    document.getElementById('metricTime').textContent = t;
  } else {
    document.getElementById('metricTime').textContent = '--';
  }
}

// ═══════════════════════════════════════════════════════════
//  API POLLING
// ═══════════════════════════════════════════════════════════
let lastEventTs = 0;

async function fetchState() {
  try {
    const res = await fetch('/api/state');
    if (!res.ok) return;
    const data = await res.json();
    applyState(data);
  } catch (_) {}
}

async function fetchEvents() {
  try {
    const res = await fetch('/api/events?since=' + lastEventTs + '&limit=50');
    if (!res.ok) return;
    const events = await res.json(); // newest-first from API
    if (events.length > 0) {
      // Reverse to chronological order before appending
      const ordered = events.slice().reverse();
      for (const ev of ordered) {
        allEvents.push(ev);
        if (ev.ts > lastEventTs) lastEventTs = ev.ts;
      }
      if (allEvents.length > 1000) allEvents = allEvents.slice(-1000);
      renderTimeline();
      renderMetrics();
    }
  } catch (_) {}
}

// ═══════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
let frame = 0;
let animStartTime = null, tSec = 0;
let lastFPSTime = performance.now(), framesSinceFPS = 0;
const fpsEl   = document.getElementById('fps-counter');
const clockEl = document.getElementById('clock');

function updateHUD() {
  framesSinceFPS++;
  const now = performance.now();
  if (now - lastFPSTime >= 500) {
    const fps = Math.round(framesSinceFPS / ((now - lastFPSTime) / 1000));
    fpsEl.textContent = fps + ' fps';
    framesSinceFPS = 0; lastFPSTime = now;
  }
  const d = new Date();
  clockEl.textContent = d.toTimeString().slice(0, 8);
}

function draw2D() {
  const g = bgCtx;
  g.save();
  g.setTransform(dpr * scaleRatio, 0, 0, dpr * scaleRatio, 0, 0);
  g.clearRect(0, 0, GW, GH);

  drawRoom(g);
  drawSpaceWindow(g);
  drawFloor(g);
  drawFloorShimmer(g);
  drawWalls(g);
  drawPipes(g);
  drawIndicators(g);
  drawConsoles(g);
  drawHoloRing(g);
  drawGenieOrbitCards(g);
  drawAmbientGlow(g);
  drawVignette(g);

  g.restore();
}

function drawGenieOrbitCards(g) {
  const ORBIT_R = 88;
  // Decorative pill: small; agent card: slightly wider for description
  const PILL_W = 56, PILL_H = 14;
  const AGENT_W = 80, AGENT_H = 16;

  // Decorative color: amber-lime; agent color: bright lime
  const DECO_BORDER  = 'rgba(251,191,36,0.55)';
  const DECO_BG      = 'rgba(10,12,8,0.70)';
  const DECO_DOT     = '#f59e0b';
  const DECO_TEXT    = 'rgba(251,191,36,0.85)';
  const AGENT_BORDER = 'rgba(74,222,128,0.80)';
  const AGENT_BG     = 'rgba(4,12,8,0.90)';
  const AGENT_DOT    = '#4ade80';
  const AGENT_TEXT   = '#86efac';

  for (const [sid, ge] of Object.entries(genieMap)) {
    const agents = ge.activeAgents || [];
    const hasAgents = agents.length > 0;

    // Project name: use cwd basename, fallback to 'workspace'
    const cwdParts = (ge.sessionData?.cwd || '').split(/[\\/]/).filter(Boolean);
    let projectName = cwdParts.pop() || 'workspace';
    if (projectName.toLowerCase() === 'vs + claude projects') projectName = 'workspace';
    if (projectName.length > 14) projectName = projectName.slice(0, 13) + '…';

    const items = hasAgents
      ? agents.slice(0, 4).map(ag => {
          const type = (ag.agent_type || 'agent').replace(/-/g, ' ');
          const desc = ag.description || '';
          return { text: desc ? `${type}: ${desc}` : type, scrolling: desc.length > 8 };
        })
      : [{ text: projectName, scrolling: false }];

    const CARD_W = hasAgents ? AGENT_W : PILL_W;
    const CARD_H = hasAgents ? AGENT_H : PILL_H;
    const border = hasAgents ? AGENT_BORDER : DECO_BORDER;
    const bg     = hasAgents ? AGENT_BG     : DECO_BG;
    const dot    = hasAgents ? AGENT_DOT    : DECO_DOT;
    const textC  = hasAgents ? AGENT_TEXT   : DECO_TEXT;
    const glowC  = hasAgents ? '74,222,128' : '251,191,36';

    const pos = GENIE_SLOTS[ge.slotIdx];
    const angles = genieOrbitAngles[sid] || [];

    // Orbit ring
    g.save();
    g.strokeStyle = hasAgents ? 'rgba(74,222,128,0.20)' : 'rgba(251,191,36,0.12)';
    g.lineWidth = 0.8;
    g.setLineDash([2, 8]);
    g.beginPath();
    g.arc(pos.x, pos.y, ORBIT_R, 0, Math.PI * 2);
    g.stroke();
    g.setLineDash([]);
    g.restore();

    if (!ge.cardScrollOffset) ge.cardScrollOffset = {};

    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const angle = angles[i] !== undefined ? angles[i] : (i * Math.PI * 2 / items.length);
      const cx = pos.x + Math.cos(angle) * ORBIT_R;
      const cy = pos.y + Math.sin(angle) * ORBIT_R;

      // Connector line
      g.save();
      g.beginPath();
      const dx = pos.x - cx, dy = pos.y - cy;
      const len = Math.sqrt(dx*dx + dy*dy);
      g.moveTo(cx, cy);
      g.lineTo(cx + dx * (len - 18) / len, cy + dy * (len - 18) / len);
      g.strokeStyle = hasAgents ? 'rgba(74,222,128,0.15)' : 'rgba(251,191,36,0.10)';
      g.lineWidth = 0.6;
      g.stroke();
      g.restore();

      // Glow halo
      const gw = g.createRadialGradient(cx, cy, 0, cx, cy, 36);
      gw.addColorStop(0, `rgba(${glowC},${hasAgents ? 0.16 : 0.08})`);
      gw.addColorStop(1, 'rgba(0,0,0,0)');
      g.fillStyle = gw;
      g.fillRect(cx - 36, cy - 36, 72, 72);

      // Pill / card body
      g.save();
      g.translate(cx - CARD_W / 2, cy - CARD_H / 2);

      g.beginPath();
      rrPath(g, 0, 0, CARD_W, CARD_H, CARD_H / 2);
      g.fillStyle = bg;
      g.fill();
      g.strokeStyle = border;
      g.lineWidth = 0.9;
      g.stroke();

      // Dot indicator (left side)
      g.fillStyle = dot;
      g.beginPath();
      g.arc(7, CARD_H / 2, 2.5, 0, Math.PI * 2);
      g.fill();

      // Text (scrolling for long agent descriptions, static for project name)
      g.save();
      g.beginPath();
      rrPath(g, 12, 2, CARD_W - 16, CARD_H - 4, (CARD_H - 4) / 2);
      g.clip();

      if (ge.cardScrollOffset[i] === undefined) ge.cardScrollOffset[i] = i * 18;

      g.font = `bold 7px 'SF Mono', monospace`;
      const textW = g.measureText(item.text).width;
      const fits = textW <= (CARD_W - 18);

      let tx;
      if (fits || !item.scrolling) {
        tx = 12; // static left-aligned (short text or deco)
      } else {
        ge.cardScrollOffset[i] += 0.5;
        tx = 12 - (ge.cardScrollOffset[i] % (textW + 30));
      }

      g.fillStyle = textC;
      g.fillText(item.text, tx, CARD_H - 4);
      g.restore();

      g.restore();
    }
  }
}

function animate3D() {
  const t = tSec * 1.08;
  for (const entry of Object.values(penguinMap)) {
    const p = entry.group;
    const ph = p.userData.phase || 0;

    // Body bounce — strong
    p.position.z = Math.sin(t * 1.4 + ph) * 9;
    // Lean forward/back — vigorous typing
    p.rotation.x = -0.14 + Math.sin(t * 1.8 + ph) * 0.13;
    // Side sway
    p.rotation.y = Math.sin(t * 1.0 + ph + 1.2) * 0.09;

    // Head nod — active
    if (p.userData.head) {
      p.userData.head.rotation.x = Math.sin(t * 4.0 + ph) * 0.32;
      p.userData.head.rotation.z = Math.sin(t * 1.8 + ph + 0.8) * 0.12;
    }

    // Flippers — alternating key presses from resting position
    if (p.userData.flippers) {
      for (const flipData of p.userData.flippers) {
        const {mesh, side, basePosZ, baseRotX} = flipData;
        const stroke = Math.sin(t * 7.0 + ph + side * Math.PI * 0.5);
        const press = Math.max(0, stroke);
        const lift  = Math.max(0, -stroke);
        // Press key down (z-), lift up between strokes (z+)
        mesh.position.z = basePosZ - press * 3.5 + lift * 2.5;
        mesh.rotation.x = baseRotX + press * 0.30 - lift * 0.20;
        mesh.rotation.z = side * (0.20 + press * 0.10);
      }
    }

    // Feet tap — stomping rhythm
    if (p.userData.feet) {
      for (const footData of p.userData.feet) {
        const {mesh, side, baseZ} = footData;
        const tap = Math.sin(t * 5.5 + ph + side * Math.PI * 0.5 + Math.PI);
        mesh.position.z = baseZ + Math.max(0, tap) * 6;
      }
    }
  }
  // Genies float + rotate + pulse — три уровня интенсивности
  const nowSec = Date.now() / 1000;
  for (const [sid, ge] of Object.entries(genieMap)) {
    const g = ge.group;
    const agents = ge.activeAgents || [];
    const sd = ge.sessionData || {};
    const recentActivity = sd.last_event_ts && (nowSec - sd.last_event_ts) < 60;
    const hasSubAgents = agents.length > 0;
    const soloWIP = recentActivity && !hasSubAgents;

    let floatSpeed   = 0.72,  floatAmp  = 8.5;
    let floatYSpeed  = 0.48,  floatYAmp = 3.5;
    let rotSpeed     = 0.008;
    let pulseSpeed   = 1.8,   pulseAmp  = 0.14, pulseBase = 0.92;
    let emivBase     = 0.40,  emivAmp   = 0.22, emivSpeed = 2.2;
    let lightBase    = 1.2,   lightAmp  = 0.35, lightSpeed = 1.9;
    let orbScaleMult = 1.0;
    let orbEmivBoost = 0;

    if (soloWIP) {
      floatSpeed = 1.0; floatAmp = 11.0;
      rotSpeed = 0.013;
      pulseSpeed = 2.8; pulseAmp = 0.20;
      emivBase = 0.55; emivAmp = 0.28;
      lightBase = 1.8; lightAmp = 0.45;
    } else if (hasSubAgents) {
      floatSpeed = 1.55; floatAmp = 16.0;
      floatYSpeed = 0.90; floatYAmp = 5.0;
      rotSpeed = 0.022;
      pulseSpeed = 4.2; pulseAmp = 0.28; pulseBase = 1.0;
      emivBase = 0.72; emivAmp = 0.32; emivSpeed = 3.8;
      lightBase = 2.4; lightAmp = 0.60;
      orbScaleMult = 1.22;
      orbEmivBoost = 0.3;
    }

    g.position.z = Math.sin(t * floatSpeed) * floatAmp;
    g.position.y = g.userData.baseY + Math.sin(t * floatYSpeed) * floatYAmp;
    g.rotation.z += rotSpeed;

    const pulse = pulseBase + Math.sin(t * pulseSpeed) * pulseAmp;
    if (g.userData.orb) {
      g.userData.orb.scale.setScalar(pulse * orbScaleMult);
      if (hasSubAgents) {
        g.userData.orb.material.emissiveIntensity = 0.35 + Math.sin(t * 3.5) * 0.25 + orbEmivBoost;
      }
    }
    if (g.userData.core) {
      g.userData.core.material.emissiveIntensity = emivBase + Math.sin(t * emivSpeed) * emivAmp;
    }
    const gl = g.children.find(c => c.isLight);
    if (gl) gl.intensity = lightBase + Math.sin(t * lightSpeed) * lightAmp;
  }
}

function loop(timestamp) {
  requestAnimationFrame(loop);
  if (!animStartTime) animStartTime = timestamp;
  tSec = (timestamp - animStartTime) / 1000;
  frame++;

  // Update space station animation state
  const t = performance.now();
  ledPhase       = t * 0.0008;
  diskAngle      = t * 0.0003;
  indicatorPhase = t * 0.002;
  floorShimmerT  = t * 0.001;
  holoRing.rotation  += holoRing.rotSpeed;
  holoRing.pulsePhase += holoRing.pulseSpeed;
  consolePulse.forEach(cp => { if (cp) cp.phase += cp.speed; });

  // Advance scroll offsets for WIP stations
  for (const entry of Object.values(penguinMap)) {
    const idx = entry.stationIdx;
    stationScrollOffset[idx] = (stationScrollOffset[idx] || 0) + 0.4;
  }

  // Advance genie orbit angles
  const now = Date.now() / 1000;
  for (const [sid, ge] of Object.entries(genieMap)) {
    const agents = ge.activeAgents || [];
    const count = Math.max(agents.length, 1);
    if (!genieOrbitAngles[sid]) {
      genieOrbitAngles[sid] = Array.from({length: count}, (_, i) => i * (Math.PI * 2 / count));
    }
    while (genieOrbitAngles[sid].length < count) {
      genieOrbitAngles[sid].push(Math.random() * Math.PI * 2);
    }
    genieOrbitAngles[sid].length = count;
    const speeds = [0.013, 0.010, 0.008, 0.011, 0.009];
    for (let i = 0; i < genieOrbitAngles[sid].length; i++) {
      genieOrbitAngles[sid][i] += speeds[i] || 0.010;
    }
  }

  draw2D();
  animate3D();
  renderer.render(scene, camera);
  updateLabels();
  updateHUD();
}

// ═══════════════════════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════════════════════
(function tickClock() {
  const now = new Date(), p = n => String(n).padStart(2, '0');
  document.getElementById('tlClock').textContent = `${p(now.getHours())}:${p(now.getMinutes())}`;
  setTimeout(tickClock, 1000);
})();

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
resize();
loop();

let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { resize(); updateLabels(); }, 80);
});

// Initial render of empty state
renderSessions(currentState);
renderTimeline();
renderMetrics();

async function fetchRelease() {
  try {
    const r = await fetch('/api/release');
    const data = await r.json();
    if (data.ts) {
      const d = new Date(data.ts * 1000);
      const fmt = d.toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit'}) + ' ' +
                  d.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
      document.getElementById('release-time').textContent = fmt + (data.note ? ' — ' + data.note : '');
      document.getElementById('release-chip').style.display = 'flex';
    }
  } catch {}
}

// Start polling
fetchState();
fetchEvents();
fetchRelease();
setInterval(fetchState, isMobileDevice ? 3000 : 1500);
setInterval(fetchEvents, isMobileDevice ? 2000 : 800);

// Mobile tab switching
(function() {
  const tabs = document.querySelectorAll('.mob-tab');
  const officeArea = document.getElementById('office-area');
  const timelinePanel = document.getElementById('timeline-panel');

  function switchTab(tabName) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
    if (tabName === 'workspace') {
      officeArea.classList.remove('tab-hidden');
      timelinePanel.classList.add('tab-hidden');
      setTimeout(() => window.dispatchEvent(new Event('resize')), 50);
    } else {
      officeArea.classList.add('tab-hidden');
      timelinePanel.classList.remove('tab-hidden');
    }
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
  });
  switchTab('workspace');
})();
</script>
