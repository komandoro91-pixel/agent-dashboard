<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070e;--glass:rgba(255,255,255,.04);--glassH:rgba(255,255,255,.07);
  --b:rgba(255,255,255,.08);--bH:rgba(255,255,255,.15);
  --text:#f1f5f9;--dim:#94a3b8;--dim2:#475569;
  --indigo:#818cf8;--purple:#a78bfa;--green:#34d399;
  --amber:#fbbf24;--red:#f87171;--blue:#60a5fa;--cyan:#22d3ee;
  --r:10px;--sans:-apple-system,'Inter','Segoe UI',sans-serif;
  --mono:'SF Mono','Cascadia Code','Consolas',monospace;
}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:var(--sans);font-size:13px;
}

/* ── Ambient blobs — behind everything ── */
.blob{position:fixed;border-radius:50%;pointer-events:none;filter:blur(90px);z-index:0}
.b1{width:600px;height:400px;background:rgba(99,102,241,.10);top:-10%;left:5%}
.b2{width:400px;height:350px;background:rgba(16,185,129,.07);bottom:-5%;right:5%}
.b3{width:280px;height:280px;background:rgba(139,92,246,.08);top:35%;left:38%}

/* ── Layout shell ── */
#shell{
  position:relative;z-index:1;
  width:100%;height:100%;
  display:flex;flex-direction:column;
}

/* ── Header ── */
header{
  flex-shrink:0;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  padding:0 24px;height:52px;
  background:rgba(7,7,14,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b);box-shadow:0 1px 0 0 rgba(129,140,248,.18),0 2px 12px rgba(129,140,248,.10),0 4px 24px rgba(7,7,14,.60),inset 0 -1px 0 rgba(255,255,255,.04);
  z-index:20;
}
.h-clock{
  font-family:var(--mono);font-size:22px;font-weight:700;
  letter-spacing:.06em;
  background:linear-gradient(270deg,var(--indigo),var(--cyan),var(--purple),var(--indigo));
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;
  animation:clock-gradient 6s ease infinite;
}
@keyframes clock-gradient{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:26px;height:26px;border-radius:6px;
  background:linear-gradient(135deg,var(--indigo),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;flex-shrink:0;
  position:relative;overflow:hidden;
  box-shadow:0 0 8px rgba(129,140,248,.30),inset 0 1px 0 rgba(255,255,255,.20);
  animation:logo-pulse 4s ease-in-out infinite;
}
.logo-icon::after{
  content:'';position:absolute;inset:0;border-radius:6px;
  background:linear-gradient(135deg,rgba(255,255,255,.22) 0%,transparent 55%,rgba(167,139,250,.15) 100%);
  pointer-events:none;
}
@keyframes logo-pulse{
  0%,100%{box-shadow:0 0 8px rgba(129,140,248,.30),inset 0 1px 0 rgba(255,255,255,.20)}
  50%{box-shadow:0 0 14px rgba(129,140,248,.55),inset 0 1px 0 rgba(255,255,255,.28)}
}
.logo-text{
  font-size:14px;font-weight:600;
  background:linear-gradient(90deg,var(--text),var(--dim));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.live-chip{
  display:flex;align-items:center;gap:5px;
  padding:3px 10px;
  background:rgba(52,211,153,.10);border:1px solid rgba(52,211,153,.20);
  border-radius:20px;font-size:11px;color:var(--green);font-weight:500;
  animation:live-chip-glow 3s ease-in-out infinite;
}
@keyframes live-chip-glow{
  0%,100%{box-shadow:0 0 4px rgba(52,211,153,.10),inset 0 0 6px rgba(52,211,153,.05)}
  50%{box-shadow:0 0 10px rgba(52,211,153,.28),inset 0 0 12px rgba(52,211,153,.12)}
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(52,211,153,.6);animation:lp 2s ease-in-out infinite,live-ring 2s ease-out infinite,live-dot-scale 2s ease-in-out infinite}@keyframes live-dot-scale{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.35);filter:brightness(1.4)}}@keyframes live-ring{0%{box-shadow:0 0 0 0 rgba(52,211,153,.55)}70%{box-shadow:0 0 0 5px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
.release-chip{
  display:flex;align-items:center;gap:5px;
  padding:3px 10px;
  background:rgba(129,140,248,.10);border:1px solid rgba(129,140,248,.20);
  border-radius:20px;font-size:11px;color:var(--indigo);font-weight:500;
  white-space:nowrap;
  transition:background .25s,border-color .25s,box-shadow .25s;
}
.release-chip:hover{
  background:rgba(129,140,248,.18);border-color:rgba(129,140,248,.40);
  box-shadow:0 0 8px rgba(129,140,248,.22),inset 0 0 8px rgba(129,140,248,.08);
}
.release-chip-label{opacity:.6;margin-right:2px}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.h-right{display:flex;align-items:center;gap:6px}
.nav-btn{
  padding:4px 13px;border-radius:6px;font-size:12px;font-weight:500;
  cursor:pointer;border:1px solid transparent;font-family:inherit;
  transition:all .2s;color:var(--dim);background:transparent;
  position:relative;overflow:hidden;
}
.nav-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.08) 50%,transparent 60%);
  background-size:200% 100%;background-position:200% 0;
  transition:background-position .4s ease;
  pointer-events:none;
}
.nav-btn:hover::after{background-position:-200% 0}
.nav-btn:hover{background:var(--glassH);color:var(--text);border-color:transparent;background-clip:padding-box;box-shadow:0 0 0 1px rgba(129,140,248,.35),0 0 8px rgba(129,140,248,.15)}
.nav-btn.active{background:var(--glass);border-color:var(--bH);color:var(--text);box-shadow:inset 0 0 12px rgba(129,140,248,.10),0 0 8px rgba(129,140,248,.08)}.nav-btn.active::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(129,140,248,.15) 50%,transparent 70%);background-size:200% 100%;background-position:200% 0;animation:active-btn-shimmer 3s ease-in-out infinite;pointer-events:none;border-radius:inherit;}@keyframes active-btn-shimmer{0%,100%{background-position:200% 0}50%{background-position:-200% 0}}
.h-meta{
  display:flex;align-items:center;gap:14px;
  color:var(--dim2);font-size:11px;font-family:var(--mono);
  border-left:1px solid var(--b);padding-left:14px;margin-left:4px;
}

/* ── Main content area ── */
#main{
  flex:1;min-height:0;
  display:grid;
  grid-template-columns:240px 1fr 340px;
  grid-template-rows:auto 1fr;
  gap:12px;padding:12px;
  overflow:hidden;
}

/* ── Metric cards row ── */
.metrics-row{
  grid-column:2;grid-row:1;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;
}
.metric-card{
  border-radius:var(--r);padding:16px 18px;
  background:var(--glass);border:1px solid var(--b);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  position:relative;overflow:hidden;transition:border-color .2s,transform .2s,box-shadow .2s;
  animation:card-enter .5s cubic-bezier(.22,.68,0,1.2) both;
}
.metric-card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.06),0 0 16px rgba(129,140,248,.12);
  border-color:rgba(129,140,248,.28);
}
.metric-card:hover .m-label::after{
  opacity:1;transform:translateY(0);
}
.m-label{
  position:relative;
}
.m-label::after{
  content:attr(data-tip);
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%;transform:translateX(-50%) translateY(4px);
  background:rgba(15,15,25,.92);border:1px solid rgba(255,255,255,.10);
  color:var(--dim);font-size:10px;white-space:nowrap;
  padding:3px 8px;border-radius:5px;
  pointer-events:none;
  opacity:0;
  transition:opacity .22s ease,transform .22s ease;
  z-index:10;
}
.metric-card::before{
  content:'';position:absolute;top:0;left:10%;width:80%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  opacity:0;transition:opacity .3s ease;
  pointer-events:none;z-index:2;
}
.metric-card:hover::before{opacity:1;}
.metric-card:nth-child(1){animation-delay:.05s}
.metric-card:nth-child(2){animation-delay:.15s}
.metric-card:nth-child(3){animation-delay:.25s}
.metric-card{
}
.metric-card:nth-child(1)::after{content:'';position:absolute;left:0;top:12%;height:76%;width:2px;border-radius:2px;background:linear-gradient(180deg,transparent,var(--green),transparent);opacity:.7;transition:opacity .3s;}
.metric-card:nth-child(1):hover::after{opacity:1;box-shadow:0 0 8px var(--green);}
.metric-card:nth-child(2)::after{content:'';position:absolute;left:0;top:12%;height:76%;width:2px;border-radius:2px;background:linear-gradient(180deg,transparent,var(--indigo),transparent);opacity:.7;transition:opacity .3s;}
.metric-card:nth-child(2):hover::after{opacity:1;box-shadow:0 0 8px var(--indigo);}
.metric-card:nth-child(3)::after{content:'';position:absolute;left:0;top:12%;height:76%;width:2px;border-radius:2px;background:linear-gradient(180deg,transparent,var(--amber),transparent);opacity:.7;transition:opacity .3s;}
.metric-card:nth-child(3):hover::after{opacity:1;box-shadow:0 0 8px var(--amber);}
.metric-card:nth-child(1) .metric-val::before{
  content:'';position:absolute;inset:-18px;border-radius:50%;
  background:radial-gradient(circle,rgba(52,211,153,.13) 0%,transparent 70%);
  animation:orb-drift 5s ease-in-out infinite;pointer-events:none;z-index:0;
}
.metric-card:nth-child(2) .metric-val::before{
  content:'';position:absolute;inset:-18px;border-radius:50%;
  background:radial-gradient(circle,rgba(129,140,248,.13) 0%,transparent 70%);
  animation:orb-drift 6s ease-in-out infinite reverse;pointer-events:none;z-index:0;
}
.metric-card:nth-child(3) .metric-val::before{
  content:'';position:absolute;inset:-18px;border-radius:50%;
  background:radial-gradient(circle,rgba(251,191,36,.12) 0%,transparent 70%);
  animation:orb-drift 7s ease-in-out infinite;pointer-events:none;z-index:0;
}
.metric-val{position:relative;}
@keyframes orb-drift{
  0%,100%{transform:translateY(0) scale(1);opacity:.8}
  50%{transform:translateY(-6px) scale(1.1);opacity:1}
}
.metric-card:nth-child(1){animation-delay:.05s}
.metric-card:nth-child(1)::before{content:'';position:absolute;bottom:0;right:0;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at bottom right,rgba(52,211,153,.18) 0%,transparent 70%);pointer-events:none;z-index:0;transition:opacity .3s}
.metric-card:nth-child(1):hover::before{opacity:1.6}
.metric-card:nth-child(2){animation-delay:.15s}
.metric-card:nth-child(2)::before{content:'';position:absolute;bottom:0;right:0;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at bottom right,rgba(129,140,248,.18) 0%,transparent 70%);pointer-events:none;z-index:0;transition:opacity .3s}
.metric-card:nth-child(2):hover::before{opacity:1.6}
.metric-card:nth-child(3){animation-delay:.25s}
.metric-card:nth-child(3)::before{content:'';position:absolute;bottom:0;right:0;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at bottom right,rgba(251,191,36,.16) 0%,transparent 70%);pointer-events:none;z-index:0;transition:opacity .3s}
.metric-card:nth-child(3):hover::before{opacity:1.6}
@keyframes card-enter{
  from{opacity:0;transform:translateY(10px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.metric-card:nth-child(1):hover{border-color:rgba(52,211,153,.35);box-shadow:0 8px 24px rgba(0,0,0,.25),0 0 0 1px rgba(52,211,153,.15),inset 0 0 20px rgba(52,211,153,.04),0 4px 18px -4px rgba(52,211,153,.35)}
.metric-card:nth-child(2):hover{border-color:rgba(129,140,248,.35);box-shadow:0 8px 24px rgba(0,0,0,.25),0 0 0 1px rgba(129,140,248,.15),inset 0 0 20px rgba(129,140,248,.04),0 4px 18px -4px rgba(129,140,248,.35)}
.metric-card:nth-child(3):hover{border-color:rgba(251,191,36,.35);box-shadow:0 8px 24px rgba(0,0,0,.25),0 0 0 1px rgba(251,191,36,.15),inset 0 0 20px rgba(251,191,36,.04),0 4px 18px -4px rgba(251,191,36,.35)}
.metric-card:hover{border-color:var(--bH);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.25)}
.metric-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--bH),transparent);opacity:.6;
  animation:shimmer 3s ease-in-out infinite;
}
.metric-card:nth-child(1)::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--green),var(--cyan),var(--green),transparent);background-size:200% 100%;border-radius:var(--r) var(--r) 0 0;
  animation:accent-pulse-green 3s ease-in-out infinite,accent-sweep 2.4s linear infinite;
}
.metric-card:nth-child(2)::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--indigo),var(--purple),var(--indigo),transparent);background-size:200% 100%;border-radius:var(--r) var(--r) 0 0;
  animation:accent-pulse-indigo 3s ease-in-out infinite,accent-sweep 2.8s linear infinite;
}
.metric-card:nth-child(3)::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--amber),#f97316,var(--amber),transparent);background-size:200% 100%;border-radius:var(--r) var(--r) 0 0;
  animation:accent-pulse-amber 3s ease-in-out infinite,accent-sweep 3.2s linear infinite;
}
@keyframes accent-sweep{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
@keyframes accent-pulse-green{
  0%,100%{box-shadow:0 0 4px rgba(52,211,153,.3);opacity:.8}
  50%{box-shadow:0 0 10px rgba(52,211,153,.7);opacity:1}
}
@keyframes accent-pulse-indigo{
  0%,100%{box-shadow:0 0 4px rgba(129,140,248,.3);opacity:.8}
  50%{box-shadow:0 0 10px rgba(129,140,248,.7);opacity:1}
}
@keyframes accent-pulse-amber{
  0%,100%{box-shadow:0 0 4px rgba(251,191,36,.3);opacity:.8}
  50%{box-shadow:0 0 10px rgba(251,191,36,.7);opacity:1}
}
@keyframes shimmer{
  0%,100%{opacity:.3;transform:scaleX(.6)}
  50%{opacity:.8;transform:scaleX(1)}
}
.metric-icon{font-size:16px;margin-bottom:10px;display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px;background:var(--glass);border:1px solid var(--b);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.metric-card:nth-child(1) .metric-icon{background:rgba(52,211,153,.10);border-color:rgba(52,211,153,.20);box-shadow:0 0 10px rgba(52,211,153,.15)}
.metric-card:nth-child(2) .metric-icon{background:rgba(129,140,248,.10);border-color:rgba(129,140,248,.20);box-shadow:0 0 10px rgba(129,140,248,.15)}
.metric-card:nth-child(3) .metric-icon{background:rgba(251,191,36,.10);border-color:rgba(251,191,36,.20);box-shadow:0 0 10px rgba(251,191,36,.15)}
.metric-value{
  font-size:30px;font-weight:700;line-height:1;margin-bottom:3px;
  letter-spacing:-.03em;font-variant-numeric:tabular-nums;
}
.mv-green {background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mv-indigo{background:linear-gradient(135deg,var(--indigo),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mv-amber {background:linear-gradient(135deg,var(--amber),#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.metric-label{font-size:11px;color:var(--dim);font-weight:500}

/* ── Canvas area (office) ── */
#office-area::after{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.13) 2px,
    rgba(0,0,0,.13) 4px
  );
  pointer-events:none;
  z-index:2;
  border-radius:var(--r);
  opacity:.4;
}
#office-area{
  grid-column:2;grid-row:2;
  position:relative;overflow:hidden;
  border-radius:var(--r);
  border:1px solid transparent;
  background:#07070e;
  box-shadow:0 0 0 1px rgba(129,140,248,.18),0 0 32px rgba(99,102,241,.07),inset 0 0 0 1px rgba(255,255,255,.04);
  background-clip:padding-box;
}
#stage{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
#canvas-wrap{position:relative}
#bg-canvas,#three-canvas{position:absolute;top:0;left:0;display:block}
#bg-canvas{z-index:1}
#three-canvas{z-index:2;pointer-events:none}
#labels{
  position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:3;pointer-events:none;
}
.event-item{animation:evt-enter .4s cubic-bezier(.22,.68,0,1.2) both}
.event-item:nth-child(1){animation-delay:.03s}
.event-item:nth-child(2){animation-delay:.08s}
.event-item:nth-child(3){animation-delay:.13s}
.event-item:nth-child(4){animation-delay:.18s}
.event-item:nth-child(5){animation-delay:.23s}
.event-item:nth-child(n+6){animation-delay:.28s}
@keyframes evt-enter{
  from{opacity:0;transform:translateX(-8px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes labelGlow{
  0%,100%{box-shadow:0 0 6px rgba(129,140,248,.20),0 2px 8px rgba(0,0,0,.4)}
  50%{box-shadow:0 0 14px rgba(129,140,248,.45),0 4px 12px rgba(0,0,0,.5)}
}
.role-label{
  position:absolute;transform:translate(-50%,-50%);
  background:rgba(7,7,14,.85);
  border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:3px 9px;
  font-size:9px;font-family:var(--mono);font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;
  backdrop-filter:blur(6px);
  pointer-events:none;
  animation:labelGlow 3s ease-in-out infinite;
  transition:opacity .3s;
}
.role-label.genie{
  background:rgba(99,102,241,.22);
  border-color:rgba(129,140,248,.50);
  color:var(--indigo);font-size:10px;
  border-radius:20px;
  z-index: 10;
  pointer-events: none;
}


/* ── Sessions sidebar (left) ── */
#agents-strip{
  grid-column:1;grid-row:1/3;
  background:var(--glass);border:1px solid var(--b);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-radius:var(--r);
  display:flex;flex-direction:column;overflow:hidden;
}
.strip-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--b);flex-shrink:0;
}
.strip-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;background:linear-gradient(90deg,var(--indigo),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#sessionsContainer{
  display:flex;flex-direction:column;
  overflow-y:auto;flex:1;
  padding:8px 10px;gap:6px;
}
#sessionsContainer::-webkit-scrollbar{width:3px}
#sessionsContainer::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}

.session-section{
  flex-shrink:0;
  display:flex;flex-direction:column;
}
.session-header{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;
  border-radius:6px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  margin-bottom:5px;
  flex-shrink:0;
}
.session-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--green);animation:lp 2s ease-in-out infinite;
}
.session-dot.idle{background:var(--dim2);animation:none;}
.session-cwd{
  font-size:10px;color:var(--dim);font-family:var(--mono);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
}
.session-badge{
  font-size:9px;font-weight:700;text-transform:uppercase;
  padding:1px 5px;border-radius:3px;flex-shrink:0;
  background:rgba(129,140,248,.15);color:var(--indigo);
}
.session-badge.cli{background:rgba(34,211,238,.12);color:var(--cyan);}
.session-agents{
  display:flex;flex-direction:column;gap:4px;
  padding-left:4px;
}

.agent-tile{
  border-radius:8px;padding:10px 12px;
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);
  transition:all .15s;position:relative;overflow:hidden;
}
.agent-tile:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.10)}
.agent-tile.at-working{border-left:2px solid var(--green)}
.agent-tile.at-working::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:40%;
  background:linear-gradient(90deg,transparent,rgba(52,211,153,.03),transparent);
  animation:shimmer 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes shimmer{0%,100%{opacity:0}50%{opacity:1}}
.agent-avatar{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
}
.agent-info{min-width:0}
.agent-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:1px}
.agent-task{font-size:10px;color:var(--dim2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Status-pill (BTW pattern: 1px border accent, mono uppercase, rounded-full) */
.agent-status{
  font-family:var(--mono);font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  padding:2px 7px;border-radius:9999px;border:1px solid;
  background:transparent;flex-shrink:0;white-space:nowrap;
  position:relative;z-index:1;
}
.agent-status.st-working{color:var(--green);border-color:rgba(52,211,153,.4)}
.agent-status.st-idle   {color:var(--amber);border-color:rgba(251,191,36,.4)}
.agent-status.st-failed {color:var(--red);  border-color:rgba(248,113,113,.4)}
.agent-status.st-done   {color:var(--dim);  border-color:rgba(148,163,184,.3)}

.empty-strip{
  padding:20px 12px;
  font-size:11px;color:var(--dim2);text-align:center;
}

/* ── Kanban panel ── */
#kanban-panel {
  position: absolute;
  bottom: 14px;
  left: 14px;
  width: 320px;
  z-index: 10;
  background: rgba(5, 10, 22, 0.82);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(0, 212, 255, 0.18);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.04);
  pointer-events: auto;
  transition: height 0.2s ease;
}
#kanban-panel.collapsed .kb-columns { display: none; }
.kb-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid rgba(0,212,255,0.12);
  background: rgba(0, 212, 255, 0.05);
}
.kb-title {
  font-size: 9px; font-weight: 700; letter-spacing: .12em;
  color: var(--cyan); text-transform: uppercase; font-family: var(--mono);
}
.kb-toggle {
  background: none; border: none; color: var(--dim2); cursor: pointer;
  font-size: 14px; line-height: 1; padding: 0 2px;
  transition: color .15s;
}
.kb-toggle:hover { color: var(--cyan); }
.kb-columns {
  display: flex; gap: 0;
}
.kb-col {
  flex: 1; border-right: 1px solid rgba(255,255,255,0.05);
  min-width: 0;
}
.kb-col:last-child { border-right: none; }
.kb-col-header {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 8px;
  font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
  color: var(--dim2); border-bottom: 1px solid rgba(255,255,255,0.04);
}
.kb-col-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.dot-queued { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
.dot-active { background: var(--green); box-shadow: 0 0 6px var(--green); animation: lp 2s ease-in-out infinite; }
.dot-done   { background: var(--dim2); }
.kb-col-count {
  margin-left: auto;
  background: rgba(255,255,255,0.07); border-radius: 8px;
  padding: 1px 5px; font-size: 8px; font-weight: 700;
  color: var(--dim); font-family: var(--mono);
}
.kb-col-body {
  padding: 6px 5px; display: flex; flex-direction: column; gap: 3px;
  max-height: 160px; overflow-y: auto; min-height: 32px;
}
.kb-col-body::-webkit-scrollbar { width: 2px; }
.kb-col-body::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 2px; }
.kb-card {
  border-radius: 5px; padding: 5px 7px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  cursor: pointer; transition: all .15s;
}
.kb-card:hover {
  background: rgba(0, 212, 255, 0.08);
  border-color: rgba(0, 212, 255, 0.25);
  transform: translateY(-1px);
}
.kb-card.wip {
  border-color: rgba(52, 211, 153, 0.25);
  background: rgba(52, 211, 153, 0.06);
}
.kb-card.done { opacity: 0.6; }
.kb-card-type {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  color: var(--cyan); letter-spacing: .06em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.kb-card.wip .kb-card-type { color: var(--green); }
.kb-card-desc {
  font-size: 9px; color: var(--dim); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.kb-card-time {
  font-size: 8px; color: var(--dim2); margin-top: 2px;
  font-family: var(--mono); font-variant-numeric: tabular-nums;
}

/* ── Timeline panel ── */
#timeline-panel{
  grid-column:3;grid-row:1/3;
  background:var(--glass);border:1px solid var(--b);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-radius:var(--r);
  display:flex;flex-direction:column;overflow:hidden;
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;border-bottom:1px solid var(--b);flex-shrink:0;
}
.card-title{
  font-family:var(--mono);font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.12em;color:var(--dim);
}
/* BTW eyebrow `· LABEL ·` — на всех панельных заголовках */
.card-title::before, .card-title::after,
.strip-title::before, .strip-title::after,
.kb-title::before,   .kb-title::after{
  content:'·';color:var(--dim);
  -webkit-text-fill-color:var(--dim); /* override .strip-title gradient transparent */
  background:none;-webkit-background-clip:initial;
  font-weight:400;opacity:.7;
}
.card-title::before, .strip-title::before, .kb-title::before{margin-right:6px;}
.card-title::after,  .strip-title::after,  .kb-title::after {margin-left:6px;}
.tl-body{
  flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 10px;
  display:flex;flex-direction:column;gap:2px;
}
.tl-body::-webkit-scrollbar{width:3px}
.tl-body::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
.tl-item{padding:9px 11px;border-radius:6px;transition:background .1s;border-bottom:1px solid rgba(255,255,255,.04)}
.tl-item:hover{background:rgba(255,255,255,.06)}
.tl-row1{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:nowrap;min-width:0}
.tl-time{font-family:var(--mono);font-size:11px;color:var(--dim);flex-shrink:0;font-variant-numeric:tabular-nums}
.tl-badge{
  font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;padding:1px 5px;border-radius:3px;
  white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:4px;
}
.tb-spawn{background:rgba(96,165,250,.15);color:var(--blue)}
.tb-tool {background:rgba(148,163,184,.12);color:var(--dim)}
.tb-done {background:rgba(52,211,153,.12);color:var(--green)}
.tb-error{background:rgba(248,113,113,.15);color:var(--red)}
.tb-flow {background:rgba(167,139,250,.15);color:var(--purple)}
.tb-wait {background:rgba(251,191,36,.12);color:var(--amber)}
.tl-agent{font-size:11px;font-weight:600;color:var(--dim)}
.tl-detail{font-size:12px;line-height:1.45;color:var(--fg,#e5e7eb);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── Timeline: session chip ── */
.tl-sid{
  display:inline-flex;align-items:center;gap:4px;
  font-family:var(--mono);font-size:11px;color:var(--dim);
  background:rgba(255,255,255,.07);border-radius:4px;padding:1px 6px;flex-shrink:0;
}
.tl-sid-dot{
  width:9px;height:9px;border-radius:50%;flex-shrink:0;
}

/* ── Timeline: MCP breakdown chips ── */
.tl-mcp-chain{display:inline-flex;align-items:center;gap:3px;flex-wrap:nowrap;min-width:0}
.tl-mcp-chip{
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  padding:1px 4px;border-radius:3px;white-space:nowrap;flex-shrink:0;
}
.tl-mcp-chip.chip-mcp{background:rgba(167,139,250,.15);color:var(--purple)}
.tl-mcp-chip.chip-svc{background:rgba(34,211,238,.15);color:var(--cyan)}
.tl-mcp-chip.chip-method{background:rgba(148,163,184,.12);color:var(--dim)}
.tl-mcp-sep{color:var(--dim2);font-size:12px}

/* ── Timeline: row1 separator dots ── */
.tl-sep{color:var(--dim2);font-size:11px;margin:0 1px}

/* ── Timeline: duration ── */
.tl-dur{font-family:var(--mono);font-size:11px;color:var(--dim2);flex-shrink:0}

/* ── Timeline: in-progress pulse ── */
.tl-item.in-progress .tl-row1::after{
  content:'';display:inline-block;width:5px;height:5px;border-radius:50%;
  background:var(--amber);margin-left:2px;
  animation:tlpulse 1.4s ease-in-out infinite;
}
@keyframes tlpulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ── Timeline: group (collapsed) ── */
.tl-group{padding:9px 11px;border-radius:6px;transition:background .1s;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04)}
.tl-group:hover{background:rgba(255,255,255,.06)}
.tl-group-summary{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;min-width:0}
.tl-group-count{
  font-size:12px;font-weight:700;background:rgba(148,163,184,.15);
  color:var(--dim);padding:1px 5px;border-radius:3px;
  white-space:nowrap;flex-shrink:0;
}
.tl-group-range{font-family:var(--mono);font-size:11px;color:var(--dim2)}
.tl-group-toggle{font-size:11px;color:var(--dim2);margin-left:auto;flex-shrink:0}
.tl-group-body{display:none;margin-top:4px;padding-top:4px;border-top:1px solid var(--b)}
.tl-group.expanded .tl-group-body{display:flex;flex-direction:column;gap:2px}
.tl-group.expanded .tl-group-toggle{transform:rotate(180deg)}

/* ── Timeline: sticky time-header ── */
.tl-time-header{
  position:sticky;top:0;z-index:1;
  background:var(--bg-2,var(--bg));
  padding:6px 9px;
  font:600 12px var(--mono);color:var(--fg,#cbd0da);text-transform:uppercase;
  letter-spacing:.06em;border-bottom:1px solid rgba(255,255,255,.08);
  margin:0 -10px;
}

/* ── Timeline: filter chips ── */
.tl-filters{
  display:flex;flex-wrap:wrap;gap:5px;
  padding:8px 10px 4px;
  border-bottom:1px solid var(--b);flex-shrink:0;
}
.tl-filter-chip{
  font-size:12px;font-weight:600;padding:6px 12px;border-radius:6px;
  border:1px solid rgba(255,255,255,.12);
  background:transparent;color:var(--dim);cursor:pointer;
  font-family:var(--sans);transition:all .15s;white-space:nowrap;
}
.tl-filter-chip.active{
  background:rgba(129,140,248,.2);border-color:rgba(129,140,248,.4);
  color:var(--indigo);
}
.tl-filter-chip:hover:not(.active){background:rgba(255,255,255,.05)}

/* ── Timeline: empty state ── */
.tl-empty{padding:24px;text-align:center;font-size:11px;color:var(--dim2)}

/* ── Responsive: mob-tabs hidden on desktop/tablet ── */
.mob-tabs {
  display: none;
}

/* ── Responsive: Tablet (768px – 1023px) ── */
@media (min-width: 768px) and (max-width: 1023px) {
  #agents-strip { display: none; }
  .metrics-row {
    grid-column: 1 / -1;
    grid-row: 1;
  }
  #main {
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto 1fr;
  }
  #office-area {
    grid-column: 1;
    grid-row: 2;
  }
  #timeline-panel {
    grid-column: 2;
    grid-row: 1 / 3;
  }
}

/* ── Responsive: Mobile (< 768px) or phone landscape ── */
@media (max-width: 767px), (orientation: landscape) and (max-height: 500px) {
  .blob { display: none !important; }
  #agents-strip { display: none !important; }
  .metrics-row { display: none !important; }
  .h-clock { display: none; }
  .h-meta { display: none; }
  .release-chip { display: none !important; }

  header {
    grid-template-columns: auto 1fr;
    padding: 0 14px;
  }

  .mob-tabs {
    display: flex;
    gap: 4px;
    justify-content: flex-end;
    align-items: center;
  }
  .mob-tab {
    padding: 5px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,.10);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    font-family: var(--sans);
    transition: all .15s;
  }
  .mob-tab.active {
    background: rgba(129,140,248,.15);
    border-color: rgba(129,140,248,.35);
    color: var(--indigo);
  }

  #main {
    display: flex;
    flex-direction: column;
    padding: 0;
    gap: 0;
    overflow: hidden;
  }

  #office-area {
    flex: 1;
    border-radius: 0;
    border: none;
  }

  #timeline-panel {
    flex: 1;
    border-radius: 0;
    border-left: none;
    border-right: none;
    border-bottom: none;
  }

  #office-area.tab-hidden,
  #timeline-panel.tab-hidden {
    display: none !important;
  }

  #stage {
    overflow: hidden;
    align-items: center;
    justify-content: center;
  }
  #canvas-wrap {
    position: relative;
    flex-shrink: 0;
  }
  #kanban-panel {
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    width: auto !important;
    max-height: 130px;
    border-radius: 0;
    border-left: none;
    border-right: none;
    border-bottom: none;
  }
}
</style>
</head>
<body>

<!-- Ambient blobs -->
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div id="shell">

  <!-- Header -->
  <header>
    <div class="logo-wrap">
      <div class="logo-icon">A</div>
      <span class="logo-text">Agent Dashboard</span>
      <div class="live-chip"><span class="live-dot"></span>Live</div>
    </div>
    <nav class="mob-tabs" id="mobTabs">
      <button class="mob-tab active" data-tab="workspace">Workspace</button>
      <button class="mob-tab" data-tab="timeline">Timeline</button>
    </nav>
    <div class="h-clock" id="clock">--:--:--</div>
    <div class="h-right" style="justify-self:end">
      <div class="release-chip" id="release-chip" style="display:none">
        <span class="release-chip-label">Last Release</span>
        <span id="release-time"></span>
      </div>
      <div class="h-meta">
        <span id="fps-counter">-- fps</span>
      </div>
    </div>
  </header>

  <!-- Main grid -->
  <div id="main">

    <!-- Sessions sidebar (left) -->
    <div id="agents-strip">
      <div class="strip-header">
        <span class="strip-title">Sessions</span>
        <span style="font-size:11px;color:var(--dim)" id="sessionCount">0 active</span>
      </div>
      <div id="sessionsContainer"></div>
    </div>

    <!-- Metric cards -->
    <div class="metrics-row">
      <div class="metric-card">
        <span class="metric-icon">&#9632;</span>
        <div class="metric-value mv-green" id="metricAgents">0</div>
        <div class="metric-label">Active Agents</div>
      </div>
      <div class="metric-card">
        <span class="metric-icon">&#9670;</span>
        <div class="metric-value mv-indigo" id="metricEvents">0</div>
        <div class="metric-label">Events Total</div>
      </div>
      <div class="metric-card">
        <span class="metric-icon">&#9650;</span>
        <div class="metric-value mv-amber" id="metricTime">--</div>
        <div class="metric-label">Session Time</div>
      </div>
    </div>

    <!-- Office canvas -->
    <div id="office-area">
      <div id="stage">
        <div id="canvas-wrap">
          <canvas id="bg-canvas"></canvas>
          <canvas id="three-canvas"></canvas>
          <div id="labels"></div>
        </div>
      </div>
      <!-- Kanban overlay -->
      <div id="kanban-panel">
        <div class="kb-header">
          <span class="kb-title">AGENTS</span>
          <button class="kb-toggle" onclick="toggleKanban()" title="Toggle kanban">&#8861;</button>
        </div>
        <div class="kb-columns" id="kb-columns">
          <div class="kb-col">
            <div class="kb-col-header">
              <span class="kb-col-dot dot-queued"></span>
              <span>Queued</span>
              <span class="kb-col-count" id="kb-todo-count">0</span>
            </div>
            <div class="kb-col-body" id="kb-todo"></div>
          </div>
          <div class="kb-col">
            <div class="kb-col-header">
              <span class="kb-col-dot dot-active"></span>
              <span>Active</span>
              <span class="kb-col-count" id="kb-wip-count">0</span>
            </div>
            <div class="kb-col-body" id="kb-wip"></div>
          </div>
          <div class="kb-col">
            <div class="kb-col-header">
              <span class="kb-col-dot dot-done"></span>
              <span>Done</span>
              <span class="kb-col-count" id="kb-done-count">0</span>
            </div>
            <div class="kb-col-body" id="kb-done"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Timeline panel -->
    <div id="timeline-panel" class="tab-hidden">
      <div class="card-header">
        <span class="card-title">Timeline</span>
        <span style="font-size:10px;color:var(--dim2)" id="tlClock">--:--</span>
      </div>
      <div class="tl-filters" id="tlFilters">
        <button class="tl-filter-chip active" data-filter="all">All</button>
        <button class="tl-filter-chip" data-filter="tools">Tools</button>
        <button class="tl-filter-chip" data-filter="agents">Agents</button>
        <button class="tl-filter-chip" data-filter="mcp">MCP</button>
        <button class="tl-filter-chip" data-filter="errors">Errors</button>
      </div>
      <div class="tl-body" id="timelineBody"></div>
    </div>

  </div><!-- #main -->
</div><!-- #shell -->

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  AGENT COLORS
// ═══════════════════════════════════════════════════════════
const AGENT_COLORS = {
  // ── Core dev ──
  'developer':               {bg:'rgba(52,211,153,.15)',   fg:'#34d399'},
  'senior-developer':        {bg:'rgba(52,211,153,.15)',   fg:'#34d399'},
  'frontend-developer':      {bg:'rgba(244,114,182,.15)',  fg:'#f472b6'},
  'backend-architect':       {bg:'rgba(34,211,238,.15)',   fg:'#22d3ee'},
  'mobile-app-builder':      {bg:'rgba(124,58,237,.15)',   fg:'#7c3aed'},
  'rapid-prototyper':        {bg:'rgba(252,211,77,.15)',   fg:'#fcd34d'},
  // ── QA / Testing ──
  'test-engineer':           {bg:'rgba(251,191,36,.15)',   fg:'#fbbf24'},
  'tester':                  {bg:'rgba(251,191,36,.15)',   fg:'#fbbf24'},
  'api-tester':              {bg:'rgba(234,179,8,.15)',    fg:'#eab308'},
  'model-qa':                {bg:'rgba(132,204,22,.15)',   fg:'#84cc16'},
  // ── Review / Debug ──
  'reviewer':                {bg:'rgba(167,139,250,.15)',  fg:'#a78bfa'},
  'debugger':                {bg:'rgba(248,113,113,.15)',  fg:'#f87171'},
  'security-engineer':       {bg:'rgba(239,68,68,.15)',    fg:'#ef4444'},
  'threat-detection-engineer':{bg:'rgba(220,38,38,.15)',   fg:'#dc2626'},
  // ── Research / Docs ──
  'researcher':              {bg:'rgba(96,165,250,.15)',   fg:'#60a5fa'},
  'technical-writer':        {bg:'rgba(56,189,248,.15)',   fg:'#38bdf8'},
  'claude-code-guide':       {bg:'rgba(99,102,241,.15)',   fg:'#6366f1'},
  'tool-evaluator':          {bg:'rgba(20,184,166,.15)',   fg:'#14b8a6'},
  // ── AI / ML ──
  'ai-engineer':             {bg:'rgba(16,185,129,.15)',   fg:'#10b981'},
  'optimization-architect':  {bg:'rgba(5,150,105,.15)',    fg:'#059669'},
  'image-prompt-engineer':   {bg:'rgba(236,72,153,.15)',   fg:'#ec4899'},
  // ── DevOps / Infra ──

const GW = 860, GH = 560;
const CX = GW / 2, CY = 350;
const DESK_RADIUS = 145;
const NUM_DESKS   = 6;

const stations = [];
for (let i = 0; i < NUM_DESKS; i++) {
  const a = (i * (360 / NUM_DESKS) - 90) * Math.PI / 180;
  const dirX = Math.cos(a), dirY = Math.sin(a);
  const deskX = CX + dirX * DESK_RADIUS;
  const deskY = CY + dirY * DESK_RADIUS;
  // Label at the midpoint of the far (outward) edge of the monitor, rotated along that edge.
  // CH=32 is aligned radially; perpendicular gives the edge direction.
  const perpAngle = Math.atan2(dirX, -dirY);
  const labelAngle = perpAngle > Math.PI / 2 ? perpAngle - Math.PI :
                     perpAngle < -Math.PI / 2 ? perpAngle + Math.PI : perpAngle;
  stations.push({
    id: i, angle: a, dirX, dirY,
    deskX, deskY,
    chairX: CX + dirX * (DESK_RADIUS - 38),
    chairY: CY + dirY * (DESK_RADIUS - 38),
    labelX: deskX + dirX * 16,
    labelY: deskY + dirY * 16,
    labelAngleDeg: labelAngle * 180 / Math.PI,
  });
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  const aw = officeArea.clientWidth;
  const ah = officeArea.clientHeight;
  const isMobile = window.innerWidth < 768 || (window.innerHeight < 500 && window.innerWidth > window.innerHeight);
  if (isMobile) dpr = Math.min(dpr, 1.5);
  scaleRatio = isMobile ? Math.max(aw / GW, ah / GH) : Math.min(aw / GW, ah / GH);

  cssW = Math.floor(GW * scaleRatio);
  cssH = Math.floor(GH * scaleRatio);

  wrap.style.width  = cssW + 'px';
  wrap.style.height = cssH + 'px';

  bgCvs.style.width  = cssW + 'px';
  bgCvs.style.height = cssH + 'px';
  bgCvs.width  = cssW * dpr;
  bgCvs.height = cssH * dpr;
  bgCtx.setTransform(dpr * scaleRatio, 0, 0, dpr * scaleRatio, 0, 0);

  threeCanvas.style.width  = cssW + 'px';
  threeCanvas.style.height = cssH + 'px';
  renderer.setSize(cssW * dpr, cssH * dpr, false);
  renderer.setPixelRatio(1);

  camera.top    = 0;  camera.bottom = GH;
  camera.near   = -1000; camera.far = 1000;

// ── Space window (top panorama + black hole) ──
function drawAccretionDisk(g) {
  for (let i = 0; i < 3; i++) {
    const angle = diskAngle * 0.7 + i * Math.PI * 0.66;
    const dg = g.createLinearGradient(
      BH_X + Math.cos(angle) * BH_R * 2, BH_Y + Math.sin(angle) * BH_R * 0.6,
      BH_X - Math.cos(angle) * BH_R * 2, BH_Y - Math.sin(angle) * BH_R * 0.6
    );
    dg.addColorStop(0,   'rgba(255,90,15,0.0)');
    dg.addColorStop(0.3, 'rgba(255,130,30,0.5)');
    dg.addColorStop(0.5, 'rgba(255,160,50,0.7)');
    dg.addColorStop(0.7, 'rgba(200,80,10,0.5)');
    dg.addColorStop(1,   'rgba(120,30,5,0.0)');
    g.save();
    g.translate(BH_X, BH_Y); g.rotate(diskAngle * 0.5 + i * 0.4); g.scale(1, 0.28);
    g.beginPath(); g.ellipse(0, 0, BH_R * 2.4, BH_R * 2.4, 0, 0, Math.PI * 2);
    g.fillStyle = dg; g.fill(); g.restore();
  }
  g.save(); g.translate(BH_X, BH_Y); g.scale(1, 0.22);
  g.beginPath(); g.ellipse(0, 0, BH_R * 1.55, BH_R * 1.55, diskAngle, 0, Math.PI * 2);
  const ir = g.createRadialGradient(0, 0, BH_R * 0.9, 0, 0, BH_R * 1.6);
  ir.addColorStop(0,   'rgba(255,200,80,0.0)');
  ir.addColorStop(0.4, 'rgba(255,180,60,0.9)');
  ir.addColorStop(0.7, 'rgba(255,120,30,0.6)');
  ir.addColorStop(1,   'rgba(200,60,10,0.0)');
  g.fillStyle = ir; g.fill(); g.restore();

  const hpX = BH_X + Math.cos(diskAngle * 1.5) * BH_R * 1.8;
  const hpY = BH_Y + Math.sin(diskAngle * 1.5) * BH_R * 0.45;
  const hp  = g.createRadialGradient(hpX, hpY, 0, hpX, hpY, 14);
  hp.addColorStop(0, 'rgba(255,240,180,0.9)'); hp.addColorStop(0.4, 'rgba(255,160,50,0.5)'); hp.addColorStop(1,'rgba(255,80,10,0.0)');
  g.fillStyle = hp; g.beginPath(); g.arc(hpX, hpY, 14, 0, Math.PI * 2); g.fill();
}

// ── Metal grid floor ──
function drawFloor(g) {
  const GRID = 38, floorX = 50, floorY = 165, floorW = GW - 100, floorH = GH - 165;
  const pulse = 0.4 + 0.15 * Math.sin(ledPhase * 2.5);
  g.save(); g.beginPath(); g.rect(floorX, floorY, floorW, floorH); g.clip();

  for (let gx = floorX; gx <= floorX + floorW; gx += GRID) {
    const lg = g.createLinearGradient(0, floorY, 0, floorY + floorH);
    lg.addColorStop(0,   `rgba(26,80,160,${pulse * 0.6})`);
    lg.addColorStop(0.3, `rgba(20,100,200,${pulse})`);
    lg.addColorStop(0.7, `rgba(20,80,160,${pulse * 0.8})`);
    lg.addColorStop(1,   `rgba(10,40,80,${pulse * 0.4})`);
    g.beginPath(); g.moveTo(gx, floorY); g.lineTo(gx, floorY + floorH);
    g.strokeStyle = lg; g.lineWidth = 0.7; g.stroke();
  }
  for (let gy = floorY; gy <= floorY + floorH; gy += GRID) {
    const lg = g.createLinearGradient(floorX, 0, floorX + floorW, 0);
    lg.addColorStop(0,   `rgba(26,80,160,${pulse * 0.4})`);
    lg.addColorStop(0.5, `rgba(30,120,220,${pulse * 0.9})`);
    lg.addColorStop(1,   `rgba(26,80,160,${pulse * 0.4})`);
    g.beginPath(); g.moveTo(floorX, gy); g.lineTo(floorX + floorW, gy);
    g.strokeStyle = lg; g.lineWidth = 0.7; g.stroke();
  }
  for (let gx = floorX; gx <= floorX + floorW; gx += GRID) {
    for (let gy = floorY; gy <= floorY + floorH; gy += GRID) {
      const dp = 0.4 + 0.6 * Math.sin(ledPhase * 3 + gx * 0.1 + gy * 0.07);
      g.beginPath(); g.arc(gx, gy, 1.2, 0, Math.PI * 2);
      g.fillStyle = `rgba(40,140,255,${dp * 0.6})`; g.fill();
    }
  }
  g.restore();
}

// ── Cyan floor shimmer ──
function drawFloorShimmer(g) {
  const GRID = 42, floorX = 50, floorY = 165, floorW = GW - 100, floorH = GH - 165;
  g.save(); g.beginPath(); g.rect(floorX, floorY, floorW, floorH); g.clip();

  for (let row = 0; row * GRID < floorH + GRID; row++) {
    const yPos = floorY + row * GRID;
    const a = 0.055 + 0.04 * Math.sin(floorShimmerT * 0.5 + row * 0.3);
    g.strokeStyle = `rgba(0,212,255,${a})`; g.lineWidth = 0.5;
    g.beginPath(); g.moveTo(floorX, yPos); g.lineTo(floorX + floorW, yPos); g.stroke();
  }
  for (let col = 0; col * GRID < floorW + GRID; col++) {
    const xPos = floorX + col * GRID;
    const a = 0.04 + 0.03 * Math.sin(floorShimmerT * 0.4 + col * 0.25);
    g.strokeStyle = `rgba(0,212,255,${a})`; g.lineWidth = 0.5;
    g.beginPath(); g.moveTo(xPos, floorY); g.lineTo(xPos, floorY + floorH); g.stroke();
  }

  const egL = g.createLinearGradient(floorX, 0, floorX + 24, 0);
  egL.addColorStop(0, `rgba(0,212,255,${0.18 + 0.08 * Math.sin(floorShimmerT * 0.7)})`);
  egL.addColorStop(1, 'rgba(0,212,255,0)');
  g.fillStyle = egL; g.fillRect(floorX, floorY, 24, floorH);
  const egR = g.createLinearGradient(floorX + floorW, 0, floorX + floorW - 24, 0);
  egR.addColorStop(0, `rgba(0,212,255,${0.18 + 0.08 * Math.sin(floorShimmerT * 0.7 + 1.2)})`);
  egR.addColorStop(1, 'rgba(0,212,255,0)');
  g.fillStyle = egR; g.fillRect(floorX + floorW - 24, floorY, 24, floorH);

  g.restore();
}

// ── Wall indicators ──
function drawIndicators(g) {
  const all = [
    ...leftIndicators.map(i => ({...i, side: 'left'})),
    ...rightIndicators.map(i => ({...i, side: 'right'})),
  ];
  const colors = ['#00ff88', '#ff4466', '#ffdd00', '#00d4ff'];
  for (const ind of all) {
    const blink  = Math.sin(indicatorPhase + ind.y * 0.1) > 0.7;
    const active = ind.on && !blink;
    const color  = colors[Math.floor(ind.y * 0.02) % colors.length];
    g.beginPath(); g.arc(ind.x, ind.y, 3, 0, Math.PI * 2);
    g.fillStyle = active ? color : 'rgba(10,20,40,0.8)'; g.fill();
    if (active) {
      g.beginPath(); g.arc(ind.x, ind.y, 6, 0, Math.PI * 2);
      g.fillStyle = color + '33'; g.fill();
    }
  }
}

    const angle = Math.atan2(CY - st.deskY, CX - st.deskX);
    const CW = 52, CH = 32;
    // Color from stationColorMap if agent active, else default cyan
    const agColor = stationColorMap[st.id] || '#22d3ee';

    g.save();
    g.translate(st.deskX, st.deskY);
    g.rotate(angle + Math.PI / 2);

    g.shadowColor = `${agColor}73`;
    g.shadowBlur  = isMobileDevice ? 0 : 14;
    const bodyG = g.createLinearGradient(-CW/2, -CH/2, CW/2, CH/2);
    bodyG.addColorStop(0,   'rgba(200,220,240,0.90)');
    bodyG.addColorStop(0.4, 'rgba(175,198,225,0.82)');
    bodyG.addColorStop(1,   'rgba(135,162,195,0.70)');
    g.fillStyle = bodyG;
    g.beginPath(); rrPath(g, -CW/2, -CH/2, CW, CH, 4); g.fill();

    g.strokeStyle = `${agColor}8c`; g.lineWidth = 1;
    g.beginPath(); rrPath(g, -CW/2, -CH/2, CW, CH, 4); g.stroke();

    const screenG = g.createLinearGradient(-CW/2+6, -CH/2+5, CW/2-6, CH/2-8);
    screenG.addColorStop(0,   `rgba(0,180,255,${0.65 * pulseVal})`);
    screenG.addColorStop(0.5, `rgba(0,212,255,${0.82 * pulseVal})`);
    screenG.addColorStop(1,   `rgba(30,140,255,${0.55 * pulseVal})`);
    g.fillStyle = screenG;
    g.beginPath(); rrPath(g, -CW/2+6, -CH/2+5, CW-12, CH-12, 2); g.fill();

    g.strokeStyle = `rgba(120,240,255,${0.3 * pulseVal})`; g.lineWidth = 0.5; g.shadowBlur = 0;
    for (let sl = -CH/2+7; sl < CH/2-8; sl += 3) {
      g.beginPath(); g.moveTo(-CW/2+7, sl); g.lineTo(CW/2-7, sl); g.stroke();
    }
    const dotColors = ['rgba(0,255,100,0.9)','rgba(255,200,0,0.85)','rgba(0,212,255,0.9)'];
    for (let d = 0; d < 3; d++) {
      g.beginPath(); g.arc(-CW/2+8+d*6, CH/2-5, 1.5, 0, Math.PI*2);
      g.fillStyle = dotColors[d]; g.fill();
    }
    // Scrolling ticker for WIP stations
    if (stationScrollOffset[i] !== undefined) {
      const ticker = '> exec... \u2588 read... \u2588 build... \u2588 write... \u2588 ';
      g.font = '6px monospace';
      const tickerW = g.measureText(ticker).width;
      const sx = -CW/2+6, sy = -CH/2+5, sw = CW-12, sh = CH-12;
      g.save();
      g.beginPath(); rrPath(g, sx, sy, sw, sh, 2); g.clip();
      g.fillStyle = agColor + 'd9';
      g.textAlign = 'left';
      g.textBaseline = 'middle';
      const offset = stationScrollOffset[i] % tickerW;
      let tx = sx - offset;
      while (tx < sx + sw) {
        g.fillText(ticker, tx, 0);
        tx += tickerW;
      }
      g.restore();
    }

    const labels = ['CMD','NAV','ENG','OPS','SCI','COM'];
    g.fillStyle = 'rgba(10,30,60,0.85)'; g.font = 'bold 6px Courier New'; g.textAlign = 'center';
    g.fillText(labels[i] || 'SYS', 0, CH/2-4);
    g.restore();
    g.shadowBlur = 0; g.shadowColor = 'transparent';

    // Screen glow
    const glowR = g.createRadialGradient(st.deskX, st.deskY, 0, st.deskX, st.deskY, 44);
    glowR.addColorStop(0,   'rgba(0,212,255,0.10)');
    glowR.addColorStop(0.5, 'rgba(0,180,255,0.05)');
    glowR.addColorStop(1,   'rgba(0,212,255,0)');
    g.fillStyle = glowR; g.beginPath(); g.arc(st.deskX, st.deskY, 44, 0, Math.PI*2); g.fill();
  });

  // ── Overflow wall desks — draw monitor only when occupied ──
  Object.keys(stationColorMap).forEach(idxStr => {
    const stIdx = parseInt(idxStr);
    if (stIdx < NUM_DESKS) return;
    const st = getStation(stIdx);
    const cp = getConsolePulse(stIdx);
    const pulseVal = 0.7 + 0.3 * Math.sin(cp.phase);
    const wAngle = Math.atan2(CY - st.deskY, CX - st.deskX);
    const CW = 52, CH = 32;
    const agColor = stationColorMap[stIdx];

    g.save();
    g.translate(st.deskX, st.deskY);
    g.rotate(wAngle + Math.PI / 2);
    g.shadowColor = `${agColor}73`;
    g.shadowBlur  = isMobileDevice ? 0 : 14;
    const bodyG = g.createLinearGradient(-CW/2, -CH/2, CW/2, CH/2);
    bodyG.addColorStop(0,   'rgba(200,220,240,0.90)');
    bodyG.addColorStop(0.4, 'rgba(175,198,225,0.82)');
    bodyG.addColorStop(1,   'rgba(135,162,195,0.70)');
    g.fillStyle = bodyG;
    g.beginPath(); rrPath(g, -CW/2, -CH/2, CW, CH, 4); g.fill();
    g.strokeStyle = `${agColor}8c`; g.lineWidth = 1;
    g.beginPath(); rrPath(g, -CW/2, -CH/2, CW, CH, 4); g.stroke();
    const screenG = g.createLinearGradient(-CW/2+6, -CH/2+5, CW/2-6, CH/2-8);
    screenG.addColorStop(0,   `rgba(0,180,255,${0.65 * pulseVal})`);
    screenG.addColorStop(0.5, `rgba(0,212,255,${0.82 * pulseVal})`);
    screenG.addColorStop(1,   `rgba(30,140,255,${0.55 * pulseVal})`);
    g.fillStyle = screenG;
    g.beginPath(); rrPath(g, -CW/2+6, -CH/2+5, CW-12, CH-12, 2); g.fill();
    g.strokeStyle = `rgba(120,240,255,${0.3 * pulseVal})`; g.lineWidth = 0.5; g.shadowBlur = 0;
    for (let sl = -CH/2+7; sl < CH/2-8; sl += 3) {
      g.beginPath(); g.moveTo(-CW/2+7, sl); g.lineTo(CW/2-7, sl); g.stroke();
    }
    const dotColors = ['rgba(0,255,100,0.9)','rgba(255,200,0,0.85)','rgba(0,212,255,0.9)'];
    for (let d = 0; d < 3; d++) {
      g.beginPath(); g.arc(-CW/2+8+d*6, CH/2-5, 1.5, 0, Math.PI*2);
      g.fillStyle = dotColors[d]; g.fill();
    }
    if (stationScrollOffset[stIdx] !== undefined) {
      const ticker = '> exec... \u2588 read... \u2588 build... \u2588 write... \u2588 ';
      g.font = '6px monospace';
      const tickerW = g.measureText(ticker).width;
      const sx = -CW/2+6, sy = -CH/2+5, sw = CW-12, sh = CH-12;
      g.save();
      g.beginPath(); rrPath(g, sx, sy, sw, sh, 2); g.clip();
      g.fillStyle = agColor + 'd9'; g.textAlign = 'left'; g.textBaseline = 'middle';
      const offset = stationScrollOffset[stIdx] % tickerW;
      let tx = sx - offset;
      while (tx < sx + sw) { g.fillText(ticker, tx, 0); tx += tickerW; }
      g.restore();
    }
    g.fillStyle = 'rgba(10,30,60,0.85)'; g.font = 'bold 6px Courier New'; g.textAlign = 'center';
    g.fillText('EXT', 0, CH/2-4);
    g.restore();
    g.shadowBlur = 0; g.shadowColor = 'transparent';
    const glowRW = g.createRadialGradient(st.deskX, st.deskY, 0, st.deskX, st.deskY, 44);
    glowRW.addColorStop(0,   'rgba(0,212,255,0.10)');
    glowRW.addColorStop(0.5, 'rgba(0,180,255,0.05)');
    glowRW.addColorStop(1,   'rgba(0,212,255,0)');
    g.fillStyle = glowRW; g.beginPath(); g.arc(st.deskX, st.deskY, 44, 0, Math.PI*2); g.fill();
  });
}

// ── Holographic center ring — at CX, CY ──
function drawHoloRing(g) {
  const { rotation, pulsePhase } = holoRing;
  const ringR = 58, pulse = 0.8 + 0.2 * Math.sin(pulsePhase);

  g.save(); g.translate(CX, CY);

  const outerGlow = g.createRadialGradient(0, 0, ringR - 10, 0, 0, ringR + 24);
  outerGlow.addColorStop(0,   `rgba(0,212,255,${0.22 * pulse})`);
  outerGlow.addColorStop(0.5, `rgba(0,212,255,${0.09 * pulse})`);
  outerGlow.addColorStop(1,   'rgba(0,212,255,0)');
  g.fillStyle = outerGlow; g.beginPath(); g.arc(0, 0, ringR + 24, 0, Math.PI*2); g.fill();

  g.beginPath(); g.arc(0, 0, ringR, 0, Math.PI*2);
  g.strokeStyle = `rgba(0,212,255,${0.68 * pulse})`; g.lineWidth = 2.5;
  g.shadowColor = 'rgba(0,212,255,0.85)'; g.shadowBlur = isMobileDevice ? 0 : 12; g.stroke();

  g.beginPath(); g.arc(0, 0, ringR - 9, 0, Math.PI*2);
  g.strokeStyle = `rgba(0,212,255,${0.30 * pulse})`; g.lineWidth = 1; g.shadowBlur = isMobileDevice ? 0 : 5; g.stroke();

  g.save(); g.rotate(rotation);
  const dashCount = 12;
  for (let i = 0; i < dashCount; i++) {
    const a = (i / dashCount) * Math.PI * 2;
    g.beginPath();
    g.moveTo(Math.cos(a) * (ringR-4), Math.sin(a) * (ringR-4));
    g.lineTo(Math.cos(a) * (ringR+4), Math.sin(a) * (ringR+4));
    g.strokeStyle = `rgba(100,240,255,${0.92 * pulse})`; g.lineWidth = 2; g.shadowBlur = isMobileDevice ? 0 : 7; g.stroke();
  }
  g.restore();

  const cg = g.createRadialGradient(0, 0, 0, 0, 0, ringR - 9);
  cg.addColorStop(0,   `rgba(0,212,255,${0.12 * pulse})`);
  cg.addColorStop(0.6, `rgba(0,100,180,${0.06 * pulse})`);
  cg.addColorStop(1,   'rgba(0,0,0,0)');
  g.fillStyle = cg; g.beginPath(); g.arc(0, 0, ringR - 9, 0, Math.PI*2); g.fill();

  g.strokeStyle = `rgba(0,212,255,${0.20 * pulse})`; g.lineWidth = 0.8; g.shadowBlur = isMobileDevice ? 0 : 4;
  g.beginPath();
  g.moveTo(-(ringR-14), 0); g.lineTo(ringR-14, 0);
  g.moveTo(0, -(ringR-14)); g.lineTo(0, ringR-14);
  g.stroke();

  g.beginPath(); g.arc(0, 0, 3.5, 0, Math.PI*2);
  g.fillStyle = `rgba(0,230,255,${0.75 * pulse})`; g.shadowBlur = isMobileDevice ? 0 : 8; g.fill();

  g.restore(); g.shadowBlur = 0; g.shadowColor = 'transparent';
}

// ── Ambient glow ──
function drawAmbientGlow(g) {
  const ambGrad = g.createLinearGradient(0, 165, 0, 340);
  ambGrad.addColorStop(0,   'rgba(255,100,20,0.06)');
  ambGrad.addColorStop(0.4, 'rgba(200,60,10,0.025)');
  ambGrad.addColorStop(1,   'rgba(0,0,0,0)');
  g.fillStyle = ambGrad; g.fillRect(50, 165, GW-100, 175);

  const ledBloom = g.createRadialGradient(CX, CY, 0, CX, CY, 200);
  ledBloom.addColorStop(0,   `rgba(20,80,180,${0.08 + 0.05 * Math.sin(ledPhase * 2)})`);
  ledBloom.addColorStop(0.5, 'rgba(10,40,100,0.04)');
  ledBloom.addColorStop(1,   'rgba(0,0,0,0)');
  g.fillStyle = ledBloom; g.fillRect(50, 165, GW-100, GH-165);

  const stripY = 175;
  g.beginPath();
  g.moveTo(90, stripY); g.lineTo(320, stripY);
  g.moveTo(440, stripY); g.lineTo(GW-90, stripY);
  g.strokeStyle = `rgba(180,210,255,${0.20 + 0.10 * Math.sin(ledPhase * 1.8)})`;
  g.lineWidth = 2; g.shadowColor = 'rgba(180,210,255,0.5)'; g.shadowBlur = isMobileDevice ? 0 : 6;
  g.stroke(); g.shadowBlur = 0;
}

// ── Vignette ──
function drawVignette(g) {
  const vig = g.createRadialGradient(GW/2, GH/2, 200, GW/2, GH/2, GW * 0.72);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.50)');
  g.fillStyle = vig; g.fillRect(0, 0, GW, GH);

  const corners = [{x:0,y:0},{x:GW,y:0},{x:0,y:GH},{x:GW,y:GH}];
  for (const co of corners) {
    const aoG = g.createRadialGradient(co.x, co.y, 0, co.x, co.y, 160);
    aoG.addColorStop(0, 'rgba(0,0,0,0.40)'); aoG.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = aoG; g.fillRect(co.x-160, co.y-160, 320, 320);
  }
}

// ─────────────────────────────────────────────────────────
//  PENGUIN BUILDER
// ─────────────────────────────────────────────────────────
function perspScale(canvasY){ return .82+(canvasY/GH)*.36; }
function hexColor(hex){ return new THREE.Color(parseInt(hex.replace('#',''),16)); }

function makePenguin(canvasX, canvasY, faceAngle, hoodieHex, phase, provider, agentType = '') {
  const group = new THREE.Group();
  const threeX = canvasX, threeY = canvasY;
  const pscale = perspScale(canvasY);
  const base = 18 * pscale;

  const bodyColor  = new THREE.Color(0x121820);
  const bellyColor = new THREE.Color(0xe8e8e8);
  const hoodieColor= hexColor(hoodieHex);
  const eyeWhite   = new THREE.Color(0xf0f0f0);
  const pupilColor = new THREE.Color(0x080808);
  const beakColor  = new THREE.Color(0xff8c20);

  // Body
  const body=new THREE.Mesh(new THREE.SphereGeometry(base,14,12),new THREE.MeshLambertMaterial({color:bodyColor}));
  body.position.set(0,0,base*.1); body.scale.set(.88,1,.72);
  body.castShadow=true; body.receiveShadow=true; group.add(body);

  // Hoodie
  const hoodie=new THREE.Mesh(new THREE.SphereGeometry(base*.95,14,8,0,Math.PI*2,0,Math.PI*.52),new THREE.MeshLambertMaterial({color:hoodieColor,side:THREE.FrontSide}));
  hoodie.position.set(0,0,base*.12); hoodie.scale.set(.90,1.02,.74);
  hoodie.castShadow=true; group.add(hoodie);

  // Zipper
  const zipper=new THREE.Mesh(new THREE.CylinderGeometry(base*.025,base*.025,base*.9,5),new THREE.MeshLambertMaterial({color:new THREE.Color(0x888888)}));
  zipper.position.set(base*.01,base*.1,base*.72); zipper.rotation.x=Math.PI*.08; group.add(zipper);

  // Belly
  const belly=new THREE.Mesh(new THREE.SphereGeometry(base*.62,12,10),new THREE.MeshLambertMaterial({color:bellyColor}));
  belly.position.set(0,-base*.08,base*.65); belly.scale.set(.75,1.1,.55);
  belly.castShadow=true; group.add(belly);

  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(base*.68,14,12),new THREE.MeshLambertMaterial({color:bodyColor}));
  head.position.set(0,base*.12,base*1.55); head.castShadow=true; head.receiveShadow=true; group.add(head);
  group.userData.head=head;

  // Hood
  const hood=new THREE.Mesh(new THREE.SphereGeometry(base*.70,12,8,Math.PI*.18,Math.PI*1.64,0,Math.PI*.7),new THREE.MeshLambertMaterial({color:hoodieColor,side:THREE.FrontSide}));
  hood.position.set(0,base*.12,base*1.55); group.add(hood);

  // Eyes
  const eyeR=base*.155, pupilR=base*.090, eyeOff=base*.22;
  group.userData.eyeParts=[];
  for(const side of [-1,1]){
    const eyeMesh=new THREE.Mesh(new THREE.SphereGeometry(eyeR,10,8),new THREE.MeshLambertMaterial({color:eyeWhite}));
    eyeMesh.position.set(side*eyeOff,base*.30,base*2.02); group.add(eyeMesh);
    const pupMesh=new THREE.Mesh(new THREE.SphereGeometry(pupilR,8,6),new THREE.MeshLambertMaterial({color:pupilColor}));
    pupMesh.position.set(side*eyeOff*.88,base*.32,base*2.14); group.add(pupMesh);
    const glintMesh=new THREE.Mesh(new THREE.SphereGeometry(pupilR*.35,5,4),new THREE.MeshLambertMaterial({color:new THREE.Color(1,1,1)}));
    glintMesh.position.set(side*eyeOff*.78+.8,base*.35,base*2.18); group.add(glintMesh);
    group.userData.eyeParts.push({eyeMesh, pupMesh, glintMesh, baseScaleY:1});
  }

  // Beak
  const beak=new THREE.Mesh(new THREE.ConeGeometry(base*.16,base*.38,8),new THREE.MeshLambertMaterial({color:beakColor}));
  beak.rotation.x=-Math.PI/2+.25; beak.position.set(0,base*.52,base*2.02); group.add(beak);
  group.userData.beak=beak;
  group.userData.beakBaseRotX=beak.rotation.x;
  group.userData.beakBasePosZ=beak.position.z;

  // Flippers — arms resting forward on keyboard
  group.userData.flippers=[];
  for(const side of [-1,1]){
    const flip=new THREE.Mesh(new THREE.CapsuleGeometry(base*.12,base*.62,4,8),new THREE.MeshLambertMaterial({color:bodyColor}));
    // Extended forward toward desk (y+), at desk level (z low)
    flip.position.set(side*base*.55, base*.92, base*.22);
    flip.rotation.x = 1.05;   // arm angled forward-down onto keyboard
    flip.rotation.z = side*0.20;
    flip.castShadow=true; group.add(flip);
    group.userData.flippers.push({
      mesh:flip, side,
      basePosZ: flip.position.z,
      baseRotX: flip.rotation.x,
      baseRotZ: flip.rotation.z,
    });
  }

  // Feet
  group.userData.feet=[];
  for(const side of [-1,1]){
    const foot=new THREE.Mesh(new THREE.CapsuleGeometry(base*.10,base*.25,4,6),new THREE.MeshLambertMaterial({color:beakColor}));
    foot.position.set(side*base*.35,-base*.92,-base*.02); foot.rotation.x=Math.PI/2;
    foot.castShadow=true; group.add(foot);
    group.userData.feet.push({mesh:foot,side,baseZ:foot.position.z});
  }

  // Shadow disk
  const shadowMesh=new THREE.Mesh(new THREE.CircleGeometry(base*.85,16),new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.28}));
  shadowMesh.position.set(0,0,-base*.05); shadowMesh.scale.set(1,.4,1); group.add(shadowMesh);

  // Gemini Scout ring (gold)
  if (provider === 'gemini-scout' || agentType === 'gemini-scout') {
    const haloGeo = new THREE.TorusGeometry(base * 0.50, base * 0.06, 12, 32);
    const haloMat = new THREE.MeshBasicMaterial({ color: 0xf59e0b });
    const halo = new THREE.Mesh(haloGeo, haloMat);
    halo.position.set(0, base * 0.12, base * 2.45);
    halo.rotation.x = Math.PI / 2;
    group.add(halo);
  }

  // Face toward monitor (XY rotation) + forward lean to counter scene 15° tilt
  const _qFace = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), faceAngle - Math.PI/2);
  const _tiltAxis = new THREE.Vector3(-Math.sin(faceAngle), Math.cos(faceAngle), 0);
  const _qTilt = new THREE.Quaternion().setFromAxisAngle(_tiltAxis, 0.30);
  group.quaternion.multiplyQuaternions(_qTilt, _qFace);
  group.position.set(threeX, threeY, 0);
  group.userData.phase=phase; group.userData.canvasY=canvasY; group.userData.baseScale=pscale;
  return group;
}

// ─────────────────────────────────────────────────────────
//  GENIE BUILDER
// ─────────────────────────────────────────────────────────
function makeGenie(canvasX, canvasY, colorHex, sessionType) {
  const group = new THREE.Group();
  const pscale = perspScale(canvasY) * 0.858;
  const base = 18 * pscale;

  const SIZE = 256;
  const cvs = document.createElement('canvas');
  cvs.width = SIZE; cvs.height = SIZE;
  const ctx = cvs.getContext('2d');

  // Body — genie cone/drop shape, wider at top, tapering to tail
  const bodyGrad = ctx.createRadialGradient(115,140,5,128,150,62);
  bodyGrad.addColorStop(0,'#8ecfe8');
  bodyGrad.addColorStop(1,'#3a7bd5');
  // Main body ellipse
  ctx.beginPath(); ctx.ellipse(128,150,58,52,0,0,Math.PI*2);
  ctx.fillStyle=bodyGrad; ctx.fill();
  // Taper to tail: draw a narrowing path below
  ctx.beginPath();
  ctx.moveTo(86,175); ctx.quadraticCurveTo(128,215,170,175);
  ctx.quadraticCurveTo(155,165,128,160); ctx.quadraticCurveTo(101,165,86,175);
  ctx.fillStyle=bodyGrad; ctx.fill();

  const highlight = ctx.createRadialGradient(105,135,2,128,150,58);
  highlight.addColorStop(0,'rgba(255,255,255,0.32)');
  highlight.addColorStop(0.5,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.ellipse(128,150,58,52,0,0,Math.PI*2);
  ctx.fillStyle=highlight; ctx.fill();

  ctx.beginPath(); ctx.ellipse(128,172,46,10,0,0,Math.PI*2);
  ctx.fillStyle='#fbbf24'; ctx.fill();
  ctx.beginPath(); ctx.arc(128,172,7,0,Math.PI*2);
  ctx.fillStyle='#7c3aed'; ctx.fill();

  // Arms — wide wavy outgrowths from sides of body
  const lArmGrad=ctx.createRadialGradient(90,138,2,75,135,28);
  lArmGrad.addColorStop(0,'#8ecfe8'); lArmGrad.addColorStop(1,'#3a7bd5');
  // Left arm
  ctx.beginPath();
  ctx.moveTo(80,140); ctx.quadraticCurveTo(52,128,35,115);
  ctx.quadraticCurveTo(28,130,35,138); ctx.quadraticCurveTo(55,148,82,155);
  ctx.fillStyle=lArmGrad; ctx.fill();
  ctx.beginPath(); ctx.arc(35,115,12,0,Math.PI*2);
  ctx.fillStyle='#6ab8d8'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(35,115,12,5,0.3,0,Math.PI*2);
  ctx.strokeStyle='#fbbf24'; ctx.lineWidth=3; ctx.stroke();
  // Right arm
  const rArmGrad=ctx.createRadialGradient(166,138,2,181,135,28);
  rArmGrad.addColorStop(0,'#8ecfe8'); rArmGrad.addColorStop(1,'#3a7bd5');
  ctx.beginPath();
  ctx.moveTo(176,140); ctx.quadraticCurveTo(204,128,221,115);
  ctx.quadraticCurveTo(228,130,221,138); ctx.quadraticCurveTo(201,148,174,155);
  ctx.fillStyle=rArmGrad; ctx.fill();
  ctx.beginPath(); ctx.arc(221,115,12,0,Math.PI*2);
  ctx.fillStyle='#6ab8d8'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(221,115,12,5,-0.3,0,Math.PI*2);
  ctx.strokeStyle='#fbbf24'; ctx.lineWidth=3; ctx.stroke();

  // Head — smaller
  const headGrad = ctx.createRadialGradient(120,108,4,128,115,38);
  headGrad.addColorStop(0,'#c5dff0');
  headGrad.addColorStop(1,'#5a96ba');
  ctx.beginPath(); ctx.arc(128,115,38,0,Math.PI*2);
  ctx.fillStyle=headGrad; ctx.fill();
  ctx.beginPath(); ctx.arc(128,115,38,0,Math.PI*2);
  ctx.strokeStyle='rgba(60,130,180,0.7)'; ctx.lineWidth=3; ctx.stroke();

  // Mouth — friendly smile arc
  ctx.beginPath(); ctx.arc(128,128,14,0.2,Math.PI-0.2);
  ctx.strokeStyle='#0d0d20'; ctx.lineWidth=4; ctx.lineCap='round'; ctx.stroke();

  function drawEyes(c, closed, active) {
    const browY = active ? 88 : 94;

    if (closed) {
      // Закрытые глаза — простые дуги цвета кожи
      c.beginPath();
      c.arc(111, 112, 10, Math.PI, 0);
      c.strokeStyle = '#2a5a8a';
      c.lineWidth = 3.5;
      c.lineCap = 'round';
      c.stroke();

      c.beginPath();
      c.arc(145, 112, 10, Math.PI, 0);
      c.strokeStyle = '#2a5a8a';
      c.lineWidth = 3.5;
      c.stroke();
    } else {
      // Открытые глаза — органичные, без белого фона
      // Левый глаз
      // Радужка на фоне лица
      const irisR = active ? 11 : 10;
      c.beginPath();
      c.arc(111, 112, irisR + 2, 0, Math.PI * 2);
      c.fillStyle = 'rgba(15, 50, 100, 0.7)'; // тёмная глазница
      c.fill();

      c.beginPath();
      c.arc(111, 112, irisR, 0, Math.PI * 2);
      c.fillStyle = '#2e7fc0'; // радужка
      c.fill();

      c.beginPath();
      c.arc(111, 112, irisR - 3, 0, Math.PI * 2);
      c.fillStyle = '#0a0a1a'; // зрачок
      c.fill();

      c.beginPath();
      c.arc(108, 109, 2.5, 0, Math.PI * 2);
      c.fillStyle = 'rgba(255,255,255,0.75)'; // блик
      c.fill();

      // Правый глаз
      c.beginPath();
      c.arc(145, 112, irisR + 2, 0, Math.PI * 2);
      c.fillStyle = 'rgba(15, 50, 100, 0.7)';
      c.fill();

      c.beginPath();
      c.arc(145, 112, irisR, 0, Math.PI * 2);
      c.fillStyle = '#2e7fc0';
      c.fill();

      c.beginPath();
      c.arc(145, 112, irisR - 3, 0, Math.PI * 2);
      c.fillStyle = '#0a0a1a';
      c.fill();

      c.beginPath();
      c.arc(142, 109, 2.5, 0, Math.PI * 2);
      c.fillStyle = 'rgba(255,255,255,0.75)';
      c.fill();
    }

    // Брови
    c.beginPath();
    c.moveTo(98, browY);
    c.quadraticCurveTo(111, browY - 7, 124, browY);
    c.strokeStyle = '#0d0d20';
    c.lineWidth = 5;
    c.lineCap = 'round';
    c.stroke();

    c.beginPath();
    c.moveTo(132, browY);
    c.quadraticCurveTo(145, browY - 7, 160, browY);
    c.stroke();
  }

  drawEyes(ctx, false, false);

  // Turban — adjusted for smaller head (radius 38)
  const turbBase = sessionType === 'cli' ? '#15803d' : '#b45309';
  const turbLight = sessionType === 'cli' ? '#4ade80' : '#fcd34d';
  const turbGrad=ctx.createRadialGradient(128,68,4,128,76,48);
  turbGrad.addColorStop(0,turbLight);
  turbGrad.addColorStop(1,turbBase);
  ctx.beginPath();
  ctx.moveTo(84,82); ctx.quadraticCurveTo(66,54,128,38); ctx.quadraticCurveTo(190,54,172,82);
  ctx.quadraticCurveTo(152,72,128,74); ctx.quadraticCurveTo(104,72,84,82);
  ctx.fillStyle=turbGrad; ctx.fill();

  ctx.beginPath(); ctx.ellipse(128,82,44,10,0,0,Math.PI*2);
  const bandGrad=ctx.createLinearGradient(84,82,172,82);
  bandGrad.addColorStop(0,turbBase); bandGrad.addColorStop(0.5,turbLight); bandGrad.addColorStop(1,turbBase);
  ctx.fillStyle=bandGrad; ctx.fill();

  ctx.beginPath();
  ctx.moveTo(88,70); ctx.quadraticCurveTo(128,46,168,70);
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=3; ctx.stroke();

  ctx.beginPath(); ctx.arc(128,72,10,0,Math.PI*2);
  ctx.fillStyle='#f87171';
  ctx.shadowColor='#ff4444'; ctx.shadowBlur=8;
  ctx.fill(); ctx.shadowBlur=0;

  ctx.beginPath(); ctx.arc(124,68,4,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fill();

  const tex = new THREE.CanvasTexture(cvs);
  const geo = new THREE.PlaneGeometry(base * 4, base * 4);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthTest: false, side: THREE.DoubleSide });
  const plane = new THREE.Mesh(geo, mat);
  plane.rotation.x = THREE.MathUtils.degToRad(15);
  plane.rotation.z = Math.PI;
  plane.position.set(0, 0, base * 1.5);
  group.add(plane);

  const tailColor = new THREE.Color(0x8ab4d4);
  const tailPositions = [
    {x:0, y:0, z:-base*0.5, r:0.55},
    {x:base*0.15, y:0, z:-base*1.0, r:0.42},
    {x:-base*0.1, y:0, z:-base*1.5, r:0.32},
    {x:base*0.12, y:0, z:-base*1.95, r:0.22},
    {x:-base*0.08, y:0, z:-base*2.3, r:0.13},
  ];
  const tailSegs = [];
  tailPositions.forEach((tp, i) => {
    const seg = new THREE.Mesh(
      new THREE.SphereGeometry(base * tp.r, 10, 8),
      new THREE.MeshLambertMaterial({color: tailColor, transparent: true, opacity: 0.65 - i*0.12, emissive: tailColor, emissiveIntensity: 0.1})
    );
    seg.scale.z = 0.45;
    seg.position.set(tp.x, tp.y, tp.z);
    group.add(seg);
    tailSegs.push({mesh: seg, baseX: tp.x, idx: i});
  });

  const gl = new THREE.PointLight(new THREE.Color(colorHex || 0xa8c0d6), 1.4, 180);
  gl.position.set(0, 0, base * 1.5);
  group.add(gl);

  const shadow = null; // removed floor shadow

  const sparkColors = [0x60a5fa, 0xfbbf24, 0xa78bfa, 0x34d399];
  const sparks = [];
  sparkColors.forEach((c, i) => {
    const spark = new THREE.Mesh(
      new THREE.SphereGeometry(base * 0.08, 6, 5),
      new THREE.MeshLambertMaterial({color: new THREE.Color(c), emissive: new THREE.Color(c), emissiveIntensity: 1.2, transparent: true, opacity: 0.9})
    );
    group.add(spark);
    sparks.push({mesh: spark, color: c, phase: i * Math.PI * 0.5, orbitR: base * (1.8 + i * 0.4), orbitZ: base * (0.5 + i * 0.35), speed: 1.2 + i * 0.3});
  });

  group.position.set(canvasX, canvasY, 0);
  group.userData.baseY = canvasY;
  group.userData.base = base;
  group.userData.orb = plane;
  group.userData.core = plane;
  group.userData.tailSegs = tailSegs;
  group.userData.cvs = cvs;
  group.userData.ctx = ctx;
  group.userData.tex = tex;
  group.userData.drawEyes = drawEyes;
  group.userData.blinkTimer = 3 + Math.random() * 4;
  group.userData.blinkState = 'open';
  group.userData.isActive = false;
  group.userData.sessionType = sessionType;
  group.userData.shadow = shadow;
  group.userData.sparks = sparks;

  return group;
}

const labelsDiv = document.getElementById('labels');
let labelEls = []; // [{el, agentKey?} | {el, genieKey?}]

function updateLabels() {
  const sx = scaleRatio, sy = scaleRatio;
  const t = Date.now() / 1000;
  let gi = 0, pi = 0;
  for (const item of labelEls) {
    if (item.genieKey) {
      const ge = genieMap[item.genieKey];
      if (!ge) continue;
      const pos = GENIE_SLOTS[ge.slotIdx];
      const bob = Math.sin(t * 0.9 + gi * 1.4) * 5;
      item.el.style.left = (pos.x * sx) + 'px';
      item.el.style.top = ((pos.y - 58 + bob) * sy) + 'px';
      item.el.style.transform = 'translate(-50%,-50%)';
      gi++;
      continue;
    }
    const entry = penguinMap[item.agentKey];
    if (!entry) continue;
    const st = getStation(entry.stationIdx);
    const bob = Math.sin(t * 0.85 + pi * 1.7) * 4;
    item.el.style.left = (st.labelX * sx) + 'px';
    item.el.style.top  = ((st.labelY + bob) * sy) + 'px';
    item.el.style.transform = `translate(-50%,-50%) rotate(${st.labelAngleDeg}deg)`;
    pi++;
  }
}

function buildCentralLamp(cx, cy) {
  const lg = new THREE.Group();

  cvs.width = W; cvs.height = H;
  const c = cvs.getContext('2d');

  // Свечение фона (смещено вниз под тело)
  const glowGrad = c.createRadialGradient(95, 105, 5, 95, 105, 65);
  glowGrad.addColorStop(0, 'rgba(255,190,30,0.30)');
  glowGrad.addColorStop(1, 'rgba(255,140,0,0)');
  c.fillStyle = glowGrad; c.fillRect(0, 0, W, H);

  // Основание — ножка
  c.beginPath(); c.ellipse(95, 148, 20, 5, 0, 0, Math.PI*2);
  const baseG = c.createLinearGradient(75,148,115,148);
  baseG.addColorStop(0,'#7a4d05'); baseG.addColorStop(0.5,'#d4900a'); baseG.addColorStop(1,'#7a4d05');

  // Шейка

  // Корпус — широкий эллипс
  c.beginPath(); c.ellipse(95, 110, 40, 22, 0, 0, Math.PI*2);
  const bodyG = c.createRadialGradient(80, 98, 3, 95, 110, 44);

  c.fillStyle = bodyG; c.fill();
  c.strokeStyle = 'rgba(255,200,50,0.5)'; c.lineWidth = 1.5; c.stroke();

  // Блик
  c.beginPath(); c.ellipse(78, 99, 14, 7, -0.4, 0, Math.PI*2);

  // Носик — из корпуса круто вверх

  // Кончик носика
  c.beginPath(); c.arc(118, 33, 3.5, 0, Math.PI*2);
  c.fillStyle = '#f0b020'; c.fill();

  // Ручка — слева
  c.beginPath(); c.arc(58, 110, 17, Math.PI*0.45, Math.PI*1.55);
  c.lineWidth = 8; c.strokeStyle = '#8b5e0a'; c.lineCap = 'butt'; c.stroke();
  c.beginPath(); c.arc(58, 110, 17, Math.PI*0.45, Math.PI*1.55);
  c.lineWidth = 4; c.strokeStyle = '#d4aa20'; c.stroke();

  // Дымок из носика — синие шарики
  [[118,27,4,0.75],[115,20,3,0.55],[120,14,2.5,0.35]].forEach(([x,y,r,op]) => {
    c.beginPath(); c.arc(x,y,r,0,Math.PI*2);
    c.fillStyle = `rgba(96,165,250,${op})`; c.fill();
  });

  const tex = new THREE.CanvasTexture(cvs);
  const plane = new THREE.Mesh(
    new THREE.PlaneGeometry(62, 52),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthTest: false, side: THREE.DoubleSide })
  );
  plane.rotation.x = THREE.MathUtils.degToRad(12);
  plane.rotation.z = Math.PI;

  // Анимируемый дым-шар у кончика носика
  const smoke = new THREE.Mesh(
    new THREE.SphereGeometry(3, 8, 6),

  smoke.position.set(18, 8, 8);
  lg.add(smoke);
  lg.userData.smoke = smoke;

  // Свет
